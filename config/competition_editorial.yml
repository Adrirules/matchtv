"Champions League": |
  La Ligue des champions, ceux qui sont partis en Erasmus ou ont eu Dan ou Lisa comme correspondant au collège disent la "Champions League", certains encore l'appellent la C1 mais c'est plus rare. Et les puristes vous diront que ça s'appelait la Coupe des Clubs Champions avant 1992, mais on va pas aller jusque-là.

  Bon on va aller droit au but (coucou <a href="/equipes/marseille">l'OM</a>) : c'est la compétition de football la plus prestigieuse en Europe. Elle réunit les meilleurs clubs du continent, ceux qui ont terminé dans le haut du classement de leur championnat national la saison précédente, plus les champions de leurs pays respectifs. En gros, si vous êtes là, c'est que vous avez bien travaillé. Ou que vous avez beaucoup d'argent. Les deux ne sont pas incompatibles.

  Depuis la réforme de 2024-2025, elle oppose 36 équipes dans un nouveau format : une phase de ligue où chaque club dispute 8 matchs contre des adversaires différents, suivie d'une phase de playoffs pour les équipes entre la 9ème et la 24ème place, puis une élimination directe classique à partir des huitièmes de finale jusqu'à la grande finale. Ce nouveau format a fait couler beaucoup d'encre à sa sortie, les puristes ont grogné, mais force est de constater qu'il produit plus de matchs entre grands clubs en phase de poule et ça, c'est difficile de s'en plaindre devant son canapé.

  C'est en 1955 qu'elle fut créée, sous l'impulsion notamment du journaliste français Gabriel Hanot qui avait l'idée folle de faire s'affronter les meilleurs clubs européens dans une compétition officielle. À l'époque le <a href="/equipes/real-madrid">Real Madrid</a> a compris avant tout le monde l'intérêt de l'affaire et a remporté les cinq premières éditions. Soixante-dix ans plus tard, ils dominent toujours les statistiques.

  Et puisqu'on parle de stats, la compétition a une riche histoire qui se prête bien aux anecdotes pour briller à l'apéro. Le club qui a remporté la compétition le plus souvent et s'est qualifié directement pour l'année d'après 15 fois, c'est le <a href="/equipes/real-madrid">Real Madrid</a>. Quinze titres. Le deuxième au classement c'est le Milan AC avec 7 titres, ce qui donne une idée de l'écart. Le Real a raté seulement 3 finales dans toute son histoire, ce qui veut dire que si vous les tirez en demi-finale, commencez à stresser immédiatement.

  Pour les amoureux des défaites historiques, c'est la <a href="/equipes/juventus">Juventus</a> qui détient le record peu enviable d'avoir perdu le plus de finales : le club est arrivé en finale 9 fois et l'a perdu 7 fois. Sept. Ce qui explique peut-être pourquoi les supporters bianconeri ont un rapport particulier à la souffrance et à la résignation stoïque. La finale 1985 au Heysel, la finale 1997 contre le Dortmund, la finale 2015 contre le Barça. La Juve collecte les finales perdues comme d'autres collectent les timbres.

  Autre fun fact pour briller au prochain apéro foot : avec 11 matchs gagnés durant la saison 2019-2020, le <a href="/equipes/bayern-munchen">Bayern Munich</a> est le seul club à avoir remporté la compétition en gagnant absolument tous ses matchs, sans la moindre défaite ni le moindre match nul. Dans une bulle sanitaire à Lisbonne, sans supporters, le Bayern a tout écrasé sur son passage. Lewandowski, Gnabry, Müller, Kimmich. Une machine de guerre. Et ça, c'est beau même quand on n'est pas supporteur bavarois.

  Pour la saison 2025-2026, les droits de diffusion en France sont détenus par la chaîne Canal+, qui propose une couverture exhaustive de la compétition. Tous les matchs sont accessibles en direct sur les chaînes du groupe Canal+ ou en streaming via MyCanal. Si vous n'êtes pas abonné Canal+ et que vous voulez suivre la Champions League, il va falloir y passer. Il n'y a pas d'alternative légale en France pour cette saison.

  La saison 2025-2026, qui est la 71ème édition de la compétition, s'annonce particulièrement intense. Les géants espagnols avec le <a href="/equipes/real-madrid">Real Madrid</a> et le <a href="/equipes/barcelona">Barça</a> en grande forme, les clubs anglais avec <a href="/equipes/arsenal">Arsenal</a> en tête, le <a href="/equipes/bayern-munchen">Bayern</a> qui a démarré la saison en trombe en Bundesliga. Tout ce beau monde va se rentrer dedans à partir des huitièmes de finale et ça promet des soirées mémorables.

  Mais on garde une pensée émue pour l'an dernier et ce que le <a href="/equipes/paris-saint-germain">PSG</a> a réalisé. Champions League 2025, finale à Munich contre l'<a href="/equipes/inter">Inter Milan</a> : 5-0. Le plus grand écart de l'histoire en finale de C1. Désiré Doué à 19 ans, Hakimi, Kvaratskhelia. Une génération qui s'est créé des souvenirs indélébiles, et des pères de famille qui ont pleuré sur les Champs-Élysées en criant que c'était le plus beau jour de leur vie. On sait de quoi on parle.

  Et maintenant ? On espère encore et encore voir un club français en finale en 2026. Le PSG y croit, les autres y rêvent. C'est pour ça qu'on regarde.

  On vous a répertorié juste en dessous tous les prochains matchs de Champions League.

"Coupe de France": |
  La Coupe de France, si je dois la situer je la place bien en dessous de la L1 en termes d'audience mais elle écrase la Ligue 2. C'est une compétition de football à élimination directe qui oppose des équipes de tous niveaux, et c'est toute la beauté de cette compétition : on y voit des amateurs affronter des professionnels. Des gens qui bossent la semaine, qui s'entraînent le mercredi soir sous la pluie dans un stade municipal éclairé par quatre projecteurs qui clignotent, et qui se retrouvent un samedi après-midi à défier une équipe de Ligue 1 devant des caméras.

  On a tous en tête le club de Marcq-en-Barœul qui a affronté <a href="/equipes/estac-troyes">Troyes</a> en 32ème de finale. Ça, c'est mon football. Tout le monde a les mêmes chances, même si certains joueurs doivent poser un RTT à leur taf pour jouer le match. L'attaquant qui pose une demi-journée pour aller se faire éliminer par des professionnels et qui revient au bureau le lundi avec une histoire à raconter pour le restant de sa carrière.

  À la rédaction (comprendre : dans mon canapé avec mon chien et un paquet de chips) on se rappelle de Paul Abel, le leader technique de Bayeux, qui a joué avec une fracture pour pouvoir affronter l'<a href="/equipes/marseille">OM</a>. Et se prendre 9-0. Mais voilà : tu peux bien sortir avec un score de match de basket, tu auras joué un match de foot historique que tu raconteras tous les dimanches à tes petits-enfants, et sur ton lit de mort tu pourras dire "j'y étais." C'est ça, la Coupe de France. Elle fabrique des légendes locales que personne ne connaît à Paris mais que tout le monde vénère dans leur village.

  Et ce n'est pas qu'une question de symbole. L'histoire de la Coupe de France est jalonnée de véritables exploits, de clubs amateurs ou de bas de tableau qui ont éliminé des favoris supposés invincibles. Calais en finale en 2000, battu par Nantes mais là, en finale de Coupe de France, avec des joueurs qui travaillaient à côté. Carquefou qui élimine <a href="/equipes/lens">Lens</a> en 2008. Granville qui pousse le <a href="/equipes/paris-saint-germain">PSG</a> dans ses retranchements. Ces moments-là ne s'inventent pas.

  Cette compétition qui compte plus de 7 000 équipes participantes est l'une des plus attachantes du football français, avec une histoire riche qui remonte à 1917. Oui, 1917. Pendant la Première Guerre mondiale. Le football comme parenthèse, comme respiration collective dans un pays en guerre. Cette compétition a traversé un siècle d'histoire de France, deux guerres mondiales, des dizaines de gouvernements, et elle est toujours là, avec ses Bayeux et ses Marcq-en-Barœul qui rêvent grand.

  Le format est simple et brutal : un match, une défaite et c'est terminé. Pas de match retour, pas de deuxième chance. Cette règle qui vaut pour tout le monde, du club de National 3 au <a href="/equipes/paris-saint-germain">PSG</a>, est ce qui rend chaque match à élimination directe potentiellement historique. Un mauvais jour, une erreur défensive, un gardien de l'équipe amateur qui s'élève au-dessus de lui-même, et le favori rentre chez lui. C'est impitoyable, et c'est parfait.

  Les droits de diffusion de la Coupe de France pour la saison 2025-2026 sont partagés entre France Télévisions (France 2 et France 3) et beIN Sports. Les grands rendez-vous, notamment les demi-finales et la finale, sont diffusés en clair sur France Télévisions, accessibles à tous sans abonnement. Merci le service public, vraiment. La finale de Coupe de France au Stade de France, en clair, disponible pour toute la famille un samedi soir, c'est l'un des derniers grands événements sportifs français qui reste universel. Les autres tours sont disponibles sur beIN Sports ainsi qu'en streaming sur leur plateforme.

  Un détail important pour les supporters qui suivent leur équipe de cœur depuis le début : les premiers tours impliquant des clubs amateurs sont souvent difficiles à suivre à la télévision. C'est là que les sites de clubs, les pages Facebook locales et les journaux régionaux prennent tout leur sens. L'information sur le score du FC Truc-Machin en 7ème tour préliminaire, vous la trouverez dans le journal de votre département, pas sur Canal+.

  La saison 2025-2026 de la Coupe de France s'annonce encore une fois passionnante. Les clubs de Ligue 1 arrivent progressivement en cours de compétition pendant que les équipes amateurs se battent entre elles dans les premiers tours. C'est ce moment, quand les niveaux se croisent pour la première fois, que la magie opère vraiment. Un centre-ville contre un club de banlieue qui a survécu six tours, une équipe de Ligue 2 qui tombe sur un adversaire coriace qui n'a rien à perdre.

  On l'espère tous : qu'un exploit retentissant vienne secouer cette édition 2025-2026. Un David contre Goliath dont on parlera encore dans vingt ans. Parce que la Coupe de France sans son exploit, c'est comme un apéro sans chips. Techniquement possible, mais franchement décevant.

  Bonne saison à tous.

  On vous a répertorié juste en dessous tous les prochains matchs de Coupe de France.

"Ligue 2": |
  La Ligue 2, ou la L2, et si tu es né avant 2000 tu parles de D2. Et si tu vas au PMU avec des anciens ou à la buvette du stade de ta ville, tu entendras parler de "national" ou plus rarement de "division interrégionale", des appellations qui ont disparu des textes officiels mais qui survivent dans la mémoire collective des vrais amoureux du foot. C'est ça aussi, le football français : une stratification linguistique qui trahit immédiatement l'âge et le niveau d'expertise de votre interlocuteur.

  Au-delà d'être la salle d'attente vers la Ligue 1, c'est surtout une compétition de football qui oppose vingt équipes françaises depuis 1933, soit presque autant que la Ligue 1. Presque. Elle a une longue histoire et un certain prestige, car elle permet aux clubs de se faire connaître, de progresser, et surtout de rêver. Parce que la Ligue 2, c'est le championnat du rêve accessible. Pas le rêve de la star qui signe à Madrid, non. Le rêve du club de province qui monte en Ligue 1 et qui fait pleurer de joie toute une ville un samedi soir de mai.

  Depuis des décennies, la L2 lance les carrières de nombreux joueurs et entraîneurs plus ou moins talentueux. C'est souvent là que les jeunes joueurs font leurs premières vraies armes dans le football professionnel, là que les entraîneurs débutants apprennent à gérer un vestiaire sous pression, là que les clubs bâtissent des projets sur la durée loin des projecteurs parisiens. Des joueurs comme Karim Benzema, formé à <a href="/equipes/lyon">Lyon</a> certes, mais qui a connu ses premières saisons professionnelles dans l'obscurité relative avant d'exploser. Des entraîneurs comme Didier Deschamps qui ont appris leur métier dans des divisions inférieures avant de tout gagner.

  La Ligue 2 c'est aussi le championnat des histoires improbables. Des clubs historiques qui végètent en deuxième division depuis des années, nostalgiques de leurs heures de gloire. Le RC Strasbourg qui a connu les sommets et les abysses. Le FC Metz et ses allers-retours permanents entre les deux divisions comme s'il avait signé un abonnement au yo-yo. Valenciennes, Grenoble, Clermont, des villes qui méritent le football professionnel et qui se battent chaque saison pour l'obtenir ou le conserver.

  Et puis il y a les clubs qui font rêver au-delà du classement. Le <a href="/equipes/red-star-fc-93">Red Star</a>, fondé en 1897, l'un des plus vieux clubs de France, avec son histoire ouvrière, ses maillots rayés rouge et blanc, son stade Bauer à Saint-Ouen qui dégage une atmosphère unique dans le football français. Le <a href="/equipes/le-mans">Le Mans FC</a>, qui a connu la Ligue 1 et la faillite, et qui reconstruit patiemment en essayant de retrouver l'élite. Ces clubs-là, quand on les voit en Ligue 2, on se dit qu'ils méritent de jouer contre le <a href="/equipes/real-madrid">Real Madrid</a> un jour. C'est peut-être naïf. C'est définitivement beau.

  Cette compétition est de plus en plus médiatisée, et pour la saison 2025-2026, les droits de diffusion de la L2 sont détenus par la chaîne beIN Sports. En prenant l'abonnement tu pourras regarder calmement avec les copains un mythique <a href="/equipes/montpellier">Montpellier</a> - <a href="/equipes/estac-troyes">Troyes</a> un samedi à 14h et ainsi te faire des souvenirs pour toute la vie. Un samedi après-midi de novembre, il fait gris, le café est tiède, le commentateur essaie de trouver quelque chose d'intéressant à dire sur une occasion manquée en première mi-temps. C'est ça aussi, la Ligue 2. Et c'est pour ça qu'on l'aime.

  Il faut quand même reconnaître que la L2 produit des matchs souvent plus serrés et imprévisibles que la Ligue 1. Sans le <a href="/equipes/paris-saint-germain">PSG</a> pour écraser tout le monde, la hiérarchie est moins figée. N'importe qui peut battre n'importe qui un bon jour. Les équipes jouent avec une intensité particulière parce que chaque point compte vraiment, parce que la montée ou la relégation se joue souvent à un ou deux points en fin de saison, parce que les joueurs savent que leur carrière professionnelle se joue aussi dans ces matchs-là.

  La saison 2025-2026 de Ligue 2 promet d'être riche en émotions, avec plusieurs équipes qui visent la montée en Ligue 1. Les favoris vont devoir jouer des coudes et affronter des adversaires déterminés qui luttent pour le maintien. Les enjeux sont importants car la promotion peut être un tournant décisif pour les clubs et leurs joueurs. Financièrement d'abord, les droits TV et les recettes de la Ligue 1 représentant un bond considérable par rapport à la L2. Sportivement ensuite, parce que monter c'est se mesurer aux meilleurs.

  Mais aussi pour le douzième homme, nous les supporters. On veut voir le <a href="/equipes/red-star-fc-93">Red Star</a> ou encore <a href="/equipes/le-mans">Le Mans</a> jouer contre le <a href="/equipes/real-madrid">Real Madrid</a> un jour. Alors on suit de près les matchs et les classements pour ne manquer aucun rebondissement de notre feuilleton favori. Parce que dans le fond, la Ligue 2 c'est le football dans ce qu'il a de plus humain : des clubs qui luttent, des joueurs qui rêvent, et des supporters qui y croient contre toute logique.

  Les matchs à venir sont listés juste en dessous.

"Premier League": |
  Le championnat d'Angleterre, également appelé la Premier League par nos voisins britanniques, est l'une des compétitions de football les plus prestigieuses au monde, rassemblant vingt équipes anglaises qui s'affrontent dans un championnat de trente-huit journées. Trente-huit journées qui durent d'août à mai et qui tiennent en haleine des centaines de millions de personnes sur la planète. C'est simple, le dimanche matin quand vous ouvrez votre application de résultats, c'est la Premier League qui truste les premières notifications.

  Créée en 1992 après une scission avec la Football League historique, la Premier League a su en trente ans construire un empire médiatique et sportif sans équivalent. Elle est aujourd'hui le championnat le plus regardé au monde, diffusé dans 189 pays, suivi par environ un milliard de spectateurs selon les estimations. Un milliard. Pour vous donner une idée, c'est plus que la population entière de l'Europe qui regarde des gars courir après un ballon chaque week-end. C'est beau.

  L'histoire du championnat anglais est riche et les équipes emblématiques ne manquent pas. On pense à <a href="/equipes/manchester-united">Man United</a> et <a href="/equipes/liverpool">Liverpool</a>, les deux clubs les plus titrés avec 20 victoires chacun en première division anglaise toutes époques confondues. Une rivalité Nord-Sud, rouge contre rouge, qui structure le football anglais depuis des décennies et qui ne laisse personne indifférent. Choisir son camp entre les deux, c'est presque une question philosophique dans certaines familles britanniques.

  Il faut aussi mentionner <a href="/equipes/arsenal">Arsenal</a> et son invincible saison 2003-2004, 38 matchs sans défaite, un exploit que personne n'a réussi à répéter depuis. Ou <a href="/equipes/chelsea">Chelsea</a> qui a tout raflé avec l'argent de Roman Abramovich dans les années 2000. Ou encore <a href="/equipes/manchester-city">Manchester City</a> et sa domination des années 2010-2020 sous Guardiola, six titres en sept ans, une machine à broyer les espoirs adverses avec une régularité qui frôle l'indécence.

  Le prestige de la Premier League attire les meilleurs joueurs et entraîneurs du monde entier. Nous vient directement en tête Éric the King avec son col relevé et son regard qui transperce l'écran, Eric Cantona qui a profondément marqué ce championnat en étant l'un des meilleurs attaquants de son époque à <a href="/equipes/manchester-united">Manchester United</a>. Un Français qui est devenu une légende anglaise, ce n'est pas si fréquent. La volée contre Wimbledon en 1996, la kung-fu kick contre un supporter en 1995, l'homme était spectaculaire dans tous les sens du terme.

  Côté entraîneurs, ou plutôt côté "manager" comme ils disent outre-Manche, c'est le Français Arsène Wenger qui nous vient en tête immédiatement. 22 ans sur le banc d'<a href="/equipes/arsenal">Arsenal</a>, trois titres de champion d'Angleterre, sept FA Cup, et cette philosophie du beau jeu qui a transformé le club londonien et influencé une génération entière d'entraîneurs. Wenger a aussi révolutionné la préparation physique et la nutrition dans le football anglais, des pratiques qui paraissent évidentes aujourd'hui et qui semblaient révolutionnaires à son arrivée en 1996.

  Et puisqu'on parle de Français qui ont marqué la Premier League, voici une anecdote concernant les salaires. Oui on va parler argent, pépète, flouz, blé, money. Le transfert le plus cher de l'histoire de la Premier League est détenu par un Français, cocorico, avec l'arrivée de Paul Pogba à <a href="/equipes/manchester-united">Manchester United</a> en 2016 pour 105 millions d'euros. De quoi voir venir. Le milieu de terrain revenu à United après son passage à la <a href="/equipes/juventus">Juventus</a> avait été vendu libre quelques années plus tôt, ce qui rend ce transfert encore plus savoureux. United a donc payé 105 millions pour récupérer un joueur qu'ils avaient laissé partir gratuitement. Le football, c'est aussi ça.

  En France, les droits de diffusion de la Premier League pour la saison 2025-2026 ont été acquis par la chaîne beIN Sports, qui propose une large couverture des matchs en direct chaque week-end. Ce qui vous permettra de faire partie de ce milliard de spectateurs dans le monde qui suivent le championnat anglais depuis leur canapé. beIN Sports diffuse en général plusieurs matchs par journée, avec une sélection des affiches les plus attendues. Pour les autres matchs, il faut parfois ruser un peu, mais on ne va pas vous dire comment ici.

  La saison 2025-2026 s'annonce une nouvelle fois très disputée. <a href="/equipes/arsenal">Arsenal</a> caracole en tête du classement avec Gyökeres qui marque à tour de bras depuis son arrivée du Sporting. <a href="/equipes/manchester-city">Manchester City</a> de Guardiola, jamais très loin malgré une saison de transition après les départs de De Bruyne et Walker. <a href="/equipes/liverpool">Liverpool</a> champion en titre qui défend sa couronne avec Salah en fin de contrat et l'incertitude que ça génère. Et <a href="/equipes/manchester-united">Manchester United</a> qui semble enfin montrer des signes de renaissance avec des résultats plus cohérents.

  La Premier League reste ce qu'elle a toujours été : imprévisible, intense, et capable de vous offrir des moments que vous n'oublierez pas de sitôt. Les matchs à venir sont listés juste en dessous.

"Ligue 1": |
  La Ligue 1 : c'est la compétition française de football la plus prestigieuse. Comme on est français, on a même envie de dire que c'est LA compétition la plus prestigieuse au monde. La L1 pour les intimes oppose vingt équipes françaises dans un championnat qui dure d'août à mai. Parmi ces 20 équipes on compte aussi Monaco, club de la Principauté qui joue en France parce que le championnat monégasque, ça n'existe pas vraiment. Avantage pour nous, on récupère des soirées de luxe au stade Louis-II.

  Créée en 1932, la Ligue 1 a vu défiler certains des plus grands clubs comme le <a href="/equipes/paris-saint-germain">PSG</a> qui compte 13 titres dont celui de 2025, ou encore l'<a href="/equipes/saint-etienne">AS Saint-Etienne</a> qui l'a gagné 10 fois même si la dernière fois remonte à 1981 (ce qui leur a permis d'arborer l'étoile sur le maillot, une étoile qu'ils contemplent avec nostalgie depuis 44 ans), voire l'<a href="/equipes/marseille">Olympique de Marseille</a>, l'OM supporté par les Phocéens, un club qui a des minots partout dans le monde fans du club mythique. Et c'est mérité : l'OM reste le seul club français à avoir remporté la Ligue des Champions, en 1993, une étoile sur le maillot que le PSG a mis trente ans à égaler.

  Il faut aussi mentionner l'<a href="/equipes/lyon">Olympique Lyonnais</a> et ses 7 titres consécutifs entre 2002 et 2008, une série qui a failli rendre la Ligue 1 monotone à force de voir les mêmes Champions soulever le trophée. Ou encore le <a href="/equipes/lille">LOSC Lille</a>, champion surprise en 2011 avec un doublé coupe et championnat, et à nouveau en 2021 dans ce qui restera comme l'un des plus beaux braquages de l'histoire récente du foot français, au nez et à la barbe du PSG et de ses centaines de millions.

  Le championnat de France a vu passer de très bons joueurs de l'histoire du football mondial. Parmi eux on a pu voir Marquinhos, pilier du PSG depuis plus de dix ans et capitaine de la première Champions League de l'histoire parisienne. Marco Verratti, le petit meneur de jeu qui faisait la pluie et le beau temps au milieu du Parc des Princes pendant une décennie. Presnel Kimpembe, formé au club, défenseur tranchant quand tout va bien. Mais aussi Zlatan Ibrahimovic, qui a tout écrasé sur son passage entre 2012 et 2016 avec 156 buts en 180 matchs. Ronaldinho qui a régalé quelques saisons au PSG avant de devenir une légende mondiale à Barcelone. Plus récemment Kylian Mbappé, gamin de Bondy en Seine-Saint-Denis formé à Monaco, révélé à 17 ans et devenu l'un des meilleurs joueurs du monde sous nos yeux. La Ligue 1 a ce talent particulier : elle révèle des monstres, et ensuite les autres championnats les volent. C'est notre malédiction et notre fierté à la fois.

  La Ligue 1 est tout simplement considérée comme l'une des meilleures ligues du monde (source : moi qui me régale devant la TV), attirant des millions de supporters et de passionnés de partout en France et dans le monde. Le niveau monte chaque saison, les matchs sont souvent serrés, les retournements de situation fréquents, et les stades commencent à se remplir sérieusement depuis quelques années. Bollaert qui vibre, le Vélodrome qui explose, le Parc des Princes qui s'emballe les soirs de C1. La L1 a de l'ambiance quand elle s'y met.

  Pour la saison 2025-2026, les droits de diffusion sont partagés entre plusieurs plateformes (on a d'ailleurs <a href="/blog/guide-abonnements-foot-2026">rédigé un article à ce sujet</a> pour y voir plus clair) : DAZN diffuse la majorité des matchs en direct, Canal+ conserve une sélection d'affiches premium, et beIN Sports complète la couverture avec notamment le match du samedi à 17h. Les abonnés peuvent suivre leur équipe favorite sur l'une de ces trois plateformes selon le créneau et l'affiche.

  C'est d'ailleurs l'une des particularités de la Ligue 1 en ce moment : pour voir tous les matchs, il faudrait idéalement souscrire aux trois abonnements, ce qui commence à faire une addition salée. On vous détaille tout ça dans notre <a href="/blog/guide-abonnements-foot-2026">article dédié</a>, mais sachez que pour la plupart des matchs du week-end, DAZN est votre meilleur ami.

  La saison 2025-2026, la 88ème de Ligue 1, s'annonce particulièrement disputée avec plusieurs équipes qui visent le titre ou la qualification pour les compétitions européennes. Les favoris habituels, tels que le <a href="/equipes/paris-saint-germain">Paris Saint-Germain</a> (champion en titre et champion d'Europe, excusez du peu), <a href="/equipes/lyon">Lyon</a> qui cherche à redevenir grand, et <a href="/equipes/monaco">Monaco</a> avec ses jeunes talents, seront évidemment à surveiller. Mais d'autres équipes comme <a href="/equipes/lens">Lens</a> qui court derrière le PSG depuis deux ans, <a href="/equipes/marseille">Marseille</a> qui a retrouvé sa fierté, ou encore <a href="/equipes/lille">Lille</a> avec son recrutement toujours aussi malin pourraient créer la surprise et remettre en cause la hiérarchie établie.

  Et puis il y a le bas du tableau. Les enjeux sont cruciaux pour les équipes qui luttent pour leur maintien en Ligue 1 (coucou Metz), ce qui promet une saison passionnante et remplie de suspense du premier au dernier match de la saison. C'est d'ailleurs ça, la magie de la L1 : même en fin de saison quand le titre est joué, il reste toujours quelque chose à vivre.

  On vous a répertorié juste en dessous tous les prochains matchs de L1.

"Europa League": |
  La compétition de football Europa League, si on est précis on l'appelle UEFA Europa League. Si on est très précis on l'appelait Coupe UEFA avant 2009, et si on est pédant on rappelle qu'elle est née en 1971 sous le nom de Coupe UEFA en fusionnant la Coupe des Foires et la Coupe des Villes de Foires. Voilà, maintenant vous savez. Vous pouvez ranger ça dans le tiroir "anecdotes pour le repas de Noël" entre la recette de tarte aux pommes de mamie et le nombre de départements français.

  Cette belle compétition oppose des équipes européennes de haut niveau qui n'ont pas tout à fait réussi à se qualifier pour la Champions League, mais qui ne s'en laissent pas conter pour autant. Pendant longtemps, l'Europa League a eu une image de compétition de second rang, le lot de consolation des équipes qui ratent la C1 de peu. C'est injuste et c'est en train de changer. Depuis 2015, le gagnant de l'Europa League est directement qualifié pour la Ligue des Champions la saison suivante, ce qui a considérablement relevé les enjeux et l'intérêt de la compétition. Aujourd'hui, des clubs qui auraient pu choisir de ne pas s'y investir pleinement jouent à fond la carte Europa League parce que la récompense en vaut la peine.

  Créée en 1971, elle a évolué au fil des ans pour devenir l'une des compétitions les plus suivies d'Europe, avec ses nuits de jeudi qui ont leurs propres rituels, leurs propres ambiances, leurs propres légendes. Les jeudis soir d'Europa League ont quelque chose de particulier : moins d'hystérie que la Champions League du mercredi, mais souvent plus de surprises et de matchs serrés.

  Depuis la réforme 2024-2025, le format adopte une phase de ligue où chaque équipe dispute 6 matchs contre des adversaires différents, suivie de playoffs pour les équipes entre la 9ème et la 24ème place, puis des matchs à élimination directe classiques jusqu'à la finale. Ce nouveau format remplace l'ancienne formule à groupes de quatre équipes qui avait montré ses limites, avec des matchs sans enjeu en fin de phase de poule quand une équipe était déjà qualifiée ou éliminée.

  En 2025-2026, on a la chance d'avoir un club français en lice sérieuse dans la compétition : l'<a href="/equipes/lyon">Olympique Lyonnais</a>, qui va devoir tenir la dragée haute à des adversaires européens de qualité dont le club anglais d'Aston Villa. L'OL en Europa League, c'est toujours une opportunité de vivre de belles nuits européennes au Groupama Stadium, un stade qui peut s'emballer quand les enjeux sont là. Et en Europa League, les enjeux sont toujours là.

  Les supporters français pourront suivre les matchs sur la chaîne beIN Sports, qui diffuse une large sélection de rencontres en direct chaque semaine de compétition. Les grands soirs, les demi-finales et la finale sont également suivis de très près par les médias généralistes.

  Maintenant, les chiffres pour briller en société. Premier fun fact : c'est Tottenham qui a remporté l'édition 2024-2025, leur premier trophée européen depuis... longtemps. Et c'est aussi le club qui a gagné la toute première édition de la compétition en 1972, ce qui fait de lui l'alpha et l'oméga de l'histoire de cette coupe, si on peut dire. Bien joué les Spurs.

  Deuxième fun fact, et celui-là vaut de l'or pour Question pour un Champion si vous croisez Samuel Etienne : c'est le FC Séville qui détient le record absolu de victoires dans cette compétition avec 7 titres. Sept. Un record qui semble difficile à battre dans un avenir proche. Séville a transformé cette compétition en terrain de chasse privé pendant des années, avec une façon de se transcender en Europa League qui dépasse l'entendement. Des équipes qui finissaient cinquièmes ou sixièmes de Liga et qui éliminaient successivement des clubs bien mieux classés en Europe. C'est le mystère Séville.

  Troisième fun fact, pour les supporters marseillais qui auraient besoin de s'auto-flageller : l'<a href="/equipes/marseille">OM</a> a perdu 3 finales de cette compétition. Trois. En 1999 contre Lazio, en 2018 contre l'<a href="/equipes/atletico-madrid">Atlético</a>, et en 2022 encore contre Francfort. Marseille et les finales européennes, une longue histoire d'amour qui se termine toujours mal sauf en 1993 avec la Champions League. Mais on n'est pas là pour rouvrir des blessures.

  Plus globalement, sachez que les équipes espagnoles sont historiquement les plus titrées dans cette compétition avec 14 éditions remportées au total entre Séville, Valence, <a href="/equipes/atletico-madrid">Atletico</a>, Villarreal et <a href="/equipes/real-madrid">Real Madrid</a>. L'Espagne domine aussi bien en Champions League qu'en Europa League, ce qui confirme que leur football a quelque chose que les autres championnats n'ont pas tout à fait réussi à copier.

  Les matchs à venir d'Europa League sont listés juste en dessous.

"La Liga": |
  La Liga, pour ceux qui auraient pris LV2 allemand, c'est la Ligue 1 espagnole. Le championnat de football d'Espagne, la première division, celle où se retrouvent le <a href="/equipes/real-madrid">Real Madrid</a> et le <a href="/equipes/barcelona">Barça</a> depuis toujours et où le reste du pays essaie tant bien que mal de survivre dans leur ombre. C'est dit avec affection, hein. Parce que La Liga produit aussi des clubs magnifiques en dehors des deux mastodontes madrilène et catalan, mais on y reviendra.

  C'est l'une des compétitions de football les plus suivies au monde. On y retrouve 20 équipes qui s'affrontent chaque semaine dans un championnat de 38 journées qui s'étale d'août à mai. Le format est identique à la Ligue 1, sauf que les stades sont en général plus remplis, les pizzas différentes et le soleil plus présent. Des détails, mais qui comptent quand on regarde un match en déplacement.

  Créée en 1929, elle a une longue et riche histoire et a vu évoluer certains des plus grands joueurs de tous les temps. On parle de Di Stéfano dans les années 50 et 60, de Johan Cruyff qui a transformé le Barça dans les années 70, de Ronaldinho qui faisait danser les défenses au Camp Nou dans les années 2000 sous les applaudissements du Bernabéu adverse, ce qui ne se fait pas d'habitude mais qui illustrait le niveau de grâce du personnage.

  Et puis il y a Lionel Messi. Le débat sur le meilleur joueur de l'histoire du football est sans fin et on ne va pas l'ouvrir ici, on a pas assez de chips pour ça. Mais les chiffres parlent d'eux-mêmes : Messi est le meilleur buteur de l'histoire de La Liga, loin devant tout le monde. Devant Cristiano Ronaldo aussi, et ça c'est une stat qui fait toujours grincer des dents dans certains camps. Sur le plan des titres, Messi est le deuxième joueur le plus titré en Liga à égalité avec Pirri, derrière le légendaire Paco Gento, ailier gauche du <a href="/equipes/real-madrid">Real Madrid</a> des années 50-60 qui a remporté six Coupes d'Europe, un record qui tient toujours. Des noms qu'on cite moins souvent mais qui méritent leur place dans la conversation.

  Et parmi les meilleurs buteurs de l'histoire de La Liga, on retrouve un Français avec la médaille en chocolat : KB9, Karim Benzema, avec 238 buts inscrits sous le maillot du <a href="/equipes/real-madrid">Real Madrid</a>. Formé à <a href="/equipes/lyon">Lyon</a>, révélé en France, et c'est en Espagne qu'il est devenu le joueur complet qu'on connaît. Ballon d'Or 2022, cinq Ligues des Champions, et ces 238 buts en Liga qui font de lui le Français le plus prolifique de l'histoire de la compétition. Cocorico discret mais réel.

  Ce qui rend La Liga particulièrement attrayante au-delà des statistiques individuelles, c'est aussi la diversité des clubs et des identités. L'<a href="/equipes/atletico-madrid">Atlético de Madrid</a> qui joue le contre-pied de tout le monde avec son football guerrier. La Real Sociedad et son projet basque construit sur la formation locale. Villarreal, le "sous-marin jaune" d'une petite ville qui se retrouve régulièrement en Europe. Et le Séville FC, spécialiste absolu de la Ligue Europa avec six titres dans cette compétition, un record qui force le respect même quand on est allergique au football andalou.

  La Liga a aussi cette particularité d'être le championnat qui a accueilli le plus de transferts records dans l'histoire du football. De Zidane au <a href="/equipes/real-madrid">Real</a> en 2001 pour 73 millions, à Neymar qui rejoint le <a href="/equipes/barcelona">Barça</a>, à Gareth Bale et ses 100 millions. Les grandes décisions de mercato mondial passent souvent par Madrid ou Barcelone.

  Chaque année des millions de fans se régalent partout dans le monde et pour nous en France, si tu ne veux pas rater un seul but, les droits de diffusion de La Liga pour la saison 2025-2026 sont détenus par la chaîne beIN Sports. Plusieurs matchs par journée sont proposés en direct, avec une sélection des affiches les plus attendues. Le Clasico <a href="/equipes/real-madrid">Real Madrid</a>-<a href="/equipes/barcelona">Barça</a> en particulier est toujours mis en avant, diffusé en grande pompe avec des consultants, des analyses, et une heure de préambule. Parce que le Clasico, même quand c'est un match de mi-saison sans enjeu immédiat, reste le Clasico.

  La saison 2025-2026 de La Liga s'annonce comme chaque année incroyable. Le <a href="/equipes/barcelona">FC Barcelone</a> de Lamine Yamal, 17 ans et déjà meilleur buteur du championnat, mène la danse en tête du classement. Le <a href="/equipes/real-madrid">Real Madrid</a> de Xabi Alonso, nouveau coach après le départ d'Ancelotti, tente de revenir. L'<a href="/equipes/atletico-madrid">Atlético de Madrid</a> de Simeone qui ne lâche jamais rien. Et en fond de tableau, des clubs qui se battent pour leur survie avec la même intensité que les grands pour le titre.

  C'est ça, La Liga. Du premier au dernier, tout le monde joue pour quelque chose.

  Les matchs à venir sont listés juste en dessous.

"National": |
  Si on avait un podium, on aurait la Ligue 1 en première place, la Ligue 2 en deuxième position et enfin le National en troisième. Le bronze du football français professionnel. Certains bruits de couloir disent que pour la prochaine saison on parlera de Ligue 3, histoire d'harmoniser le vocabulaire et de coller à ce qui se fait dans d'autres pays européens. Mais pour l'instant, c'est National, et les habitués vous diront tout simplement "le Nat".
  C'est le championnat de troisième division qui regroupe 18 clubs français au total. Et ça fonctionne comme les montantes-descendantes qu'on faisait en ping-pong quand on était en seconde 20 au lycée Victor Hugo : les équipes du haut montent en Ligue 2, celles du bas descendent en National 2, et celles du milieu recommencent la saison suivante en espérant que cette fois ça sera différent. C'est le football dans ce qu'il a de plus circulaire.
  Ce championnat a une particularité qui le rend unique dans le paysage footballistique français : la majorité des joueurs qui y évoluent ont un statut semi-professionnel. Ce qui signifie concrètement que certains d'entre eux ont un boulot à côté, une double vie entre le terrain le week-end et le bureau en semaine. Un comptable qui joue arrière droit le samedi, un commercial qui occupe le poste de milieu récupérateur le dimanche. Ce n'est pas une blague, c'est la réalité du National et c'est précisément ce qui lui donne son caractère authentique. Ces joueurs ne sont pas là pour l'argent ou la gloire, ils sont là parce qu'ils aiment le football profondément et qu'ils ont décidé de ne pas lâcher leur rêve même quand la carrière de footballeur professionnel à temps plein n'a pas été au rendez-vous.
  Créé en 1993, ce championnat a une riche histoire et un certain prestige que les aficionados de stades de province connaissent bien. Des clubs historiques qui ont traversé des décennies de hauts et de bas y trouvent refuge ou tremplin. Des stades municipaux avec leurs tribunes couvertes asymétriques, leurs buvettes qui sentent la saucisse grillée, leurs speakers locaux qui annoncent les compositions avec un accent régional à couper au couteau. C'est le football dans sa version la plus terroir, la plus honnête.
  Les matchs sont disputés pendant neuf mois, d'août à mai, avec des rencontres en aller-retour comme dans toutes les divisions. Ce qui change par rapport aux divisions supérieures, c'est l'ambiance dans les vestiaires, dans les tribunes, dans la ville le jour du match. Au National, quand l'équipe locale joue un match important, c'est toute la communauté qui se mobilise. Les commerçants qui affichent les couleurs du club, les écoles qui parlent du match du week-end, le maire qui fait un tour en tribune d'honneur. C'est le foot de proximité dans toute sa splendeur.
  Les droits de diffusion télévisée de la saison 2025-2026 ont été attribués à Canal+ Foot, qui propose une couverture des matchs en direct pour notre plus grand plaisir. Les supporters peuvent suivre leurs équipes à la télévision ou en streaming sur la plateforme MyCanal. C'est une vraie bonne nouvelle pour la visibilité du championnat, parce qu'il fut un temps pas si lointain où le National n'existait pratiquement pas sur les écrans et se regardait uniquement en déplacement ou via des streams artisanaux de qualité douteuse.
  Cette saison 2025-2026, deux noms ressortent immédiatement comme favoris pour le titre et la montée en Ligue 2 : Dijon et Sochaux. Deux clubs qui ont connu des jours meilleurs dans les divisions supérieures et qui reconstruisent avec sérieux. Dijon avec son histoire relativement récente en Ligue 1, Sochaux avec sa tradition et son centre de formation historiquement productif. Voir ces deux clubs se battre pour le titre promet une fin de saison haletante.
  Mais ne vous méprenez pas : le National ne se résume pas à la course au titre. La bataille pour le maintien est tout aussi intense, souvent plus dramatique à suivre. Des équipes qui savent qu'une relégation en National 2 pourrait remettre en question leur statut professionnel, leur budget, parfois leur existence même en tant que club organisé. Chaque point arraché en bas de tableau a une valeur que les spectateurs des divisions supérieures ne peuvent pas vraiment comprendre.
  Et cette année, nous les supporters sommes impatients de voir nos équipes en action. Parce que ce n'est pas parce qu'on est en National que le football ne procure pas de belles sensations. Les émotions y sont peut-être même plus franches, plus brutes, moins filtrées par les enjeux commerciaux et médiatiques des divisions du dessus.
  Surtout, n'oubliez pas de soutenir l'équipe locale de votre ville. Peu importe la division, le football de proximité a besoin de vous dans les tribunes, pas seulement derrière un écran.
