paris-saint-germain: |
  Paris Saint-Germain. Le club qui divise la France, mais qu'on regarde quand même.

  Soyons honnêtes deux secondes. Le PSG, c'est un cheatcode. Un club qui a décidé un beau matin de 2011 que l'argent qatari allait changer la donne du football français, et qui l'a fait. Ibrahimovic, Neymar, Mbappé, des centaines de millions dépensés, une <a href='/competitions/ligue-1'>Ligue 1</a> transformée en championnat à sens unique pendant une décennie. Le PSG a aspiré tous les talents, tous les regards, toute l'attention médiatique. Et ça énerve. Pas qu'un peu.

  Mais voilà le truc (et c'est peut-être un aveu difficile pour certains) : quand le PSG joue bien, on se régale. Vraiment. Parce que quand ils ont de bons joueurs, du beau jeu, et un collectif huilé, c'est du spectacle pur. Et en 2025, ils ont offert quelque chose que personne n'oubliera.

  Le 31 mai 2025 : la nuit où tout a changé

  Il y a des soirs de foot qui dépassent le foot. Le 31 mai 2025 à Munich, l'Allianz Arena, PSG contre l'Inter Milan en finale de la <a href='/competitions/champions-league'>Champions League</a>. Le PSG n'avait jamais gagné cette compétition. Jamais. Malgré les milliards, malgré les stars, malgré les années d'essais. La finale de 2020 contre le Bayern, perdue 1-0 dans une bulle sanitaire à Lisbonne, était restée comme une blessure ouverte.

  Ce soir-là, rien ne s'est passé comme prévu, dans le bon sens du terme. Hakimi ouvre le score à la 12e minute, <a href='/joueurs/d-doue'>Désiré Doué</a> double la mise à la 20e. Doué, 19 ans, gamin sorti de Rennes, auteur d'un doublé et d'une passe décisive en finale de C1. <a href='/joueurs/k-kvaratskhelia'>Kvaratskhelia</a>, <a href='/joueurs/senny-mayulu'>Mayulu</a>. 5-0. Le score le plus large de l'histoire des finales de Champions League. Jamais vu, jamais fait.

  À Paris, les Champs-Élysées ont explosé. Des milliers de gens dans les rues, la Tour Eiffel en bleu et rouge, 110 000 fans au Trocadéro. Et dans cette foule, des scènes impossibles à décrire : des hommes taciturnes, peu expressifs au quotidien, qui pleuraient. Des pères de famille qui criaient que c'était le plus beau jour de leur vie. Des gens qui n'avaient sans doute jamais montré autant d'émotion de leur existence. Ce soir-là, on n'assistait plus à un résultat sportif. On regardait l'histoire d'un club s'écrire en direct. Marquinhos en larmes au micro : "Je pense à tous ceux qui sont passés ici et qui n'ont pas réussi. Thiago Silva, Di Maria." Un moment unique.

  D'où vient ce club ?

  Le Paris Saint-Germain est fondé en 1970, fusion improbable d'un club parisien et d'une section football du Stade Saint-Germain. L'idée : donner enfin à Paris un grand club de football, comme toutes les grandes capitales européennes en avaient. Les débuts sont modestes, la montée en Ligue 1 en 1974, quelques hauts et bas. Le premier grand titre arrive en 1986 avec une Coupe de France. La vraie montée en puissance commence dans les années 90, sous l'ère Canal+ (actionnaire majoritaire à l'époque). C'est l'époque des George Weah, des Valdo, des Rai. Le PSG remporte la Coupe des Coupes en 1996, le premier trophée européen du club, en battant le Rapid Vienne 1-0 à Bruxelles. Une époque dorée, romantique, avant que les finances ne s'effondrent et que le club repasse par une traversée du désert.

  Puis 2011, l'arrivée de QSI. Qatar Sports Investments. Nasser al-Khelaïfi prend les rênes. Et là, tout s'accélère.

  L'ère QSI : le cheatcode assumé

  Zlatan Ibrahimovic débarque en 2012. Il ne vient pas en touriste : 156 buts en 180 matchs, quatre titres de champion de France, une Coupe de France, une Coupe de la Ligue. Zlatan ne marche pas, il écrase. Il transforme le PSG en destination sérieuse pour les grands joueurs.

  Puis vient 2017 et ce qui reste probablement la plus grosse erreur de casting du football mondial : Neymar, acheté 222 millions d'euros. Le transfert le plus cher de l'histoire du football. Suivi de Kylian Mbappé, en prêt puis acheté pour 180 millions. Sur le papier, c'est imbattable. En pratique, la mayonnaise ne prend jamais vraiment. Trop d'égos, trop peu de collectif. La Remontada de 2017 contre Barcelone (éliminés en 8e de finale après avoir gagné 4-0 à l'aller) reste le symbole d'une équipe qui brillait en Ligue 1 mais implosait en Europe.

  Luis Enrique arrive en 2023 avec un mandat clair : construire un collectif, virer l'approche galactique, faire confiance aux jeunes. Beaucoup ont ricané. <a href='/joueurs/d-doue'>Doué</a>, Barcola, Zaïre-Emery, <a href='/joueurs/senny-mayulu'>Mayulu</a>, c'est quoi cette équipe ? Deux ans plus tard, c'est champion d'Europe avec le plus grand écart de l'histoire en finale.

  Ce que le PSG représente en Ligue 1

  Difficile de parler du PSG sans aborder l'impact sur le championnat de France. La <a href='/competitions/ligue-1'>Ligue 1</a> a souffert de la domination parisienne. Neuf titres en dix saisons entre 2012 et 2022, un championnat sous perfusion, des clubs qui jouent pour la deuxième place. C'est une réalité que les autres supporters français vivent comme une injustice permanente. Et ils n'ont pas complètement tort.

  Mais en 2025-2026, quelque chose change. Lens à 59 points, coude à coude avec le PSG à 60. Pour la première fois depuis longtemps, la Ligue 1 ressemble à une vraie course. Luis Enrique fait tourner, gère son effectif, et les autres clubs en profitent. C'est peut-être ça, l'héritage inattendu de la C1 : un PSG assouvi, moins obsédé par dominer le championnat, qui laisse de l'air.

  L'équipe aujourd'hui

  L'effectif actuel est l'un des plus excitants d'Europe. Pas parce qu'il est le plus cher (il ne l'est plus) mais parce qu'il est jeune, collectif, et talentueux de façon organique. <a href='/joueurs/d-doue'>Désiré Doué</a> est devenu en quelques mois l'un des joueurs les plus excitants du continent. <a href='/joueurs/k-kvaratskhelia'>Kvara</a> apporte son génie géorgien. Hakimi reste l'un des meilleurs latéraux du monde, 200 matchs au compteur sous le maillot parisien. Marquinhos, capitaine depuis des années, incarne la continuité et l'âme du club.

  Sur le banc, Luis Enrique a réussi quelque chose de rare : faire d'un club-vitrine un vrai club de football, avec une identité, un style, et des jeunes qui ont faim.

marseille: |
  Olympique de Marseille. À jamais les premiers.

  Il y a des clubs qu'on supporte, et il y a des clubs dont on fait partie. L'OM, c'est la deuxième catégorie. On ne dit pas "je suis fan de Marseille", on dit "je suis marseillais", même quand on n'a jamais mis les pieds en Provence. C'est ça la particularité de ce club, ce truc impossible à expliquer et encore moins à imiter : une appartenance qui dépasse le sport.

  Comme dit Jul : l'étoile sur le maillot, elle ne peut pas tomber.

  Le Vélodrome, une religion

  Avant de parler football, il faut parler du stade. Le Vélodrome n'est pas une enceinte sportive, c'est un état d'esprit. 67 000 places, la mer pas loin, le mistral qui s'engouffre, et dans les virages une ferveur qui n'existe nulle part ailleurs en France.

  Le virage nord, c'est un monde à part. Le capo qui te fait face, dos au terrain, qui orchestre 10 000 personnes avec ses mains nues. Torse nu en plein hiver, en gants pour garder le rythme. Pas de chauffage, pas de confort, juste la conviction que leur rôle est aussi important que celui des joueurs. Et ils ont raison. Les tifos déployés avant les grands matchs sont d'une beauté à couper le souffle, des œuvres d'art éphémères conçues dans l'ombre pendant des semaines pour quelques secondes d'émotion collective. Le douzième homme n'est pas une expression ici. C'est une réalité que les adversaires redoutent.

  Aller au Vélodrome avec son père, se retrouver dans cette masse humaine qui vibre à l'unisson, c'est une expérience que rien ne remplace. Ces moments-là, on les porte toute sa vie.

  À jamais les premiers

  Neuf fois champion de France. Et surtout, le 26 mai 1993 à Munich : l'unique club français à avoir remporté la Ligue des Champions, en battant l'AC Milan 1-0 grâce à un but de Basile Boli. Ce titre, personne ne peut l'effacer. Ni les scandales qui ont suivi, ni les années de traversée du désert, ni les saisons sans titre. L'OM a été champion d'Europe. Le PSG a mis trente ans à l'égaler. Cette étoile cousue sur le maillot, c'est l'histoire du football français résumée en un symbole.

  Éric Cantona, Jean-Pierre Papin, Didier Drogba, Samir Nasri. L'OM a toujours été une terre de talent, un club qui attire et qui révèle. Pas toujours de la manière la plus lisse, mais avec une intensité que peu de clubs en Europe peuvent revendiquer.

  Une saison 2025-2026 de montagnes russes

  Cette saison devait marquer le vrai retour de l'OM au sommet. Retour en <a href='/competitions/champions-league'>Ligue des Champions</a> après deux ans d'absence, un effectif renforcé avec Mason Greenwood confirmé, Rabiot, Højbjerg, et l'arrivée en prêt de Benjamin Pavard en septembre. Roberto De Zerbi aux commandes, Benatia au sportif, Longoria à la présidence. Un triptyque qui avait produit une belle deuxième place la saison précédente avec 65 points.

  Et puis ça s'est compliqué. L'OM termine 25e de la phase de ligue de la C1, éliminé après une cruelle soirée où un but à la 90e+8 de Benfica contre le Real Madrid leur ferme définitivement la porte. La Ligue des Champions qui s'en va sur un coup du sort. De Zerbi est remercié en février. Dans la foulée, Benatia annonce sa démission sur Instagram, avant de faire volte-face et rester à la demande du propriétaire Frank McCourt avec des responsabilités élargies. Longoria voit son rôle évoluer vers l'institutionnel. Et Habib Beye débarque sur le banc.

  Tout ça en quelques semaines.

  Mais il y a eu ce 22 septembre 2025. Un soir de Classique au Vélodrome. L'OM bat le PSG grâce à un but contre son camp de Marquinhos. Fin d'une série de 14 ans sans victoire à domicile en championnat contre le rival parisien. Quatorze ans. La libération d'une génération entière de supporters.

  Le club le plus suivi de France, peut-être du monde

  L'OM revendique le titre de club le plus populaire de France, et les chiffres ne contredisent pas vraiment. Des sections de supporters sur tous les continents, une communauté marseillaise de la diaspora qui suit les matchs depuis Montréal, Dubaï, Tokyo ou São Paulo. Le blanc et bleu ciel voyage bien. Il y a quelque chose dans l'identité de ce club qui résonne au-delà du football, qui parle à ceux qui sont loin de chez eux, qui ont connu l'exil ou la migration. Marseille la ville a toujours été une ville de passage et d'accueil. Le club lui ressemble.

  Ce qu'on regarde aujourd'hui

  Avec Habib Beye sur le banc depuis février, l'OM repart sur des bases nouvelles. L'équipe reste accrocheuse en <a href='/competitions/ligue-1'>Ligue 1</a>, troisième au classement, avec des joueurs comme Greenwood qui ont confirmé leur niveau malgré les polémiques autour de sa signature, Igor Paixão qui régale sur le côté, et Amine Gouiri qui a pris une autre dimension cette saison.

  La question de fond reste entière : l'OM peut-il un jour redevenir champion de France avec le PSG en face ? La réponse honnête, c'est que personne ne sait. Mais ce qui est certain, c'est que le jour où ça arrivera, le Vélodrome va trembler d'une façon qu'on n'a pas vue depuis 1993. Et les virages seront au rendez-vous, comme toujours.

lyon: |
  Olympique Lyonnais. Le club qui a tout eu, sauf le courage d'aller au bout.

  Il y a quelque chose de légèrement frustrant dans l'histoire de l'OL. Un truc qui gratte. Ce club a tout eu : l'argent, les joueurs, le projet, le stade. Il a dominé la France pendant sept ans d'affilée. Il a éliminé le Real Madrid, le Bayern, le Barça en <a href='/competitions/champions-league'>Ligue des Champions</a>. Et pourtant il n'a jamais réussi à transformer l'essai. Jamais en finale européenne. Jamais champion d'Europe. Comme s'il y avait, quelque part dans l'ADN du club, une peur secrète de franchir le dernier palier.

  C'est ce paradoxe qui rend l'OL fascinant.

  Un homme, un destin : Jean-Michel Aulas

  Pour comprendre Lyon, il faut comprendre Aulas. Et pour comprendre Aulas, il faut remonter à une soirée de 1987. L'homme d'affaires lyonnais est invité sur le plateau de l'émission "Ambitions" présentée par Bernard Tapie sur TF1. Après le tournage, en marge d'un dîner, un journaliste demande en l'air qui pourrait bien sortir l'OL des abysses de la Division 2. La punchline circule dans Lyon la semaine suivante : "Aulas président de l'OL." Il accepte. Il reprend un club endetté, au bord de la relégation, sans sponsor, dont les maillots sont floqués "OL-Europe" faute d'autre chose.

  Trente-cinq ans plus tard, ce même club aura été sept fois champion de France consécutivement, coté en bourse, présent dans le top 15 mondial selon Forbes, et propriétaire d'un stade à 500 millions d'euros financé sans un centime d'argent public. Voilà ce qu'Aulas a construit.

  Ce n'était pas un passionné de foot dans le sens romantique du terme. C'était un chef d'entreprise qui gérait un club comme une société. Il achetait bien, vendait encore mieux. Essien, Benzema, Abidal, Malouda, tous partis pour des dizaines de millions à l'étranger après avoir été révélés ou renforcés à Lyon. Certains lui ont reproché de faire du club une épicerie de luxe. Mais les sept titres consécutifs entre 2002 et 2008 sont là, incontestables.

  Paul Le Guen, Houllier, et les années dorées

  La grande époque, c'est celle-là. Paul Le Guen arrive sur le banc en 2000 et remporte trois titres de suite. Méthodique, discret, efficace. L'OL de ces années-là n'est pas spectaculaire mais il est implacable. Puis Gérard Houllier prend la suite et continue sur la lancée.

  Sur le terrain, c'est Juninho qui règne. Le Brésilien et ses coups francs impossibles. Il y en a eu tellement que ça en devient presque absurde : des buts de 30, 35, 40 mètres, des trajectoires que personne ne comprend encore vraiment. Juninho est peut-être le joueur de <a href='/competitions/ligue-1'>Ligue 1</a> le plus sous-estimé de l'histoire hors de France. À Lyon, tout le monde sait ce qu'il valait.

  Et puis Karim Benzema. Formé ici, révélé ici. KB9 qui débarque dans l'équipe première à 17 ans et qui régale avec une technique et une intelligence de jeu rarissimes à cet âge. Lyon n'a pas voulu ou pu le garder, il est parti au Real Madrid en 2009. On connaît la suite : Ballon d'Or 2022, cinq Ligues des Champions. Mais les supporters lyonnais savent qu'ils ont vu les premières pages de cette histoire. Sidney Govou, lui, a choisi de rester, fidèle jusqu'au bout, 11 saisons, 261 matchs, l'incarnation de la loyauté dans un football qui en manque cruellement.

  La dernière saison du règne, celle de 2007-2008, est aussi la plus bizarre. L'équipe gagne son septième titre de suite avec Alain Perrin sur le banc, mais dans une ambiance délétère. Aulas lui-même racontera plus tard que les cadres de l'effectif lui ont demandé, à la veille du dernier match décisif contre Auxerre, de faire la causerie entre eux, sans l'entraîneur. Une scène lunaire. Le titre est là, mais quelque chose est cassé. Ce sera le dernier.

  Le grand stade, le grand rêve

  Aulas a toujours voulu un stade digne de son projet. Gerland était beau mais vieux, et impossible à agrandir suffisamment. Le projet du Grand Stade est lancé en 2007, il voit le jour en janvier 2016 à Décines, en banlieue est de Lyon. Le Groupama Stadium aujourd'hui, 59 000 places, un bijou d'architecture moderne, inauguré pour la réception de Troyes le 9 janvier 2016.

  Ce stade tu dois y aller. Pas seulement pour le foot, pour l'expérience. Taylor Swift y a joué. Coldplay. La Coupe du monde féminine 2019, les JO 2024. C'est une enceinte multifonctions comme peu en France, avec une acoustique et une atmosphère qui tranchent radicalement avec les vieux stades de Ligue 1. Le seul bémol que les habitués mentionnent : l'accès depuis Lyon en heure de pointe un soir de match européen, c'est un calvaire. Prévoir large.

  La traversée du désert, l'ère Textor, le chaos

  Depuis 2012 et le dernier titre en Coupe de France, l'OL cherche. Aulas vend le club en 2022 à John Textor, homme d'affaires américain à la tête d'Eagle Football, un conglomérat de clubs incluant Botafogo et Crystal Palace. Le projet est fumeux, les finances compliquées, le club frôle la relégation administrative en 2024 avant d'être sauvé in extremis. Aulas est évincé en mai 2023, critiqué sur la fin mais célébré dès lors qu'on regarde l'ensemble de son bilan.

  L'histoire prend une tournure encore plus inattendue en 2025 quand Aulas, à 76 ans, se lance dans la course à la mairie de Lyon. Grand favori des sondages, il termine deuxième derrière le maire sortant au premier tour des municipales de mars 2026. L'homme n'a visiblement pas fini de faire parler de lui.

  Et aujourd'hui ?

  L'OL de 2025-2026 est une équipe en reconstruction, cinquième au classement de <a href='/competitions/ligue-1'>Ligue 1</a> avec 47 points, portée par des joueurs comme Lacazette de retour au bercail, et un Groupama Stadium qui commence à retrouver une vraie atmosphère les soirs de match. Le club court toujours après un titre depuis 2012. Mais la matière est là, le stade est là, et l'histoire de ce club montre qu'il sait se relever.

monaco: |
  AS Monaco : Le club du Rocher qui fait des miracles sans faire de bruit.

  Soyons honnêtes : combien connais-tu de vrais supporters de Monaco ? Un, peut-être deux dans ta vie. Et pourtant ce club t'a probablement offert certains de tes plus beaux souvenirs de football. C'est le paradoxe monégasque. Un club sans vraie base populaire massive, installé dans la principauté la plus riche du monde entre la mer et les montagnes, qui joue ses matchs à domicile dans un stade à moitié vide certains soirs, et qui pourtant, à intervalles réguliers, sort du chapeau des équipes qui font trembler l'Europe.

  C'est un club discret. Mais quand il parle, tout le monde écoute.

  Le Rocher et le Grand Prix

  Il faut d'abord situer le décor. Monaco c'est 2 km² de territoire, des yachts, des Formule 1 qui tournent dans les rues en mai, des palais et des milliardaires. Chaque année, pendant quelques jours, les circuits du Grand Prix de Monaco transforment la principauté en cathédrale du sport automobile. Il n'y a peut-être aucun endroit au monde où le sport et le glamour se mélangent avec autant de naturel.

  Et dans ce décor de carte postale, il y a un club de foot. L'AS Monaco, rouge et blanc, qui joue au Stade Louis II, une enceinte suspendue au-dessus des parkings, construite sur pilotis faute de place. Un stade improbable, dans un pays improbable, pour un club qui n'en finit pas de surprendre.

  Michel Hidalgo, les premières fondations

  Avant de parler des années folles, il faut rendre hommage à celui qui a planté les premières graines. Michel Hidalgo passe par Monaco dans les années 60 comme joueur puis comme entraîneur, avant de prendre les rênes de l'équipe de France pour mener les Bleus jusqu'en demi-finale du Mondial 1982 et au titre de champion d'Europe en 1984. Ce que peu de gens savent, c'est que le laboratoire Hidalgo a fonctionné au Rocher avant de fonctionner en bleu.

  Et Delio Onnis ? L'Argentin naturalisé français reste à ce jour le meilleur buteur de l'histoire de la <a href='/competitions/ligue-1'>Ligue 1</a>, avec 299 buts en carrière dont une grande partie sous le maillot monégasque dans les années 70. Un record qui tient depuis cinquante ans et que personne ne semble vouloir aller chercher. Onnis n'est pas très connu du grand public, mais dans le monde du football français, ce nom est une légende silencieuse.

  Bruno Bellone, Lucky Luke du Rocher

  Les années 80 amènent une génération dorée formée au club. Bruno Bellone en est le symbole. Ailier gauche né à Toulon, surnommé "Lucky Luke" par un journaliste qui trouve qu'il arme et frappe plus vite que son ombre. Il joue 228 matchs sous le maillot rouge et blanc, marque 56 buts, et va jusqu'à inscrire un but en finale de l'Euro 1984 avec les Bleus. Formé à Monaco, révélé à Monaco, fidèle à Monaco. Un modèle d'une époque où les joueurs restaient.

  Dans cette même génération, Manuel Amoros, défenseur technique et combatif, futur champion d'Europe lui aussi. Et Patrick Battiston, qui restera gravé dans la mémoire collective pour la charge de Schumacher en demi-finale du Mondial 82, mais qui a lui aussi porté les couleurs monégasques. Une époque féconde, construite dans l'ombre, loin des projecteurs parisiens ou marseillais.

  Willy Sagnol, Jérôme Rothen, et l'école du latéral

  Monaco a toujours eu un truc avec les latéraux. Willy Sagnol, droite de fer et intelligence tactique, formé ici avant de partir au Bayern Munich où il deviendra l'un des meilleurs défenseurs d'Europe dans les années 2000. Jérôme Rothen, lui, c'est l'autre côté. Gaucher technique, débordements propres, centres chirurgicaux. Ce pied gauche qui te fait mal au genou rien qu'à le regarder travailler. Rothen est devenu depuis l'une des voix les plus tranchées du football français sur RMC, mais ses meilleures années, il les a vécues sur la pelouse du Louis-II.

  Youri Djorkaeff aussi. Le fils de Jean, entre Monaco et le reste d'une carrière brillante qui le mènera jusqu'au titre mondial en 1998. Monaco comme tremplin. Monaco comme école.

  Le 6 avril 2004 : la nuit où Giuly a arrêté le temps

  Il y a des matchs dont on se souvient exactement où on était. Le quart de finale retour de <a href='/competitions/champions-league'>Champions League</a> entre Monaco et le Real Madrid, le 6 avril 2004, en fait partie pour une génération entière. Tu avais 14 ans, à la récré tout le monde en parlait le lendemain. Et pour cause.

  Monaco s'était fait corriger 4-2 à Santiago Bernabeu à l'aller. Personne ne donnait cher de leur peau. En face, le Real des Galactiques : Zidane, Ronaldo, Raul, Figo, Beckham, Roberto Carlos. La crème absolue du football mondial. Didier Deschamps sur le banc monégasque, ses joueurs qui sourient avant le coup d'envoi, détendus comme s'ils jouaient un match amical.

  Raul ouvre le score à la 36e. Le stade Louis II retient son souffle. Et là Giuly, le petit Giuly, égalise juste avant la mi-temps d'une volée croisée. Au retour des vestiaires, Morientes - prêté par le Real Madrid à Monaco cette saison-là, ironie totale - marque de la tête sur un centre de Patrice Evra. Et à la 66e, le moment que personne n'oubliera : Giuly dos au but, Helguera dans le dos, Casillas dans les cages. Une madjer. Une talonnade subtile et géniale qui part entre les jambes du défenseur madrilène et finit au fond. Giuly arrache son maillot et court comme un dératé sur la piste d'athlétisme. Le Louis-II explose. Monaco 3-1, qualification.

  Giuly avait dit après : "On est des gamins. Battre le Real Madrid en quarts et arriver en demi-finale, c'est magique." Ce soir-là, Monaco n'était plus un petit club de principauté. C'était une équipe de foot, simplement, magnifiquement.

  Une digression qui s'impose : Deschamps, l'homme qui a tout réussi

  On ne peut pas parler de ce Monaco-Real sans parler de lui. Didier Deschamps était sur ce banc. Capitaine de l'équipe de France championne du monde en 1998, champion d'Europe en 2000, et qui prend ensuite sa retraite pour commencer à entraîner, à Monaco justement, presque sans transition. Il amène cette équipe en finale de <a href='/competitions/champions-league'>Champions League</a> en 2004. Ensuite Juventus, Marseille, et enfin l'équipe de France. Champion du monde en 2018 comme entraîneur.

  Tu peux dire ce que tu veux sur son style de jeu, sur son pragmatisme, sur les choix de liste qui font débat. Mais l'homme a tout gagné. Comme joueur, comme capitaine, comme entraîneur. Il y en a peu dans l'histoire du football mondial qui peuvent revendiquer ce palmarès des deux côtés de la barrière.

  Et quand le débat sur son successeur agite la France, un nom revient toujours : Zidane. Le seul qui pourrait succéder à Deschamps sans que personne ne trouve à redire, parce qu'il y a quelque chose de beau dans l'idée que le meilleur joueur de sa génération prenne la suite du meilleur capitaine de la sienne.

  Mbappé et le laboratoire à talents

  La saison 2016-2017 rappelle au monde ce que Monaco sait faire mieux que presque tout le monde : lancer les jeunes. Cette équipe, entraînée par Leonardo Jardim, atteignait la demi-finale de <a href='/competitions/champions-league'>Champions League</a> avec une attaque composée de Mbappé (18 ans), Lemar, Bernardo Silva, Falcao. Tiémoué Bakayoko au milieu. Des joueurs vendus ensuite pour des centaines de millions d'euros cumulés. Et Monaco champion de <a href='/competitions/ligue-1'>Ligue 1</a> cette année-là, pour la première fois depuis 2000.

  C'est la marque de fabrique du club. Pas les transferts pharaoniques, pas les stars achetées à prix d'or. La formation, la détection, la patience. Et quand ça marche, ça donne des joueurs que le monde entier s'arrache.

lille: |
  LOSC Lille : Le sérieux qui gagne, et ça emmerde tout le monde.

  Il y a un truc avec Lille que les gens du Sud ou de Paris ne comprennent pas toujours. Ils regardent le classement, ils voient le LOSC dans le top 4 depuis des années, ils haussent les épaules et passent à autre chose. Trop discret, pas assez glamour, pas de star planétaire à mettre en Une. Et c'est exactement pour ça que Lille mérite qu'on s'y attarde.

  Ce club, c'est une braise qui brûle longtemps. Pas un feu de paille.

  L'élégance ouvrière

  Le Nord, c'est une culture. Celle du travail, de la solidarité, du maillot qu'on mouille sans se plaindre. Les corons, les terrils, l'histoire industrielle qui a marqué des générations. Dans ce contexte, le football n'est pas un divertissement de luxe, c'est un ancrage. Et le LOSC porte cette identité dans ses tripes.

  Les supporters lillois ne font pas de bruit pour rien. Le Virage Est, les Dogues, les Y'est D'dins — ces groupes de supporters bricolés à la main, avec leurs chants qui piochent dans la culture flamande et carnavalesque du coin, leurs tifos faits sans budget marketing. Ce n'est pas du folklore packaging. C'est vivant, local, authentique. On ne jappe pas. On mord quand il faut.

  Le Stade Pierre-Mauroy à Villeneuve-d'Ascq est une belle enceinte moderne, inaugurée en 2012. Certains supporters regrettent parfois l'atmosphère plus électrique de l'ancien Grimonprez-Jooris, ce vieux stade de quartier où la chaleur était plus immédiate. C'est le prix du progrès. Mais quand le Pierre-Mauroy s'embrase pour un grand match, pour un derby, pour une nuit européenne, c'est une ferveur qui prend aux tripes. Pudique en temps normal, volcanique quand ça compte.

  Eden, l'insolence incarnée

  Si tu demandes à n'importe quel passionné de foot quel souvenir il garde du Lille des années 2010, la réponse arrive sans réfléchir : Eden Hazard. Un gamin de 17 ans qui humiliait les défenses de <a href='/competitions/ligue-1'>Ligue 1</a> avec un sourire en coin, comme si tout ça était trop facile. Une insolence technique rare, ce genre de joueur qui fait la différence dans un couloir de 30 centimètres et qui repart en rigolant.

  Hazard n'a pas été révélé à Chelsea ou au Real Madrid. Il a été révélé à Lille. C'est ici qu'il est devenu lui-même, ici qu'on a compris ce qu'il allait devenir. Et quand il est parti à Chelsea en 2012, les supporters savaient qu'ils avaient vu quelque chose de rare passer. C'est ça, Lille : on n'a pas les stars au sommet de leur gloire. On les a au début de leur histoire.

  2011 : le braquage du siècle (version 1)

  La saison 2010-2011 reste gravée. Sous Rudi Garcia, avec une équipe sans superstar mais avec un collectif qui tourne à la perfection, le LOSC réalise le doublé <a href='/competitions/ligue-1'>Ligue 1</a> et Coupe de France. Champion de France devant le PSG et Lyon. Un titre construit dans la régularité, le travail, la cohérence. Pas de recrutement pharaonique, pas de coup de théâtre médiatique. Juste une équipe qui sait ce qu'elle fait et qui le fait mieux que les autres pendant neuf mois.

  Ce titre de 2011, pour les amateurs du beau jeu collectif, c'est une référence. La preuve que ça marche encore, le football d'équipe.

  2021 : le braquage du siècle (version 2)

  Dix ans plus tard, Galtier sur le banc, et cette fois c'est encore plus fou. Le PSG de Neymar et Mbappé, favori absolu, se fait doubler au classement par un Lille sans star internationale. Le titre est arraché à la dernière ligne droite, dans une ambiance de thriller. Et Burak Yilmaz, le vieux guerrier turc venu d'ailleurs, qui porte l'équipe sur ses épaules avec des buts décisifs et une mentalité de patron. Un titre collectif, arraché, mérité.

  C'est le genre de saison qui construit une légende silencieuse.

  Le recrutement, vraie force secrète

  Ce que Lille fait mieux que presque tout le monde en France depuis quinze ans, c'est recruter. Pas dépenser plus. Recruter mieux.

  Nicolas Pépé sorti de nulle part, revendu 80 millions à Arsenal. Victor Osimhen pisté avant tout le monde, revendu à Naples pour une fortune. Sven Botman formé à la défense, revendu à Newcastle. Boubakary Soumaré, prototype du milieu moderne physique et technique. Renato Sanches qui ressuscite footballistiquement au LOSC avant de partir pour le PSG. Et plus récemment, Lucas Chevalier, gardien formé au club, revendu au PSG cet été pour 40 millions d'euros.

  Cette saison, Hamza Igamane débarque des Rangers écossais pour 11,5 millions. Dans six mois, il vaudra probablement le double. C'est le modèle Lille : acheter juste, développer mieux, vendre au bon moment. Et recommencer.

  Cette saison : la machine tourne encore

  Troisième de <a href='/competitions/ligue-1'>Ligue 1</a> avec 50 points à 28 journées. En <a href='/competitions/europa-league'>Ligue Europa</a> aussi, où les nuits européennes au Pierre-Mauroy continuent de surprendre les équipes qui arrivent en pensant que le Nord c'est tranquille. Olivier Giroud, capitaine et meilleur buteur, qui prouve à 39 ans que le foot intelligent n'a pas d'âge. Et le derby du 4 avril : Lille bat Lens 3-0. La fierté du Nord ne se partage pas.

  Bruno Génésio sur le banc, un 4-2-3-1 propre, une équipe qui sait jouer. Pas de bruit inutile. Juste du foot.

  Ce que Lille représente vraiment

  Dans un championnat dominé par les budgets parisiens et les ambitions marseillaises, Lille est l'anomalie magnifique. Le club qui prouve que la gestion intelligente vaut parfois mieux que le chèque le plus gros. Le club qui forme et revend plutôt que d'acheter et espérer. Le club dont les médias parlent peu mais que les directeurs sportifs européens regardent avec respect.

  Être Lillois, c'est savoir qu'on est les meilleurs sans avoir besoin de le crier trop fort. Les Dogues ne font pas la Une de L'Équipe tous les matins. Ils font les résultats qui comptent quand l'hiver est long et le stade debout.

lens: |
  RC Lens : Bollaert n'est pas un stade, c'est une église.

  Il y a des endroits dans le monde du football qui dépassent le sport. Des lieux où tu entres et tu comprends immédiatement que ce qui se passe là n'a rien à voir avec ce que tu vois ailleurs. Bollaert-Delelis est un de ces lieux. Pas le plus grand stade de France, pas le plus moderne, pas le mieux équipé. Mais peut-être le plus vivant.

  À Lens, on ne regarde pas le match. On le vit.

  Le pays noir et ses racines

  Pour comprendre le RC Lens, il faut comprendre d'où il vient. Le Pas-de-Calais c'est le pays des corons, des terrils, des mines de charbon. Des générations d'hommes qui descendaient sous terre chaque matin et remontaient le soir, la sueur et le charbon dans la peau. Une culture ouvrière dense, solidaire, forgée dans la difficulté commune. Le football dans ce contexte n'est pas un loisir, c'est un ciment social. Un endroit où la communauté se retrouve, se reconnaît, se soutient.

  Le RC Lens est fondé en 1906 dans ce creuset. Les mines ont fermé, les terrils sont restés, la culture elle n'a pas bougé. Ce club porte dans son identité quelque chose de rare dans le football moderne : une authenticité totale, non négociable, impossible à marketer parce qu'elle ne vient pas du marketing. Elle vient de la terre, littéralement.

  Bollaert : la cathédrale

  Stade Bollaert-Delelis. 38 000 places. Inauguré en 1933, rénové plusieurs fois mais jamais dénaturé dans son âme. Ce n'est pas un stade qu'on a construit pour impressionner. C'est un stade qui s'est construit avec le club, autour du club, pour le club.

  Ce qui se passe dans ses tribunes n'a pas d'équivalent en <a href='/competitions/ligue-1'>Ligue 1</a>. Les autres stades en France sont des cinémas. Bollaert c'est une cathédrale. Les chants qui partent des virages et envahissent tout le stade, du premier au dernier rang. Une continuité sonore, une pression constante sur l'adversaire, un douzième homme réel et pas symbolique. Même en Ligue 2, quand le club y était relégué, Bollaert chantait plus fort que la plupart des stades de Ligue 1. Les gens revenaient, semaine après semaine, pas par obligation mais par besoin.

  Luis Enrique a dit cette saison que Lens était l'équipe qui avait changé la donne en Ligue 1. Ce n'est pas anodin venant du coach du PSG champion d'Europe.

  La montée, le retour, les nuits européennes

  Lens monte en <a href='/competitions/ligue-1'>Ligue 1</a> en 2020 après une longue traversée du désert. Et là, quelque chose se passe. Pas juste un club qui revient dans l'élite, mais un club qui arrive avec un projet, une identité de jeu, et une ferveur qui explose tout ce qu'on connaissait.

  La saison 2022-2023 reste la référence absolue. Lens finit deuxième de Ligue 1, derrière le PSG, avec des points et une régularité qu'on n'avait pas vus au club depuis le début des années 2000. Des nuits européennes à Bollaert contre Arsenal, PSV et Séville, avec ce stade qui rugissait et qui faisait plier des équipes habituées à jouer dans des enceintes pourtant intimidantes. L'Europe a découvert Bollaert. L'Europe a compris.

  Cette saison 2025-2026, Lens est deuxième de <a href='/competitions/ligue-1'>Ligue 1</a> avec 59 points à 28 journées, juste derrière le PSG. Une course au titre réelle, dans un championnat qu'on croyait condamné à être un monopole parisien. Allan Saint-Maximin a rejoint le club en février pour apporter de la folie offensive. Le derby contre Lille perdu 3-0 le 4 avril fait mal, mais Lens est là, solide, ambitieux.

  Ce qu'on aime à Bollaert

  Il y a une phrase qui résume bien la philosophie de foot à Lens. On préférera toujours un joueur limité qui finit le match en sang qu'une starlette qui dribble mais qui ne descend pas défendre. Ce n'est pas du football romantique dans le sens des tiki-taka espagnols ou du jeu de possession élégant. C'est du football humain, intense, collectif. Où le pressing est une valeur morale avant d'être une tactique. Où sacrifier ton corps pour ton équipier n'est pas exceptionnel, c'est normal.

  Les supporters lensois reconnaissent leurs joueurs à ça. Pas aux stats, pas aux dribbles, pas aux interviews. Au maillot qu'on mouille, à l'engagement constant, à cette façon d'aller au duel même quand tu sais que tu vas en prendre un.

  Sans ses supporters, Lens est un club banal

  C'est la vérité inconfortable que les gens du club eux-mêmes reconnaissent. L'effectif de Lens n'est pas le plus riche de France. Le budget n'est pas dans les cinq premiers. Sportivement, sur le papier, rien ne justifie une deuxième place de Ligue 1 répétée, des nuits européennes qui font trembler les grands clubs du continent.

  Sauf Bollaert. Sauf cette armée de supporters qui transforment un match à domicile en événement et qui déplacent des milliers de personnes à l'extérieur. C'est un avantage compétitif réel, documenté, reconnu par les adversaires. Des joueurs comme Seko Fofana ou Florian Sotoca qui auraient pu partir pour plus gros et qui ont choisi de rester, en partie pour ça, pour cette atmosphère unique.

  Lens sans ses supporters c'est un bon club de Ligue 1. Lens avec ses supporters c'est un monstre.

  Le dernier vrai club ouvrier

  Dans un football de plus en plus dominé par les fonds d'investissement, les propriétaires milliardaires, les projets construits dans des salles de réunion par des gens qui n'ont jamais mis les pieds dans un virage, Lens représente quelque chose qu'on pensait en voie de disparition. Un club dont l'identité vient du bas, pas du haut. Dont la force vient des tribunes, pas des communiqués. Dont la fierté est authentique parce qu'elle a été gagnée, pas achetée.

  Ce n'est pas du passéisme. C'est une résistance. Et dans le football moderne, cette résistance-là mérite le respect.

nice: |
  OGC Nice : Le Gym, beau projet sans âme ou club d'identité pure ?

  Selon à qui tu poses la question, tu obtiens deux réponses radicalement opposées sur l'OGC Nice. D'un côté les Niçois de souche, les vrais supporters du Gym, qui te diront que ce club c'est une identité, une appartenance, une fierté méditerranéenne qui n'a rien à envier à Marseille ou à qui que ce soit. De l'autre, le regard extérieur, celui qui voit l'Allianz Riviera à moitié vide certains soirs, INEOS en propriétaire distrait, et un projet corporate plus visible sur LinkedIn que dans les virages.

  Les deux ont une part de vérité. C'est ce qui rend Nice intéressant.

  Le Gym, c'est quoi exactement ?

  L'OGC Nice porte ce surnom depuis toujours, héritage de l'époque où le club s'appelait Gymnaste Club de Nice à sa fondation en 1904. Plus d'un siècle d'histoire dans cette ville qui n'appartient à la France que depuis 1860, qui a une langue propre, le niçard, une cuisine propre, une identité propre. Nice n'est pas vraiment le Sud comme Marseille est le Sud. C'est autre chose. Plus discret, plus sûr de lui, avec cette pointe d'arrogance tranquille des gens qui savent qu'ils habitent l'un des endroits les plus beaux du monde et qui n'ont pas besoin de le prouver.

  Le Gym dans ce contexte, c'est un marqueur identitaire fort pour ceux qui y tiennent. Pas un club de masse comme l'OM, pas un club de projet comme le PSG. Un club de territoire. Et les supporters niçois qui y sont attachés le sont vraiment, avec cette conviction que si tu n'es pas d'ici tu ne peux pas vraiment comprendre.

  Quatre titres, une histoire réelle

  Avant de parler de la période récente, il faut rappeler que Nice a une vraie histoire. Quatre titres de champion de France, les derniers datant de 1959, à une époque où le club comptait parmi les meilleurs de France. Des joueurs comme Just Fontaine, meilleur buteur d'une Coupe du monde en un seul tournoi (13 buts en 1958), qui est passé par Nice avant de rejoindre Reims. Une tradition footballistique réelle, même si elle remonte à loin.

  Ce passé-là, les vrais supporters du Gym le portent avec fierté. L'étoile sur le maillot ne date pas d'hier.

  Hatem Ben Arfa, le génie incontrôlable

  Si tu cherches le moment où Nice a fait rêver au-delà de ses frontières, c'est la saison 2015-2016 et Hatem Ben Arfa. Un joueur que tout le monde avait un peu abandonné, que Newcastle avait mis de côté, que les clubs ne voulaient plus. Et là, dans un club du Sud sans pression médiatique parisienne, Ben Arfa explose. 17 buts, des dribbles impossibles, des frappes de loin, du génie pur et incontrôlable. Il finit meilleur joueur de <a href='/competitions/ligue-1'>Ligue 1</a> cette saison-là.

  C'est ça, Ben Arfa : quand il est bien, c'est le joueur le plus excitant à regarder en France. Personne ne dribble comme lui, personne n'a cette relation avec le ballon qui donne l'impression que les règles normales du football ne s'appliquent pas. Nice lui a offert ce contexte, et lui a offert sa meilleure saison. Puis il est parti au PSG, et tout s'est effondré. Mais cette saison niçoise reste une référence.

  L'ère INEOS : le projet LinkedIn

  En 2019, Jim Ratcliffe, patron d'INEOS et à l'époque l'homme le plus riche de Grande-Bretagne, rachète l'OGC Nice. Le projet est ambitieux sur le papier : infrastructures modernes, méthode anglaise, vision long terme, le club comme laboratoire avant Manchester United. L'Allianz Riviera est rénové, le centre d'entraînement modernisé, des coaches de haut niveau recrutés. Lucien Favre, Christophe Galtier, Didier Digard, Francesco Farioli. De vrais noms.

  Mais voilà le problème. Jim Ratcliffe a racheté une part de Manchester United en 2024. Et depuis, Nice n'est plus une priorité. Il l'a dit lui-même, sans détour : "Je n'aime pas particulièrement aller voir jouer Nice car le niveau n'est pas assez élevé." Difficile d'afficher plus clairement son désintérêt pour son propre club. INEOS a mandaté la banque Lazard pour vendre le club, espérant en tirer 250 millions d'euros. Et sur le terrain, Nice est 15e de <a href='/competitions/ligue-1'>Ligue 1</a> cette saison, avec Claude Puel sur le banc, en pleine zone de turbulence.

  "Un club créé pour LinkedIn" disent les mauvaises langues. C'est sévère mais pas totalement injuste pour décrire une période où la communication corporate a parfois dépassé les résultats sportifs.

  La tension permanente : âme ou projet ?

  C'est la vraie question autour de Nice. Est-ce un club avec une identité populaire forte, ou un projet d'investissement habillé en club de foot ?

  La réalité est probablement entre les deux. Il y a de vrais supporters du Gym, avec une vraie culture locale, une vraie fierté niçoise. Et il y a un propriétaire qui regarde ailleurs, un stade qui ne vibre pas toujours comme il devrait, et une saison 2025-2026 qui ressemble plus à une gestion de crise qu'à une ambition européenne.

  La Côte d'Azur mérite mieux. Et les supporters qui se lèvent pour le Gym tous les week-ends aussi.

  Ce que Nice peut encore devenir

  Si INEOS vend à un investisseur avec une vraie vision de football, Nice a tous les atouts pour redevenir un club compétitif. L'infrastructure est là, la ville est là, le bassin de recrutement est là. Sofiane Diop, meilleur buteur cette saison avec 9 buts malgré les difficultés, montre qu'il y a du talent dans cet effectif.

  La question c'est : qui reprend la main ? Et est-ce que la prochaine direction comprendra que dans le foot, l'âme d'un club ne se construit pas dans un PowerPoint ?

rennes: |
  Stade Rennais : Les champions du monde du "on y était presque".

  Il y a un type de club dans le football qui te donne de l'espoir pour mieux te laisser indifférent. Rennes est ce club. Chaque année tu regardes leur effectif, tu vois du talent, une belle organisation, un budget solide, un propriétaire qui investit. Et chaque année tu attends le déclic qui ne vient pas vraiment. Pas de catastrophe, pas d'effondrement spectaculaire. Juste cette sensation persistante qu'avec tout ce qu'ils ont, ils devraient faire plus.

  Club propre. Sans folie. Et sans folie, en football, tu plafonnes.

  La Bretagne et son football

  Avant d'aller plus loin, une chose qu'on sous-estime souvent : la Bretagne est un territoire de football. Une culture sportive dense, une fierté régionale forte, et une identité qui n'a rien à envier aux autres régions de France. Le Roazhon Park à Rennes peut s'enflammer, les supporters bretons voyagent, et quand Rennes joue bien, ça vibre vraiment.

  Longtemps moqués pour leur "lose" historique, les Rennais ont changé de dimension dans les années 2010 avec l'arrivée de François-Henri Pinault et sa famille au capital. Le patron de Kering, un des hommes les plus riches de France, qui investit dans son club de coeur. Les infrastructures se modernisent, le centre de formation devient une référence, les ambitions européennes deviennent réelles. Le "Breizh Power" ne fait plus rire personne.

  Camavinga, Dembélé : la pépinière de géants

  Ce que Rennes a réussi en matière de formation est objectivement remarquable. Ousmane Dembélé, formé ici, parti au Borussia Dortmund puis au Barça pour des sommes astronomiques. Eduardo Camavinga, révélé à 16 ans avec un niveau qui a immédiatement affolé tous les recruteurs d'Europe, vendu au Real Madrid en 2021. Deux joueurs qui ont depuis remporté la <a href='/competitions/champions-league'>Champions League</a> avec leurs clubs respectifs, formés sur les pelouses d'entraînement rennaises.

  C'est peut-être là le vrai paradoxe de Rennes. Le club produit et révèle des joueurs d'une qualité exceptionnelle, mais ces joueurs partent toujours avant d'avoir pu construire quelque chose de durable. La machine à former tourne bien, mais la machine à gagner, elle, attend encore son heure.

  2019 : enfin quelque chose à raconter

  Le 27 avril 2019, Rennes bat le PSG aux tirs au but en finale de la Coupe de France (6-5), après un match nul 2-2. Le PSG de Neymar et Mbappé. La troisième Coupe de France de l'histoire du club, la première depuis 1971. Dans un Stade de France rouge et noir, des milliers de supporters bretons qui n'en reviennent pas.

  C'est LE moment rennais. Celui qu'on évoque quand on parle du club, celui qui prouve que quand Rennes se libère de ses complexes, il peut battre n'importe qui. Ismaïla Sarr ce soir-là, Hatem Ben Arfa aussi en grande partie. Un soir de fête pure, sans calcul, sans pression. Et paradoxalement, c'est peut-être là le problème : Rennes joue mieux quand il n'a rien à perdre. Quand les enjeux montent, quand il faut confirmer sur la durée, quelque chose se grippe.

  Le club bourgeois qui s'écroule sous la pression

  Il faut être honnête sur ce point parce que les chiffres le confirment saison après saison. Rennes démarre bien, accumule de bons résultats, se positionne dans le top 5, et puis quelque chose lâche. Pas toujours au même endroit, pas toujours pour la même raison, mais le résultat est souvent similaire : une fin de saison en deçà des espoirs du début.

  Cette saison 2025-2026 en est un bel exemple. Septième avec 47 points, dans un entre-deux inconfortable. Des victoires impressionnantes : 4-1 contre Monaco en novembre, 4-0 contre Nice en mars, 4-3 contre Brest en avril. Et des défaites qui font mal : 0-5 contre le PSG en décembre, 0-4 contre Monaco en janvier, battu par Lorient. Ces extrêmes permanents donnent le vertige. Pas le vertige de l'espoir, le vertige de l'instabilité.

  Lepaul, Embolo, Blas, Szymanski. Des joueurs de niveau. Un effectif qui mérite mieux que la septième place. Et pourtant.

  Pinault, l'argent et les bonnes intentions

  François-Henri Pinault n'est pas Jim Ratcliffe. Il aime le club, il vient aux matchs, il investit sur le long terme. Le centre d'entraînement de La Piverdière est l'un des meilleurs de France. Le Roazhon Park est une enceinte correcte dans un quartier qui vit au rythme du club.

  Mais l'argent seul ne suffit pas, et Rennes le démontre chaque saison. Il manque quelque chose de moins quantifiable : une identité de jeu qui traverse les entraîneurs, une culture de gagner qui s'installe dans la durée, un collectif qui résiste quand la saison bascule.

  Les entraîneurs défilent. Stéphan, Génésio, Stéphan à nouveau, Jorge Sampaoli. Chaque changement est une remise à zéro. Chaque début de saison repart de zéro. Et les joueurs qui portaient l'ADN du club sont partis à chaque fois qu'ils devenaient vraiment bons.

  Ce que Rennes représente quand même

  Malgré tout ça, Rennes reste un club qu'on regarde avec une certaine sympathie. Parce qu'il n'est pas arrogant. Parce qu'il essaie de construire quelque chose de propre dans un football qui ne l'est pas toujours. Parce que la Bretagne mérite un grand club et que ce grand club existe, même s'il ne s'est pas encore totalement trouvé.

  Le déclic viendra peut-être. Une saison complète, un effectif stable, un entraîneur qui dure, et Rennes pourrait surprendre tout le monde. L'histoire du football est pleine de clubs qui ont attendu longtemps avant de franchir le palier.

  En attendant, on regarde. On espère. Et on attend le déclic.

arsenal: |
  Arsenal : Les romantiques du foot qui apprennent enfin à tuer.

  Il y a un type de supporter dans le monde du football qu'on reconnaît immédiatement. Il connait le jeu, il aime le beau, il souffre en silence et il souffre avec classe. Le supporter d'Arsenal. Pendant vingt ans il a regardé son équipe dominer 80% des matchs, créer des occasions magnifiques, jouer un football d'une élégance rare, et rentrer bredouille. "Beautiful losers", disaient les Anglais. Les esthètes sans trophées.

  L'ère Arteta est en train de changer ça. Mais les vieilles habitudes ont la peau dure.

  Highbury, Wenger et l'âge d'or

  Avant de parler du présent, il faut rendre hommage à ce qui a construit l'identité d'Arsenal. Arsène Wenger arrive à Londres en 1996, inconnu du grand public anglais, et transforme le club de fond en comble. Il amène avec lui une philosophie de jeu, une approche de la nutrition et de la préparation physique qui révolutionne le football anglais, et une succession de talents qui font d'Arsenal le club le plus excitant d'Angleterre pendant une décennie.

  Thierry Henry, Bergkamp, Vieira, Pirès, Ljungberg, Van Persie plus tard. Des joueurs qui jouent ensemble comme s'ils se connaissaient depuis l'enfance, avec une fluidité et une intelligence collective qui régale. Et au bout de ce projet, la saison 2003-2004 : les Invincibles.

  38 matchs de <a href='/competitions/premier-league'>Premier League</a>. 26 victoires, 12 nuls. Zéro défaite. La seule équipe de l'histoire moderne du football anglais à terminer une saison sans perdre un match. Wenger réussit quelque chose que personne n'avait fait depuis Preston North End en 1889. Cette saison-là, Arsenal ne perd pas parce qu'il ne peut pas perdre. Henry marque partout, Vieira commande le milieu de terrain, Bergkamp crée du rien, Lehmann tient la cage. C'est la perfection collective.

  Ce titre reste la référence absolue. Le plafond contre lequel tout le reste se mesure.

  La traversée du désert

  Après 2006 et le déménagement de Highbury vers l'Emirates Stadium, quelque chose change. Le nouveau stade coûte cher, les finances du club sont contraintes, Wenger n'a plus les moyens d'aligner les meilleurs. Arsenal vend ses meilleurs joueurs tous les étés : Cesc Fàbregas au Barça, Robin van Persie à Manchester United, Samir Nasri à City. Et replace des profils moins établis.

  Résultat : neuf ans sans trophée majeur entre 2005 et 2014. Neuf ans de beau jeu, de promesses, et de déceptions répétées en fin de saison ou en huitième de <a href='/competitions/champions-league'>Champions League</a>. Les supporters qui restent pendant ces années méritent une médaille. Ils auraient pu partir, ils sont restés.

  L'Emirates Stadium lui-même est devenu un symbole de cette période. Trop silencieux pour un grand club anglais, surnommé "la bibliothèque" par les observateurs et même certains supporters. Soixante mille places qui ne sonnaient pas toujours comme un arsenal en guerre.

  Arteta et la reconstruction

  Mikel Arteta arrive en décembre 2019 comme entraîneur, lui qui était capitaine du club en joueur. Deux premières saisons difficiles, puis une montée en puissance progressive. Le projet est clair : pressing intense, possession organisée, jeunes talents développés, identité de jeu définie.

  <a href='/joueurs/b-saka'>Saka</a>, Martinelli, <a href='/joueurs/m-odegaard'>Ødegaard</a>, <a href='/joueurs/d-rice'>Rice</a>, Saliba. Une équipe jeune, ambitieuse, technique. Arsenal termine deuxième de <a href='/competitions/premier-league'>Premier League</a> en 2022-2023, deuxième encore en 2023-2024, deuxième une troisième fois en 2024-2025. Trois dauphins consécutifs. Jamais champion malgré une régularité remarquable. Le "toujours là jamais au bout" dans sa version moderne.

  Et cette saison 2025-2026, quelque chose semble différent. Arsenal est premier de <a href='/competitions/premier-league'>Premier League</a>. Viktor Gyökeres, recruté pour 70 millions depuis le Sporting CP, marche sur la Premier League avec 17 buts. Declan Rice dicte le tempo depuis le milieu. Le club bat Bayern Munich 3-1 en <a href='/competitions/champions-league'>Champions League</a>, élimine le Bayer Leverkusen, et se retrouve en quart de finale. Mais vieille habitude oblige, Arsenal a quand même trouvé le moyen de perdre la finale de la League Cup contre Manchester City 2-0 en mars. "Ils dominent 80% des matchs, mais t'as jamais confiance" : la phrase reste vraie, même dans leurs meilleures saisons.

  Thierry Henry, le plus grand Gunner

  On ne peut pas parler d'Arsenal sans parler de lui. Thierry Henry reste à ce jour le meilleur buteur de l'histoire du club avec 228 buts. Un joueur qui a redéfini ce qu'un attaquant pouvait faire : vitesse, technique, intelligence, sens du but, sens du jeu. Le meilleur joueur de <a href='/competitions/premier-league'>Premier League</a> de son époque, sans discussion possible.

  Henry est venu à Arsenal comme ailier reconverti en attaquant par Wenger. Et il est devenu une légende mondiale. Sa statue est devant l'Emirates Stadium. Sa tenue est accrochée dans les murs. Son nom est murmuré avec révérence dans les tribunes vingt ans après son départ.

  L'Emirates aujourd'hui

  La bibliothèque a changé. Depuis quelques saisons, avec l'équipe qui gagne et qui joue bien, l'Emirates s'est réveillé. Les nuits européennes notamment, contre de grands clubs, avec <a href='/joueurs/b-saka'>Saka</a> qui déborde et <a href='/joueurs/m-odegaard'>Ødegaard</a> qui orchestre, les 60 000 spectateurs qui se lèvent et qui font du bruit.

  Arsenal n'est plus les "Beautiful Losers". Ou du moins, il essaie de ne plus l'être. La transformation est réelle. La cicatrice des années de domination sans titre aussi. Les supporters qui ont mangé leur pain noir pendant dix ans et qui voient maintenant leur club premier de Premier League ont le droit d'être un peu arrogants. Ils ont attendu suffisamment longtemps.

chelsea: |
  Chelsea : Football Manager avec de l'argent illimité.

  Il existe une expérience que tout fan de foot a faite au moins une fois dans sa vie. Ouvrir Football Manager, prendre un gros club, dépenser sans compter, virer l'entraîneur dès que ça coinçait, recruter encore, et se retrouver avec un effectif de 40 joueurs dont la moitié est prêtée à des clubs de troisième division portugaise. Chelsea, depuis le rachat par Todd Boehly en 2022, c'est ça. Mais en vrai. Avec de l'argent réel.

  Ce n'est pas une critique, c'est un constat. Et ce qui est fascinant, c'est que malgré le chaos apparent, ce club a quand même une histoire, une identité, et une capacité à soulever des trophées qui ferait rougir des clubs bien mieux organisés.

  L'avant Abramovich : un club normal

  Il faut rappeler ce qu'était Chelsea avant 2003. Un club historique de l'ouest de Londres, fondé en 1905, avec quelques titres mais rien de transcendant. Un champion d'Angleterre en 1955, quelques coupes nationales. Un club de quartier chic avec Stamford Bridge comme antre, des supporters fidèles, mais pas de domination réelle.

  Roman Abramovich arrive en juin 2003, rachète le club pour 140 millions de livres et change tout. En deux ans, Chelsea est champion d'Angleterre. José Mourinho débarque, avec son imperméable et son insolence légendaire, et construit une machine défensive qui écrase la <a href='/competitions/premier-league'>Premier League</a> deux années de suite en 2005 et 2006. John Terry, capitaine mur, Frank Lampard machine à buts, Didier Drogba force de la nature. Une équipe de guerriers.

  Drogba et la nuit de Munich

  Didier Drogba mérite un paragraphe entier. L'Ivoirien est peut-être le joueur le plus décisif dans les grands moments de l'histoire de ce club. Pas le plus technique, pas le plus élégant. Mais le plus déterminant quand ça compte. Finale de <a href='/competitions/champions-league'>Champions League</a> 2008 perdue contre Manchester United aux tirs au but, il est là. Finale de FA Cup, il marque. Et puis cette nuit du 19 mai 2012 à Munich, contre le Bayern, en finale de Champions League.

  Chelsea est dominé toute la soirée. Menés 1-0 à la 83e minute, éliminés sur le papier. Et Drogba reprend un corner de la tête pour égaliser à la 88e. Prolongations. Tirs au but. Cech arrête Robben, Drogba marque le penalty décisif. Chelsea champion d'Europe pour la première fois de son histoire. Dans l'antre du Bayern, contre toute attente, dans le chaos total.

  C'est Chelsea. Pas le plus beau, pas le plus dominant. Mais là au bout.

  Le chaos Boehly : une expérience sociologique

  Quand Abramovich est contraint de vendre le club en 2022 à cause des sanctions liées à la guerre en Ukraine, Todd Boehly et son consortium américain reprennent les rênes. Ce qui suit est une expérience unique dans l'histoire du football professionnel.

  En trois saisons, Chelsea dépense plus d'un milliard d'euros en transferts. Enzo Fernandez, Moises Caicedo, Nicolas Jackson, João Pedro, des dizaines d'autres. Les entraîneurs se succèdent à un rythme industriel : Tuchel, Potter, Frank Lampard en intérim, Pochettino, Maresca, et maintenant Liam Rosenior cette saison. Chaque changement remet les compteurs à zéro. L'effectif est pléthorique, les joueurs prêtés dans toute l'Europe se comptent par dizaines.

  Le résultat ? Chelsea est le club le plus déficitaire de l'histoire du football anglais à l'issue de la saison dernière. Et sixième de <a href='/competitions/premier-league'>Premier League</a> cette saison, avec João Pedro qui marche sur la compétition avec 18 buts. En <a href='/competitions/champions-league'>Champions League</a>, ils ont croisé le PSG en huitièmes de finale. Résultat : 5-2 à Paris, 3-0 à Stamford Bridge. Elimination nette.

  "Ils changent plus d'entraîneur que de maillots." C'est vrai. "Aucune identité, juste des cycles." C'est vrai aussi. Et pourtant, le club est sixième d'Angleterre avec un effectif qui vaut une fortune et un buteur qui cartonne. L'absurde a ses propres règles.

  Terry, Lampard, les guerriers de Stamford Bridge

  Au-delà du chaos financier récent, Chelsea a une vraie culture de guerrier qui vient de ses joueurs emblématiques. John Terry, capitaine intraitable, défenseur qui laissait son corps au sol sans jamais se plaindre. Frank Lampard, milieu de terrain avec un sens du but exceptionnel, 211 buts sous le maillot bleu, record absolu du club. Et Drogba, déjà évoqué, qui personnifie mieux que quiconque l'ADN de ce club : pas gracieux, mais décisif.

  Ces joueurs ont forgé quelque chose. Une mentalité de ne jamais abandonner, de sortir les trophées même quand tout semble perdu. La finale de 2012 contre le Bayern en est le symbole parfait. Dominés, dos au mur, et vainqueurs quand même.

  L'identité de l'ouest de Londres

  Chelsea, c'est Stamford Bridge dans le quartier de Fulham, l'un des plus chics de Londres. Des supporters qui ont la réputation d'être exigeants, parfois froids avec les joueurs qui ne donnent pas satisfaction, mais qui savent aussi créer une atmosphère quand le club performe.

  Ce n'est pas Anfield, ce n'est pas la chaleur populaire de certains clubs anglais. C'est autre chose : une exigence de West London, une culture de gagner sans excuses, une identité de "bad boys" construite sur des décennies de résultats obtenus par tous les moyens.

  Ce que Chelsea représente en 2026

  Un club en transition permanente. Liam Rosenior, le dernier entraîneur en date, essaie de donner une cohérence à un effectif trop large et trop jeune pour être optimal immédiatement. João Pedro confirme son potentiel, Cole Palmer continue d'être l'un des joueurs les plus techniques d'Angleterre.

  Le projet Boehly est chaotique, coûteux, critiquable sur la forme. Mais Chelsea reste dans le top 6 anglais, joue la <a href='/competitions/champions-league'>Champions League</a>, et dispose d'un effectif qui, quand il clique vraiment, peut battre n'importe qui. C'est peut-être ça, l'identité Chelsea au fond : le chaos comme méthode, et les trophées comme justification.

manchester-city: |
  Manchester City : La machine parfaite que personne n'arrive à aimer.

  Il y a un problème avec Manchester City. Le club joue le meilleur football de l'histoire de la <a href='/competitions/premier-league'>Premier League</a> depuis dix ans. Il a révolutionné le jeu collectif, produit des saisons de domination que personne n'avait jamais vues en Angleterre, soulevé des trophées en série. Et malgré tout ça, quand City gagne, le reste du monde hausse les épaules.

  Pas de frisson collectif. Pas de communion mondiale. Juste le constat froid d'une machine qui tourne. C'est le paradoxe City : être le meilleur club de sa génération et le club le moins aimé de sa génération en même temps.

  Avant les pétrodollars : le vrai passé de City

  La caricature du "club en plastique sans histoire" est injuste et inexacte. Manchester City existe depuis 1880. C'est l'un des plus vieux clubs professionnels d'Angleterre. Il a ses propres légendes, ses propres moments douloureux, ses propres supporters fidèles qui ont suivi le club en deuxième division dans les années 1990 et 2000.

  Le derby de Manchester est l'un des plus vieux et des plus intenses du football anglais. United a longtemps dominé la ville, et les supporters de City ont vécu dans cette ombre pendant des décennies. Ce n'est pas une fanbase de circonstance, c'est une communauté avec une vraie culture, une vraie douleur historique, et une vraie joie de ce qui s'est passé depuis 2008.

  Ce qu'Abu Dhabi a changé, c'est l'échelle. Pas l'existence du club.

  Guardiola et la révolution tactique

  Pep Guardiola arrive en 2016 depuis le Bayern Munich, lui qui avait déjà révolutionné le Barça et l'Allemagne. Ce qu'il fait à City dépasse les trophées. Il redéfinit ce que le football de possession peut donner à son niveau de sophistication maximal.

  Les concepts qu'il développe à City, les rotations positionnelles, le pressing coordonné, les latéraux qui montent comme des ailiers, le faux neuf, les transitions ultra-rapides, deviennent des références mondiales. Des entraîneurs du monde entier étudient les séances City comme des étudiants en architecture étudient Le Corbusier.

  Six titres de <a href='/competitions/premier-league'>Premier League</a> sous Guardiola à City. Et en 2023, le Graal : la <a href='/competitions/champions-league'>Champions League</a>. Complétant un triplé historique avec la FA Cup et la Premier League. Dans la finale à Istanbul contre l'Inter, City gagne 1-0 sur un but de Rodri. Propre, maîtrisé, implacable. Exactement comme la saison entière.

  "Parfaits, mais chiants." Oui, parfois. Parce que regarder quelque chose de parfaitement exécuté, c'est admirable mais pas toujours palpitant. La beauté de City n'est pas celle d'un solo de guitare, c'est celle d'une partition d'orchestre parfaitement dirigée. Certains trouvent ça transcendant. D'autres s'endorment.

  Haaland, le robot scandinave

  Erling Haaland arrive à City en 2022 depuis Dortmund pour 60 millions d'euros. Ce qui suit est presque irréel. Première saison : 52 buts toutes compétitions confondues. Record absolu de <a href='/competitions/premier-league'>Premier League</a> avec 36 buts en une saison. Un être humain qui score à une cadence qui appartient normalement aux jeux vidéo sur mode facile.

  Haaland ne ressemble pas aux joueurs de Guardiola. Il ne joue pas le football de possession fluide et technique que City pratique. Il attend, il s'infiltre, et il marque. Une passe, un but. Deux passes, deux buts. Il est à City ce qu'un marteau piqueur est à une cathédrale gothique : pas esthétiquement cohérent avec l'ensemble, mais terriblement efficace pour le travail de fond.

  Cette saison encore, malgré une équipe en transition après les départs de De Bruyne et Walker, Haaland continue de marquer. City est deuxième de <a href='/competitions/premier-league'>Premier League</a>, à cinq points d'Arsenal. La machine tourne, même dans les moments de "crise".

  La saison de la transition

  Parce qu'il faut le dire : 2025-2026 est une saison moins dominatrice que les précédentes. Kevin De Bruyne est parti. Kyle Walker aussi. Deux figures emblématiques, deux joueurs qui incarnaient quelque chose de l'ère Guardiola. La presse parle de "crise d'identité" à City, Guardiola lui-même a prolongé son contrat dans des conditions qui ont surpris les observateurs.

  En <a href='/competitions/champions-league'>Champions League</a>, l'élimination en huitièmes contre le Real Madrid laisse un goût amer. Valverde claque un triplé, City s'incline 3-0 à Santiago Bernabeu. Même les machines ont leurs pannes. Mais City a quand même gagné la League Cup contre Arsenal en finale, 2-0 en mars. La machine à soulever des trophées ne s'arrête jamais totalement.

  Le problème émotionnel

  C'est là que tout se joue. City peut être admiré, étudié, respecté. Mais être ému par City, c'est plus difficile. Peut-être parce que la domination est trop systématique pour créer de la surprise. Peut-être parce que l'argent d'Abu Dhabi a raccourci le chemin vers le succès d'une manière qui enlève quelque chose à la narration. Peut-être parce que Guardiola lui-même, brillant et exigeant, n'a pas le charisme populaire d'un Mourinho ou d'un Wenger.

  Les supporters de City eux vivent quelque chose d'exceptionnel et ils le savent. Ils ont attendu leurs moments de gloire pendant des décennies, et maintenant ils en profitent avec une satisfaction qui mérite d'être respectée.

  Mais pour le reste du monde, City restera probablement "la machine parfaite créée en labo". Admirable. Froide. Et terriblement efficace.

manchester-united: |
  Manchester United : Le roi déchu qui refuse de mourir.

  Il y a des clubs qui sont plus grands que leurs résultats. Manchester United en fait partie. Tu peux les voir finir douzième, perdre contre Bournemouth, changer d'entraîneur tous les six mois, et malgré tout ça, Old Trafford reste le Théâtre des Rêves. L'histoire ne s'efface pas avec une mauvaise saison. Ni avec dix.

  Mais voilà la question qu'on ne peut plus éviter en 2026 : à partir de quand le déclin devient-il définitif ?

  Les Busby Babes et la tragédie de Munich

  Pour comprendre United, il faut commencer par le commencement. Matt Busby arrive comme entraîneur en 1945 et construit quelque chose de unique : une équipe de jeunes joueurs formés au club, les Busby Babes, qui pratiquent un football offensif et courageux qui séduit toute l'Angleterre dans les années 50.

  Le 6 février 1958, le vol charter ramenant l'équipe de Belgrade s'écrase en tentant de décoller de Munich sous la neige. Vingt-trois personnes meurent dont huit joueurs. Duncan Edwards, 21 ans, considéré comme le plus grand espoir du football anglais de son époque. Eddie Colman, 21 ans. Tommy Taylor. Busby lui-même survit de justesse. Cette tragédie reste la plus grande blessure de l'histoire du club, celle qui explique pourquoi Old Trafford n'est pas juste un stade mais un lieu de mémoire.

  Dix ans après, en 1968, Busby construit une nouvelle équipe et remporte la Coupe d'Europe, la première pour un club anglais. Bobby Charlton, survivant du crash, soulève la coupe à Wembley. George Best, Denis Law. Un moment cathartique d'une portée qui dépasse le sport.

  Ferguson : la plus grande histoire du foot anglais

  Sir Alex Ferguson arrive en 1986, le club est en difficulté et lui donne quatre ans pour redresser la barre. Ce qui suit est la plus longue et la plus dominante période de management que le football anglais ait jamais vue. Vingt-sept ans sur le banc, treize titres de champion d'Angleterre, deux <a href='/competitions/champions-league'>Ligues des Champions</a>, cinq FA Cup. Vingt-sept ans.

  Sous Ferguson, United produit des joueurs légendaires. Eric Cantona, le roi d'Old Trafford, dont la présence charismatique transforme une équipe compétente en champion. Roy Keane, capitaine de guerre, milieu le plus intense de sa génération. Scholes, Giggs, les Neville. Et puis la génération 1999 : Beckham, Cole, Yorke, Sheringham, Solskjaer.

  La finale de <a href='/competitions/champions-league'>Champions League</a> 1999 contre le Bayern Munich à Barcelone reste l'un des moments les plus dramatiques de l'histoire du football. United est mené 1-0, en infériorité d'idées, à deux minutes de la fin. Et puis Sheringham égalise à la 91e minute. Et Solskjaer marque à la 93e. Le Bayern, qui avait déjà les mains sur la coupe, regarde le titre lui échapper en l'espace de trois minutes. Complété en une saison unique : <a href='/competitions/premier-league'>Premier League</a>, FA Cup, Champions League. Le triplé.

  Ce moment-là résume United. Jamais mort, jamais battu, jamais résigné.

  L'après Ferguson : le naufrage

  Ferguson part à la retraite en 2013 et ce qui suit est une descente aux enfers qui dure encore. Moyes, Van Gaal, Mourinho, Solskjaer, Rangnick, Ten Hag. Six entraîneurs en dix ans. Six visions différentes, six reconstructions qui ne finissent jamais vraiment.

  Et pendant ce temps, les Glazer, propriétaires américains depuis 2005, ont vidé le club de sa substance financière tout en laissant les infrastructures se dégrader. Old Trafford, ce temple du football, a commencé à montrer des signes de vieillissement alarmants. Des infiltrations d'eau dans les tribunes, des sièges abîmés, une vétusté qui contraste douloureusement avec l'image du club. "Une banque qui joue au foot", disent les supporters les plus amers. Ce n'est pas totalement faux.

  2025-2026 : un sursaut ?

  Cette saison, quelque chose semble différent. Pas radicalement, mais différent quand même. Darren Fletcher sur le banc, un choix surprenant mais qui incarne au moins une connexion réelle avec l'identité du club. Benjamin Šeško recruté pour 76 millions depuis Leipzig, buteur talentueux qui commence à montrer pourquoi. Bryan Mbeumo qui apporte du caractère. Et Bruno Fernandes, toujours là, capitaine qui tire le groupe vers le haut même dans les moments difficiles.

  Troisième de <a href='/competitions/premier-league'>Premier League</a> à ce stade de la saison. Ce n'est pas le titre, mais c'est mieux que les années précédentes. Et ce 2-0 contre City en janvier, victoire dans le derby, rappelle que les vieux démons d'Old Trafford peuvent encore surgir quand le contexte s'y prête.

  Ce qu'Old Trafford représente encore

  Même dans la période creuse, Old Trafford reste quelque chose. 74 000 places, l'une des plus grandes enceintes du football mondial. Un hymne, "Glory Glory Man United", qui résonne dans les tribunes avec une sincérité qu'aucune stratégie marketing ne peut fabriquer. Des générations de supporters qui ont grandi avec Ferguson, qui ont vibré en 1999, qui attendent depuis treize ans que quelque chose ressemble à nouveau à ce qu'ils ont connu.

  Ces supporters méritent mieux que ce qu'ils ont vécu ces dernières années. Et la bonne nouvelle, c'est que les bases d'un rebond semblent se mettre en place. Lentement, maladroitement, mais elles se mettent en place.

  Le géant dort. Mais il respire encore.

liverpool: |
  Liverpool : You'll Never Walk Alone

  Il y a des clubs qu'on admire. Il y a des clubs qu'on respecte. Et puis il y a Liverpool, qui fait quelque chose de différent : il émeut. Des gens qui ne sont pas supporters des Reds, qui n'ont jamais mis les pieds à Anfield, qui n'ont aucun lien avec le Merseyside, et qui te disent quand même qu'entendre YNWA avant un grand match leur donne la chair de poule. Ce n'est pas un phénomène sportif. C'est un phénomène humain.

  Liverpool n'est pas un club. C'est une religion.

  Anfield et l'hymne

  You'll Never Walk Alone. Chanté pour la première fois dans les tribunes d'Anfield en 1963, repris depuis par générations de supporters, devenu l'hymne du club et copié par des dizaines de stades à travers le monde qui essaient de reproduire la même magie sans jamais vraiment y arriver. Parce que la magie n'est pas dans la chanson. Elle est dans ceux qui la chantent, dans l'histoire qui la porte, dans ce que ce club a traversé et représente.

  Anfield gagne des matchs tout seul. Ce n'est pas une expression, c'est une réalité documentée par des décennies de résultats. Des équipes qui arrivent confiantes et repartent brisées, pas seulement par les joueurs mais par l'atmosphère qui écrase tout. 61 000 personnes qui chantent à l'unisson, le Kop debout, les drapeaux qui flottent. Certains soirs, c'est la chose la plus belle du football mondial.

  Shankly, Paisley et les fondations d'une religion

  Bill Shankly arrive à Liverpool en 1959 et trouve un club en deuxième division avec des infrastructures délabrées. Ce qu'il construit en quinze ans est le fondement de tout ce qui a suivi. Pas seulement des titres, bien que les titres soient là, mais une philosophie, une relation avec les supporters, une façon d'être qui transcende le résultat sportif.

  Sa phrase la plus connue, souvent citée : "Le football n'est pas une question de vie ou de mort. C'est beaucoup plus sérieux que ça." Elle résume tout de l'état d'esprit à Liverpool. Ce club se prend au sérieux parce qu'il prend ses supporters au sérieux. Ils méritent la vérité, l'effort, le sacrifice.

  Bob Paisley lui succède et gagne trois Ligues des Champions entre 1977 et 1984. Une domination européenne qui place Liverpool dans le panthéon du football mondial. Kenny Dalglish, Ian Rush, Graeme Souness. Une époque de gloire qui nourrit encore aujourd'hui la fierté de la fanbase.

  Istanbul 2005 : le miracle qui définit tout

  Si tu dois retenir un seul moment de l'histoire de Liverpool, c'est la nuit du 25 mai 2005 à Istanbul. Finale de Champions League contre l'AC Milan. Mi-temps : Liverpool perd 3-0. Gerrard, Carragher, les joueurs sont sous le choc. Dans les tribunes, des supporters qui pleurent. La défaite semble inévitable, totale, humiliante.

  Ce qui se passe ensuite appartient à la légende du sport mondial. Gerrard réduit le score de la tête à la 54e minute. Smicer double d'une frappe à distance à la 56e. Xabi Alonso égalise à la 60e après que Dudek a repoussé son tir initial sur penalty. Trois buts en six minutes. 3-3. Prolongations. Tirs au but. Dudek arrête Shevchenko pour offrir la victoire aux Reds.

  C'est ça, Liverpool. Pas le plus beau, pas le plus dominant. Le plus vivant. Cette capacité à mourir sur le terrain et à ressusciter, à produire des moments qui semblent impossibles et qui arrivent quand même. Le chaos, mais du chaos magnifique.

  Klopp et la résurrection moderne

  Jürgen Klopp arrive en 2015. Ce qui suit est l'une des plus belles histoires du football moderne. Un entraîneur expressif, humain, qui crie sur son banc et serre ses joueurs dans ses bras, qui parle de "pressing" comme d'une idéologie et de football comme d'une joie collective.

  Sous Klopp, Liverpool remporte tout. <a href='/competitions/premier-league'>Premier League</a> en 2020, le premier titre de champion d'Angleterre en trente ans, dans un stade vide à cause du Covid. <a href='/competitions/champions-league'>Champions League</a> en 2019, battant Tottenham en finale. FA Cup, League Cup. Un palmarès complet construit sur un pressing intense, des transitions fulminantes, et Salah, Mané, Firmino qui forment l'une des meilleures attaques de l'histoire du club.

  Klopp part en 2024, laissant derrière lui une équipe qui gagne encore le titre de champion la saison suivante, sous Arne Slot, son successeur néerlandais. Liverpool champion en 2024-2025. Et cette saison, troisième de Premier League avec 63 points, dans une course à trois avec Arsenal et City.

  Salah, la question qui brûle

  Mohamed Salah est en fin de contrat en juin 2026. 18 buts et 12 passes décisives cette saison, toujours décisif à 33 ans, toujours le joueur le plus important de l'attaque des Reds. La question de son avenir empoisonne et passionne en même temps toute la saison. Restera ? Partira ? Pour quel club ?

  Ce feuilleton illustre parfaitement ce qu'Anfield peut faire à un joueur. Salah est arrivé en 2017 comme un bon attaquant recruté de Roma. Il est devenu l'un des meilleurs buteurs de l'histoire de Premier League, transformé par la machine Klopp, sublimé par l'environnement Liverpool. Sans Anfield, il serait resté un grand joueur. Avec Anfield, il est devenu une légende.

  Ce que Liverpool représente vraiment

  Dans un football de plus en plus gouverné par les fonds souverains et les milliards d'État, Liverpool reste quelque chose de rare : un grand club propriété d'un groupe américain certes, mais dont l'identité n'a pas été rachetée. Fenway Sports Group a investi intelligemment sans dénaturer ce qui fait Liverpool. L'âme est intacte.

  "Le dernier grand club qui n'est pas un jouet d'État", comme disent les supporters. La formule est un peu romantique mais elle dit quelque chose de vrai. À Anfield, quand le Kop se lève et que YNWA résonne, ce n'est pas de la communication. C'est de la foi.

  Où voir les matchs de Liverpool ?

  En <a href='/competitions/premier-league'>Premier League</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs de Liverpool sont diffusés en France sur Canal+. Programme TV complet des Reds sur Coup d'Envoi TV.

real-madrid: |
  Real Madrid : La Ligue des Champions est leur jardin, pas le tien

  Il y a un club dans le monde qui joue dans une compétition différente de tous les autres. Pas parce qu'il a plus de talent, pas parce qu'il dépense plus, pas parce que ses joueurs sont physiquement supérieurs. Mais parce qu'il a accumulé depuis soixante-dix ans une relation avec la Ligue des Champions qui dépasse le rationnel. Le Real Madrid ne joue pas la Coupe d'Europe. Il la possède.

  15 titres. Aucun autre club n'en a plus de six. C'est dans un registre différent.

  Le Bernabéu et la mystique blanche

  Commençons par le décor. Le Santiago Bernabéu, Madrid, 81 000 places. Un stade qui a été entièrement rénové ces dernières années et qui est aujourd'hui l'une des enceintes les plus modernes et les plus impressionnantes du monde, avec un toit rétractable, une pelouse qui coulisse, et des équipements qui lui donnent une allure de vaisseau spatial posé en plein coeur de la capitale espagnole.

  Mais ce n'est pas l'architecture qui fait la légende du Bernabéu. C'est ce qui s'y passe. Ces soirs de Champions League où 80 000 personnes retiennent leur souffle, où les adversaires qui entrent dans cet antre sentent quelque chose qu'ils n'ont pas ressenti ailleurs. Une présence. Un poids de l'histoire. La certitude chez les joueurs madrilènes que ce stade a déjà vu l'impossible se produire, et qu'il peut le revoir ce soir.

  Di Stéfano, Puskas et les origines de la domination

  Le Real Madrid domine l'Europe dès la création de la Coupe des Clubs Champions en 1955. Cinq titres consécutifs entre 1956 et 1960, record qui tient encore. Alfredo Di Stéfano, argentin naturalisé espagnol, est le joueur autour duquel tout gravite. Ferenc Puskas, le Hongrois qui a fui son pays et qui régale Madrid de ses buts. La finale 1960 contre Francfort, 7-3, reste l'une des plus belles performances de l'histoire du football européen.

  Ce n'est pas de la nostalgie. C'est la fondation. Le Real Madrid a appris à gagner la C1 avant que la plupart des clubs européens ne comprennent vraiment ce que cette compétition représentait. Et cette culture de gagner en Europe s'est transmise comme un patrimoine génétique de génération en génération.

  Zidane, Ronaldo, Raul et la galactique

  Les années 2000 sont l'ère des Galactiques. Florentino Pérez, revenu à la présidence en 2000, décide de recruter le meilleur joueur du monde à chaque fenêtre de transfert. Figo depuis Barcelone, pour provoquer l'affront. Zidane pour 73 millions d'euros en 2001, record mondial à l'époque. Ronaldo le Brésilien, Beckham, Owen, Robinho.

  Le résultat sportif est mitigé, deux titres de Liga et une seule C1 en 2002. Mais l'impact sur la marque Real Madrid est planétaire. Ce club devient quelque chose de global, une référence culturelle qui dépasse le sport. Et dans les tribunes du Bernabéu, Raul continue de marquer, de guider, d'incarner cette identité blanche sur le terrain pendant que les étoiles défilent autour de lui.

  Les remontadas : quand le Real triche avec les lois du football

  La période 2016-2018 sous Zinedine Zidane entraîneur est la plus dominante de l'histoire récente du club. Trois Champions League consécutives. Jamais fait, jamais reproduit. Cristiano Ronaldo qui marque lors de chaque grande soirée européenne avec une régularité qui confine au surnaturel. Benzema qui construit les combinaisons, Modric qui orchestre.

  Mais ce qui reste dans les mémoires ce ne sont pas les finales gagnées proprement. Ce sont les remontadas. 2022 en particulier. Manchester City mène 1-0 au Bernabéu, à quelques minutes de la fin, en demi-finale retour. Rodrygo marque deux buts en deux minutes. Prolongations. Benzema claque le troisième sur penalty. City, qui pensait être qualifié, rentre chez lui avec rien.

  Avant ça, Chelsea éliminé en quart de finale dans des circonstances similaires. PSG massacré 3-1 au Bernabéu après un match aller pourtant favorable. Cette capacité à ressusciter dans les dernières minutes des matchs européens est devenue une signature. "Tu crois les avoir battus, puis ils te tuent." C'est documenté. C'est réel. Et c'est inexplicable rationnellement.

  Xabi Alonso et la nouvelle ère

  Carlo Ancelotti, quatre saisons au Real dont deux Champions League, part à l'été 2025. Arrivée de Xabi Alonso, 44 ans, qui avait quitté le Bayer Leverkusen champion d'Allemagne. Le symbole est fort : un ancien joueur emblématique du club, formé à la culture Real, qui revient dans son autre maison pour écrire la suite.

  Cette saison, le Real est deuxième de <a href='/competitions/laliga'>Liga</a> derrière le Barça, dans une lutte serrée. En <a href='/competitions/champions-league'>Champions League</a>, ils ont écrasé Manchester City 5-1 sur l'ensemble des deux matchs de huitièmes, Valverde claquant un triplé au Bernabéu lors du match retour. En quart de finale, Bayern Munich se dresse. Les deux clubs ont une longue histoire de confrontations européennes. L'issue est incertaine, mais au Bernabéu, l'incertitude a tendance à se résoudre dans un sens particulier.

  Il y a aussi eu une humiliation en Coupe du Roi, éliminé par Albacete, club de deuxième division espagnole, en janvier. Le Real n'est pas parfait cette saison. Mais personne ne parie contre eux en C1.

  Ce que le Real représente vraiment

  L'arrogance du Real Madrid est souvent critiquée. Le sentiment que le club se croit au-dessus des règles, qu'il attend son dû plutôt que de le mériter, que les arbitres et la fortune lui sourient différemment. Une partie de cette critique est fondée, une partie relève de l'aigreur de ceux qui ont perdu contre eux.

  La vérité, c'est que le Real Madrid a construit sur soixante-dix ans une culture de gagner en Ligue des Champions que personne d'autre ne possède. Pas par chance, pas uniquement par argent, mais par une transmission culturelle réelle, une mentalité forgée dans les grands soirs, une capacité à élever leur niveau quand l'enjeu est maximal.

  Arrogant ? Oui. Justifié ? Aussi.

  Où voir les matchs du Real Madrid ?

  En <a href='/competitions/laliga'>Liga</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs du Real Madrid sont diffusés en France sur beIN Sports et Canal+. Programme TV complet du Real sur Coup d'Envoi TV.

barcelona: |
  FC Barcelone : Més que un club

  Il y a des clubs qu'on supporte. Il y a des clubs qu'on admire. Et puis il y a le Barça, qui appartient à une catégorie à part : les clubs qu'on aime même quand on n'est pas de là-bas. Pas parce qu'ils gagnent, même si ils gagnent beaucoup. Pas parce que leurs maillots sont beaux, même si ils le sont. Mais parce que quelque chose dans l'identité de ce club dépasse le football et parle à quelque chose de plus profond.

  Més que un club. Plus qu'un club. Ce n'est pas un slogan marketing. C'est une réalité historique, culturelle, politique. Et musicale.

  L'Estaca et le Camp Nou

  Avant même de parler football, il y a un son. El cant dels ocells de Pau Casals, et surtout L'Estaca de Lluís Llach, devenu l'hymne officieux du mouvement catalan pour la liberté et repris dans les tribunes du Camp Nou comme un geste de résistance collective. Si tu n'as jamais entendu 90 000 personnes chanter L'Estaca dans ce stade, tu ne peux pas comprendre ce que c'est.

  Ce son, pour ceux qui l'ont entendu en vrai ou même à travers un écran, reste gravé. Il parle de quelque chose qui n'a rien à voir avec un résultat sportif. Il parle d'appartenance, d'identité, de fierté d'un peuple qui a toujours défendu sa langue et sa culture contre vents et marées. Avoir un siège au Camp Nou et y faire une saison entière, c'est un de ces rêves que le football peut offrir, pas pour voir des buts mais pour vivre quelque chose d'unique.

  Le Camp Nou est d'ailleurs en pleine rénovation en ce moment, le Barça jouant ses matchs à l'Estadio Olímpic Lluís Companys pendant les travaux. La maison est temporairement fermée, mais l'âme du club ne se loge pas dans les murs. Elle se loge dans les gens qui le suivent.

  Cruyff et l'invention d'une philosophie

  Johan Cruyff arrive à Barcelone comme joueur en 1973 et comme entraîneur en 1988. Ces deux passages définissent ce que le Barça sera pour les décennies suivantes. En joueur, il incarne le football total néerlandais, ce jeu de possession, de mouvement, d'intelligence collective où chaque joueur peut jouer partout. En entraîneur, il crée la Dream Team qui gagne la première Ligue des Champions de l'histoire du club en 1992 à Wembley, et surtout il codifie une philosophie de jeu qui sera transmise de génération en génération.

  Le fameux 4-3-3 de Barcelone. La possession comme principe fondamental. Le pressing coordonné. La construction depuis l'arrière. Et surtout l'idée que le football beau et le football efficace ne sont pas opposés, qu'on peut gagner en jouant bien, et que gagner autrement serait trahir quelque chose d'essentiel.

  "On préfère perdre avec nos idées que gagner comme des bouchers." Cette phrase-là, elle vient de Cruyff. Et elle résume tout.

  La Masia, la vraie force du club

  Le Real Madrid achète des Ballons d'Or. Le Barça les fabrique. Cette vérité tient depuis quarante ans. La Masia, le centre de formation barcelonais créé en 1979, a produit Xavi, Iniesta, Messi, Busquets, Puyol, Victor Valdés, Pedro. Une génération entière de joueurs formés dans la même philosophie, nourris au même style de jeu depuis l'âge de huit ou dix ans, et qui arrivent en équipe première en parlant le même langage footballistique sans avoir besoin d'apprendre.

  C'est le miracle de la Masia. Pas le talent individuel, bien que le talent soit là. Mais la cohérence collective, cette façon de jouer qui s'est transmise comme un patrimoine de génération en génération. Les clubs du monde entier ont essayé de copier ce modèle. Personne n'y est vraiment arrivé.

  Guardiola 2008-2012 : le sommet de l'art

  Si tu demandes à n'importe quel passionné de football quel est le plus beau jeu collectif qu'il ait jamais vu, la réponse est souvent la même : le Barça de Guardiola entre 2008 et 2012. Messi, Xavi, Iniesta, Busquets, Villa, Pedro. Un tiki-taka poussé à son niveau de sophistication maximal, une possession qui confine à 70, 75% du ballon, des adversaires qui courent après une ombre.

  Deux Ligues des Champions, trois Liga, deux Coupes du Roi. Et des performances contre Manchester United en finale, contre le Real Madrid en demi-finale, contre Arsenal, contre Chelsea, qui restent des références absolues de ce que le football peut produire à son niveau le plus élevé.

  Guardiola part en 2012. Il ne reviendra jamais au Barça comme entraîneur, et le club n'a jamais vraiment retrouvé ce niveau de cohérence. Des années difficiles, des crises financières graves, Messi qui s'en va en 2021 dans les larmes parce que le club ne peut plus se permettre de le payer, des épisodes honteux d'espionnage sur les arbitres et les adversaires. Le club le plus pur du football mondial qui se découvre très humain dans ses mauvais moments.

  Messi, l'argument définitif

  Lionel Messi a joué au Barça de 2004 à 2021. Dix-sept ans. 672 buts. Le plus grand joueur de l'histoire du football, formé à la Masia à 13 ans, révélé par Rijkaard, sublimé par Guardiola, et qui a porté ce club sur ses épaules pendant une décennie. Son départ en pleurs en conférence de presse à l'été 2021, contraint par les dettes du club, reste l'un des moments les plus tristes de l'histoire du football moderne.

  Lamine Yamal et la génération qui arrive

  Cette saison 2025-2026, le Barça est premier de <a href='/competitions/laliga'>Liga</a> sous Hansi Flick. Et la raison principale s'appelle Lamine Yamal. 18 ans. 21 buts en Liga à cette heure de la saison. Un gamin né à Esparreguera, formé à la Masia dès l'enfance, qui régale les tribunes de dribbles impossibles et de buts de grande classe. Il a terminé deuxième du Ballon d'Or 2025, à 18 ans.

  Le Barça reproduit ce qu'il sait faire : prendre un enfant, lui enseigner sa philosophie, et voir émerger quelque chose d'exceptionnel. Avec Fermín López, Pedri qui revient de blessure, Marc Bernal, Raphinha qui cartonne, et Lewandowski toujours décisif, c'est une équipe qui joue le football que Cruyff aurait voulu voir. En <a href='/competitions/champions-league'>Champions League</a>, ils ont écrasé Newcastle 7-2 à domicile en huitièmes. En quarts, l'Atlético de Madrid les attend.

  Où voir les matchs du Barça ?

  En <a href='/competitions/laliga'>Liga</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs du FC Barcelone sont diffusés en France sur beIN Sports et Canal+. Programme TV complet du Barça sur Coup d'Envoi TV.

atletico-madrid: |
  Atlético Madrid : La guerre permanente

  Il y a une scène qui résume parfaitement l'Atlético Madrid. Diego Simeone qui sort du banc, veste noire, mâchoire serrée, qui gesticule vers ses joueurs comme s'il les envoyait au combat. Pas à un match de football. Au combat. Et ses joueurs qui l'entendent, qui se relèvent d'un duel qu'ils ont perdu, et qui repartent mordre encore.

  Ce club ne joue pas au foot de la même façon que les autres. Il fait la guerre.

  Les Colchoneros : l'identité du peuple

  Atlético Madrid, les Colchoneros, les Matelas. Ce surnom vient de la couleur rouge et blanche de leurs maillots qui rappelait à l'origine les matelas de l'époque. Pas le surnom le plus glamour du football mondial. Mais assumé avec fierté par des supporters qui ont toujours su qu'ils n'étaient pas le club de l'aristocratie madrilène.

  Le Real Madrid, c'est le palais. L'Atlético, c'est la rue. Dans une ville divisée entre les deux clubs, chacun a sa culture, son quartier d'âme, son rapport différent au football. Les fans de l'Atlético n'ont jamais voulu être ceux du Real. Ils ont voulu être ce qu'ils sont : le club du peuple de Madrid, celui qui souffre, qui se bat, qui refuse de s'incliner même quand tout semble perdu.

  Cette identité, elle est réelle. Pas du marketing. Pas du storytelling inventé par une agence de communication. Elle se construit sur des décennies de matchs joués sans filet, de remontées improbables, de défaites cruelles et de victoires arrachées au bout des tripes.

  Simeone, le prophète argentin

  Diego Simeone arrive à l'Atlético en décembre 2011. Ce qu'il construit depuis est l'une des plus grandes histoires d'entraîneur-club de l'histoire du football moderne. Pas parce qu'il gagne tout, parce que le Real et le Barça l'en empêchent souvent. Mais parce qu'il a transformé une philosophie de jeu en religion collective.

  Le Cholo ne te vend pas du rêve. Il te vend de la sueur. Son Atlético défend à onze, presse à onze, souffre à onze, gagne à onze. Pas de star individuelle qui fait sa sauce dans son coin, pas de joueur exempté des tâches défensives parce qu'il est trop cher. Tout le monde court, tout le monde se bat, tout le monde sert le collectif.

  "Le football, c'est la guerre, pas un défilé de mode." C'est l'esprit Simeone. Et ses joueurs le comprennent, ou ils partent. Il n'y a pas de mi-chemin dans cette vision-là.

  Cette saison, il gagne à domicile à Barcelone en quart de finale de Champions League pour la première fois de sa longue carrière sur ce banc. Un symbole.

  2014 : le titre qui valait tout

  La saison 2013-2014 est la référence absolue de l'Atlético moderne. Champion d'Espagne après dix-huit ans sans titre, en arrachant le trophée lors de la dernière journée face au FC Barcelone. Finale de Champions League contre le Real Madrid au Stade de la Luz à Lisbonne. L'Atlético mène 1-0 à la 89e minute. À 60 secondes du titre européen le plus improbable de l'histoire récente.

  Sergio Ramos égalise de la tête. Prolongations. 4-1 pour le Real. Une cruauté rare.

  Ce soir-là résume tout l'Atlético. Le club qui ose rêver, qui se bat jusqu'au bout, qui est à deux doigts de l'impossible, et qui voit le destin se retourner contre lui dans les dernières secondes. Et qui revient quand même la saison suivante, et celle d'après, parce que Simeone ne plie pas.

  Les armes de Simeone

  Ce qui rend l'Atlético particulier tactiquement, c'est la cohérence. Des blocs défensifs organisés, compacts, qui ne laissent pas d'espaces dans le dos. Un pressing coordonné qui force les adversaires à l'erreur. Et une efficacité offensive létale en contre-attaque : peu de possession, mais des transitions rapides et des finisseurs décisifs.

  Cette saison, Julián Álvarez est le symbole de cette efficacité. 17 buts en Liga, quatre décisifs, champion du monde argentin qui a choisi l'Atlético pour se sublimer. Griezmann toujours là, Lookman qui apporte sa vitesse, Giuliano Simeone, le fils du coach, qui trace sa place dans l'équipe à force de travail. L'Atlético excelle dans les matchs serrés : 8 victoires par un seul but d'écart cette saison en Liga, record de la compétition. La maîtrise des fins de match de Simeone en chiffres.

  En <a href='/competitions/champions-league'>Champions League</a>, le 8 avril à l'Estadio Olímpic en quart de finale aller, l'Atlético réalise quelque chose de rare. Barcelone domine, l'Atlético souffre, un rouge pour Cubarsí change le match. Julián Álvarez transforme le coup franc en but somptueux dans la lucarne. Sorloth double la mise. 2-0. Victoire historique pour Simeone à Barcelone.

  Le Metropolitano : la forteresse

  Le Wanda Metropolitano, 70 000 places, inauguré en 2017. Un stade moderne, impressionnant, avec une atmosphère qui n'a rien à voir avec l'intimité de l'ancien Vicente Calderón mais qui génère sa propre ferveur. À domicile cette saison, l'Atlético a perdu une seule fois en 13 matchs. C'est une forteresse.

  Les supporters colchoneros ne sont pas les plus nombreux à Madrid. Les supporters merengues sont plus présents dans la ville. Mais ils compensent largement en intensité. Un match de l'Atlético au Metropolitano, c'est viscéral. Pas clinquant, pas glamour. Viscéral.

  Ce que l'Atlético représente

  Dans un football dominé par les projets d'État et les milliards injectés du jour au lendemain, l'Atlético représente quelque chose d'intéressant : un club qui refuse de jouer le jeu de la domination facile. Pas parce qu'il ne peut pas se le permettre financièrement, il a ses propres ressources. Mais parce que son identité est construite sur autre chose que la possession de balle et le spectacle.

  Tu vas souffrir contre l'Atlético, peu importe ton niveau. C'est une certitude. Et cette certitude-là, elle est rare et précieuse dans le football moderne.

  Où voir les matchs de l'Atlético ?

  En <a href='/competitions/laliga'>Liga</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs de l'Atlético Madrid sont diffusés en France sur beIN Sports et Canal+. Programme TV complet de l'Atlético sur Coup d'Envoi TV.

bayern-munchen: |
  Bayern Munich : La Bundesliga est leur terrain d'entraînement

  Il y a quelque chose de légèrement absurde dans le fait de supporter une équipe en Bundesliga qui n'est pas le Bayern Munich. Tu te lèves le matin, tu regardes le classement, et tu te dis que si tu fais une très bonne saison, tu finiras peut-être deuxième. Depuis 2013, le Bayern a été champion d'Allemagne onze fois consécutives avant la parenthèse Leverkusen en 2024. Onze. Une décennie entière de domination si totale que les supporters des autres clubs ont arrêté d'espérer le titre et ont commencé à jouer pour la qualification européenne.

  Bienvenue en <a href='/competitions/bundesliga'>Bundesliga</a>. Le championnat le plus suivi d'Europe après la Premier League, avec les stades les plus remplis du monde, et un vainqueur connu avant même que la saison ne commence.

  Mia San Mia

  "Mia San Mia." On est qui on est. Cette devise bavaroise est gravée dans l'identité du Bayern Munich depuis des décennies. Pas de la modestie, pas de la fausse humilité. Une affirmation tranquille d'une identité et d'une supériorité assumées. On est le Bayern. On n'a pas besoin de te le prouver, tu le sais déjà.

  Ce club est fondé en 1900, est l'un des clubs les plus riches du monde, et appartient en partie à ses membres, structure coopérative rare dans le football moderne. Les supporters du Bayern ne sont pas des consommateurs passifs d'un spectacle. Ils sont actionnaires, dans l'âme sinon en titre, d'une institution bavaroise qui fait partie de l'identité régionale au même titre que les Alpes, la bière de Munich et le Carnival de Fasching.

  L'Allianz Arena, 75 000 places, rouge de nuit pour les matchs du Bayern, est l'une des enceintes les plus impressionnantes du monde. Et les matchs à domicile font salle comble avec une régularité qui défie la logique quand on considère que le résultat est souvent acquis avant le coup d'envoi.

  FC Hollywood et les drames internes

  La domination sportive du Bayern cache une tradition de chaos interne qui a valu au club son surnom de "FC Hollywood" dans les années 90. L'époque Bosman, Klinsmann, les égos qui s'affrontent, les conférences de presse explosives, les vestiaires en guerre. Lothar Matthäus et Stefan Effenberg qui ne se parlent plus. Des entraîneurs qui arrivent en sauveurs et repartent en six mois.

  Cette culture du drama interne n'a jamais vraiment disparu. Des Uli Hoeness qui se font emprisonner pour fraude fiscale avant de revenir présider le club. Des transferts spectaculaires annulés in extremis. Des joueurs vedettes qui demandent à partir et qui restent. Le Bayern gère ses crises avec la même efficacité qu'il gère ses victoires : tout finit toujours par rentrer dans l'ordre, et le prochain titre de Bundesliga arrive quand même.

  Beckenbauer, Müller, Rummenigge : les fondations

  L'histoire du Bayern est portée par des joueurs qui ont défini des époques entières. Franz Beckenbauer, le Kaiser, libero qui remontait dans le jeu et redéfinissait le poste de défenseur, champion du monde 1974 avec l'Allemagne dans ce même Bayern. Gerd Müller, "der Bomber", record absolu de buts en Bundesliga avec 365 réalisations. Karl-Heinz Rummenigge, élégant et décisif.

  Puis la génération suivante : Oliver Kahn entre les perches, capitaine qui gagnait des matchs à lui seul par sa seule présence. Et Thomas Müller, finalement parti cette saison après dix-sept ans au club, 34 trophées majeurs, le joueur le plus décoré de l'histoire du football allemand. La première saison sans lui depuis 2007. Une ère qui se termine.

  Guardiola et la révolution tactique

  Pep Guardiola arrive au Bayern en 2013 après ses succès au Barça. Trois ans, trois Bundesliga, une demi-finale de Champions League perdue contre le Real Madrid qui lui échappe. Guardiola ne remporte pas la C1 avec le Bayern, ce qui reste la grande cicatrice de cette période. Mais il transforme le jeu collectif de l'équipe de façon durable, introduit des concepts positionnels qui influencent la formation des joueurs pendant des années.

  Sous lui, le Bayern joue un football à 60-70% de possession, pressing intense, transitions rapides. Arjen Robben et Franck Ribéry sur les ailes, Lewandowski en pointe. Une équipe qui a parfois écrasé des adversaires de façon historique : 6-1 contre Porto en C1, des soirées contre les grands d'Europe qui restaient gravées dans les mémoires. De la boucherie propre.

  Le triplé 2020 : la perfection en bulle

  La saison 2019-2020, jouée en partie dans des stades vides à cause du Covid, se conclut par un triplé : Bundesliga, DFB Pokal, <a href='/competitions/champions-league'>Champions League</a>. La finale de C1 contre le PSG à Lisbonne se joue dans une bulle sanitaire, sans supporters. Bayern gagne 1-0 sur un but de Coman, l'ancien joueur du PSG. Hansi Flick sur le banc, Neuer, Kimmich, Goretzka, Davies, Lewandowski qui marque dans tous les matchs. Une équipe parfaite dans une compétition à l'atmosphère fantôme.

  Ce titre-là, gagné sans public, a quelque chose d'ironique pour un club dont la force réside aussi dans l'atmosphère de l'Allianz Arena. Mais la domination était si totale que le contexte ne changeait rien.

  Kompany et la saison 2025-2026

  Vincent Kompany, l'ancien capitaine de Manchester City, sur le banc du Bayern cette saison. Et le résultat est saisissant. Le Bayern commence la saison par 16 victoires consécutives, battant le record absolu des cinq grands championnats européens qu'ils détenaient déjà eux-mêmes depuis 2013. Seize victoires de suite. Personne n'a jamais fait ça en Bundesliga, en Premier League, en Liga, en Serie A ou en Ligue 1.

  Harry Kane, 23 buts en <a href='/competitions/bundesliga'>Bundesliga</a>, meilleur buteur du championnat. L'Anglais qui avait quitté Tottenham pour enfin gagner un titre et qui est en train d'y arriver. Michael Olise qui régale sur l'aile. Kimmich toujours aussi autoritaire au milieu.

  Et en <a href='/competitions/champions-league'>Champions League</a>, le Bayern bat le Real Madrid 2-1 hier soir au Santiago Bernabéu en quart de finale aller. Kompany gagne au Bernabéu. La demi-finale attend.

  La Bundesliga est bien leur terrain d'entraînement. Et l'Europe, ils recommencent à y croire vraiment.

  Où voir les matchs du Bayern ?

  En <a href='/competitions/bundesliga'>Bundesliga</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs du Bayern Munich sont diffusés en France sur beIN Sports et Canal+. Programme TV complet du Bayern sur Coup d'Envoi TV.

borussia-dortmund: |
  Borussia Dortmund : Le meilleur club de transit d'Europe

  Il y a une blague récurrente dans le monde du football à propos du Borussia Dortmund. Chaque été, un journaliste demande à un fan du BVB ce qu'il pense du départ de leur meilleur joueur. Et le fan répond avec une résignation magnifique : "Bah, ça fait partie du projet." Haaland parti au City. Sancho à United. Dembélé au Barça pour 105 millions. Bellingham au Real Madrid. Reus toute sa carrière là-bas, mais les autres partent.

  Dortmund forme les stars mondiales de demain. Et ensuite, elles vont gagner la Champions League ailleurs.

  Ce qui est fascinant, c'est que malgré tout ça, les 80 000 supporters du Signal Iduna Park sont là, debout, chaque week-end. Même quand ça perd. Même quand le meilleur joueur vient de signer au Bayern. Le Mur Jaune ne bouge pas.

  La Ruhr et ses racines

  Dortmund c'est la Ruhr, l'ancienne région industrielle de l'Allemagne de l'Ouest. Mines de charbon, aciéries, ouvriers. Un tissu social dense, une culture ouvrière profonde, une fierté régionale qui n'a pas grand-chose à voir avec le glamour munichois. Le Borussia Dortmund est fondé en 1909, dans cette ville ouvrière, et il a gardé cette identité populaire malgré toutes les transformations du football moderne.

  Là où le Bayern est une institution impeccablement gérée, Dortmund est un club qui a failli mourir. En 2002, le BVB se retrouve au bord de la faillite après des investissements inconsidérés dans des joueurs trop chers. La cotation en bourse du club en 2000, supposée apporter des fonds, a surtout créé des obligations que le club ne pouvait pas honorer. Dortmund frôle la relégation comptable, les supporters sauvent le club en rachetant des actions, en remplissant le stade quand tout allait mal. Cette histoire de sauvetage collectif est fondatrice. Elle explique pourquoi le lien entre ce club et ses fans est d'une nature différente.

  Le Signal Iduna Park : la cathédrale du football populaire

  81 365 places. Le plus grand stade d'Allemagne. Et dans ce stade, la Südtribüne, le Mur Jaune : 25 000 places debout derrière le but, la plus grande tribune debout d'Europe. 25 000 personnes en jaune et noir qui chantent, qui sautent, qui créent une pression sonore et visuelle qui fait plier les adversaires avant même que le match commence.

  Les jours de grande affluence, avant un grand match européen, la vue depuis le terrain est inoubliable. Un mur humain jaune qui vibre. Les caméras du monde entier se braquent dessus parce que ça ressemble à rien d'autre dans le football mondial. Pas les ultras italiens dans leurs virages, pas la ferveur anglaise dans ses stades historiques. Quelque chose d'unique, de massif, de beau.

  Le Mur Jaune mérite une Ligue des Champions. C'est ce que tout supporter du BVB te dira. Et ils n'ont pas tort.

  Klopp 2008-2015 : les années de gloire

  Jürgen Klopp arrive à Dortmund en 2008 et construit en deux ans une équipe qui va secouer le football allemand et européen. 2011 et 2012 : doubles champions d'Allemagne consécutifs. Lewandowski, Reus, Götze, Hummels, Gündogan. Une équipe jeune, affamée, qui joue un gegenpressing intense et magnétique qui inspira une génération entière d'entraîneurs.

  La finale de <a href='/competitions/champions-league'>Champions League</a> 2013 à Wembley contre le Bayern Munich reste le sommet douloureux de cette époque. Dortmund perd 2-1 sur un but de Robben à la 89e minute. Si proche. Une finale perdue dans les dernières secondes contre le voisin et rival. La cruauté parfaite pour un club qui a l'habitude de voir les grandes occasions lui échapper.

  Mais ces années Klopp ont quelque chose d'irremplaçable. Une identité de jeu, une énergie collective, une façon de jouer sans filet qui faisait de chaque match un événement. Les adversaires arrivaient à Dortmund et repartaient épuisés, physiquement et mentalement.

  La machine à former et à vendre

  Voilà le vrai modèle économique du BVB, assumé et documenté. Le club recrute des jeunes talents à des prix raisonnables, les développe dans un environnement de haut niveau avec une pression saine, et les revend quand ils atteignent leur pleine valeur.

  Ousmane Dembélé : recruté de Rennes pour 15 millions, revendu au Barça pour 105 millions plus 42 de bonus. Erling Haaland : recruté pour 20 millions de Salzbourg, revendu à City pour 60 millions. Jude Bellingham : recruté pour 25 millions de Birmingham, revendu au Real Madrid pour 103 millions. Jadon Sancho : recruté pour 8 millions de l'académie de Manchester City, revendu à United pour 85 millions.

  Quatre joueurs, plus de 300 millions de bénéfices nets. C'est le modèle Dortmund. Pas de la naïveté, pas de la résignation. Une stratégie cohérente qui permet au club de rester compétitif sans les ressources du Bayern ou des clubs d'État du Golfe.

  Cette saison : difficile mais debout

  La saison 2025-2026 est compliquée. Niko Kovac sur le banc après une série de changements d'entraîneurs. Troisième de <a href='/competitions/bundesliga'>Bundesliga</a> avec 49 points, loin derrière le Bayern qui écrase tout. Éliminé en <a href='/competitions/champions-league'>Champions League</a> par l'Inter Milan. Les résultats ne sont pas à la hauteur des ambitions.

  Mais le Signal Iduna Park est toujours plein. Le Mur Jaune chante toujours. Les jeunes joueurs continuent d'arriver et de se développer. La saison prochaine, quelqu'un d'autre partira, et quelqu'un d'autre arrivera. C'est le cycle Dortmund.

  Ce que le BVB représente

  Dans un football dominé par les projets sans âme et les clubs rachetés par des fonds souverains, Dortmund représente quelque chose de précieux : un club authentiquement populaire, avec une base de supporters qui a sauvé son club de la faillite, qui remplit le plus grand stade d'Allemagne semaine après semaine, et qui continue de croire malgré les désillusions répétées.

  Trop gentils pour gagner sur la durée ? Peut-être. Mais personne ne doute de leur amour du football.

  Où voir les matchs de Dortmund ?

  En <a href='/competitions/bundesliga'>Bundesliga</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs du Borussia Dortmund sont diffusés en France sur beIN Sports et Canal+. Programme TV complet du BVB sur Coup d'Envoi TV.

inter: |
  Inter Milan : La Pazza Inter

  Il existe une expression en Italie qui résume à elle seule des décennies de football à San Siro. "Pazza Inter." L'Inter folle. Pas folle dans le sens de désorganisée ou incompétente. Folle dans le sens littéral : imprévisible, capricieuse, capable de te faire vivre le meilleur et le pire dans la même semaine, parfois dans le même match.

  Être Interiste, c'est être masochiste. Et l'accepter avec fierté.

  Milano et la rivalité éternelle

  L'Inter est fondée en 1908, précisément à cause d'une dissidence au sein de l'AC Milan. Un groupe de membres, las des restrictions imposées sur les joueurs étrangers, quitte le club et crée "Football Club Internazionale Milano." Le nom dit tout : international, ouvert, pluriel. Là où le Milan voulait des joueurs locaux, l'Inter voulait le monde entier.

  Cette identité cosmopolite est restée. L'Inter a toujours recruté sur tous les continents, accueilli des joueurs de toutes nationalités, construit ses succès sur une diversité culturelle assumée. Le drapeau noir et bleu de l'Inter ne représente pas un territoire, il représente une philosophie d'ouverture.

  Le derby della Madonnina contre le Milan, joué dans le même stade, le Meazza, est l'un des rendez-vous les plus intenses du calendrier footballistique mondial. Deux clubs, deux identités, une même maison. La tension est permanente, les résultats souvent imprévisibles, et les retournements de situation légion. Parfaitement interiste, en somme.

  Mourinho 2010 : le chef-d'œuvre

  La saison 2009-2010 reste le sommet absolu de l'Inter moderne. José Mourinho, le Portugais qui venait de remporter deux championnats avec Chelsea et Porto, prend en main une équipe qui a déjà du talent mais manque de direction. En quelques mois, il en fait une machine.

  Triplé historique : Scudetto, Coppa Italia, Ligue des Champions. Le deuxième de l'histoire du club après celui d'Helenio Herrera en 1965. La finale de C1 contre le Bayern Munich à Madrid, victoire 2-0. Diego Milito, l'attaquant argentin, marque les deux buts. Une performance de finisseur d'une précision froide, au moment où tout se joue.

  Et Mourinho reste, pour les Interistes, quelque chose qui ressemble à un dieu en imperméable. Sa conférence de presse après la victoire contre le Barça en demi-finale, les bras en croix devant le Camp Nou, est l'une des images les plus iconiques du football moderne.

  Les grandes épopées et les grandes chutes

  La Pazza Inter ne se limite pas aux victoires. Elle se vit aussi dans les défaites qui font mal d'une façon particulièrement créative. La finale de C1 2022-23 contre City, perdue 1-0 sur un but de Rodri, reste une blessure récente. L'Inter avait bien joué, avait mérité mieux, mais le football ne récompense pas toujours la justice. Et la finale de 2024-25 contre le PSG, le 5-0 historique à Munich, est une humiliation d'une ampleur rare. Pazza Inter dans toute sa gloire inverse.

  Chivu, les Nerazzurri aujourd'hui

  Cette saison 2025-2026, l'Inter est premier de <a href='/competitions/serie-a'>Serie A</a> avec 68 points. Cristian Chivu sur le banc, l'ancien défenseur roumain légendaire du club, revenu comme entraîneur après ses premières expériences de coaching. Un choix sentimental mais qui fonctionne sportivement.

  Lautaro Martínez, capitaine argentin champion du monde, 18 buts en Serie A, toujours décisif dans les grands moments. Barella au milieu, Çalhanoglu qui orchestre, Dimarco sur le flanc. Une équipe solide, collective, qui domine le championnat italien avec autorité.

  En <a href='/competitions/champions-league'>Champions League</a>, l'Inter a éliminé Dortmund en huitièmes avant de tomber face au PSG. Le PSG champion d'Europe qui reste une référence difficile à égaler pour le moment. Mais l'Inter est là, en tête de Serie A, et la Pazza Inter se réserve toujours quelques surprises pour la fin de saison.

  San Siro et l'identité Nerazzurra

  Le Stadio Giuseppe Meazza, dit San Siro, est l'une des cathédrales du football mondial. 80 000 places, une architecture qui date des années 30 et qui a été agrandie plusieurs fois, un stade qui a vu passer des générations de légendes du football. Ronaldo le Brésilien, Zanetti, Adriano, Ibrahimovic, Ronaldo le Portugais. Des joueurs qui portent des histoires entières.

  Zanetti mérite une mention spéciale. Javier Zanetti, latéral droit argentin, 858 matchs sous le maillot interiste entre 1995 et 2014. Capitaine de toutes les grandes époques, présent dans toutes les crises et tous les triomphes, il reste le symbole absolu de la fidélité à ce club. Il est maintenant vice-président du club. L'Inter sans Zanetti n'est pas tout à fait l'Inter.

  Ce que l'Inter représente

  Dans le football italien qui cherche à se reconstruire après des années de disette européenne, l'Inter est redevenu une référence. Une équipe qui joue bien, un projet cohérent, un entraîneur qui connaît le club de l'intérieur.

  Mais surtout, une identité. La Pazza Inter ne disparaîtra jamais vraiment. Elle est dans l'ADN de ce club, dans la façon dont ses supporters vivent chaque match comme si c'était le dernier, dans cette capacité à basculer du sublime au grotesque en 90 minutes. C'est pour ça qu'on aime l'Inter. Pas malgré le chaos. Grâce à lui.

  Où voir les matchs de l'Inter ?

  En <a href='/competitions/serie-a'>Serie A</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs de l'Inter Milan sont diffusés en France sur beIN Sports et Canal+. Programme TV complet des Nerazzurri sur Coup d'Envoi TV.

juventus: |
  Juventus : Vincere è l'unica cosa che conta

  Il y a une blague qui circule en Italie depuis des décennies. "Pourquoi la Juventus est le club le plus supporté d'Italie ?" "Parce qu'il y a un train direct de toutes les villes du pays vers Turin." Sous-entendu : les Juventini ne sont pas de vrais locaux, ce sont des supporters de la victoire, des gens qui ont choisi le club qui gagne le plus souvent. C'est dit avec mépris par les supporters des autres clubs. Les Juventini, eux, haussent les épaules. Et ils gagnent quand même.

  Vincere è l'unica cosa che conta. Gagner est la seule chose qui compte. Pas la manière. Pas les critiques. Les trophées.

  La Vieille Dame et son histoire

  La Juventus Football Club est fondée en 1897 à Turin par des lycéens. Elle porte rapidement le surnom de "Vieille Dame", la Vecchia Signora, référence à son statut d'institution ancienne et respectée du football italien. Dès les années 1930, le club enchaîne cinq Scudetti consécutifs sous Carlo Carcano, avec une philosophie d'organisation et de rigueur qui deviendra la marque de fabrique de la Juve : les "Trois S", Simplicité, Sérieux, Sobriété.

  Ce n'est pas un club qui cherche à impressionner. C'est un club qui cherche à gagner. La nuance est importante.

  36 Scudetti, plus que n'importe quel autre club en Italie. Deux Ligues des Champions, en 1985 et 1996. La Copa UEFA. La Coupe des Coupes. Un palmarès qui s'étale sur un siècle et qui place la Juve dans l'élite absolue du football européen.

  La génération Platini et l'ère des champions

  Les années 1980 sont l'âge d'or de la Juventus. Michel Platini, le meilleur joueur européen de l'époque, marque 68 buts en cinq saisons sous le maillot bianconero. Trois Ballons d'Or consécutifs. Autour de lui, Paolo Rossi, Dino Zoff, Claudio Gentile, Gaetano Scirea. Une équipe qui ne joue pas forcément le plus beau football du monde mais qui ne perd presque jamais quand ça compte.

  La finale de la Coupe des Champions 1985 au Heysel est entachée par la tragédie du stade : 39 supporters morts dans des incidents avant le match. La Juventus gagne 1-0 contre Liverpool sur un penalty de Platini dans des circonstances qui laissent une blessure collective impossible à effacer. Ce soir-là, personne ne parle de football.

  Zidane, la décennie dorée des années 1990-2000

  Zinédine Zidane arrive à Turin en 1996, déjà reconnu comme l'un des meilleurs joueurs du monde. Cinq saisons en bianconero, deux finales de Champions League atteintes. Avant de partir au Real Madrid pour 77,5 millions, record mondial de l'époque.

  La Juve des années 90 avec Del Piero, Inzaghi, Davids, Nedved est une machine à titres. Dominatrice en Italie, régulièrement en finale en Europe. Alessandro Del Piero, le capitaine, 705 matchs, 290 buts, reste le symbole absolu de la fidélité et de la classe à la Juventus.

  Le scandale du Calciopoli et la relégation en Serie B

  2006. Le plus grand scandale du football italien éclate. Des écoutes téléphoniques révèlent des conversations entre des dirigeants de clubs et des responsables des arbitres, qui auraient influencé la désignation des arbitres en faveur de la Juventus. Le club est relégué en <a href='/competitions/serie-a'>Serie B</a>, ses deux derniers Scudetti lui sont retirés.

  C'est la chute la plus humiliante de l'histoire récente du club. Mais voilà ce qui est fascinant avec la Juve : ils remontent dès la saison suivante, reconstruisent en deux ans, et enchaînent neuf Scudetti consécutifs entre 2012 et 2020 sous Antonio Conte puis Massimiliano Allegri. Neuf. Une domination aussi totale qu'elle en devenait monotone pour les spectateurs neutres.

  Et en 2023, nouveau scandale : 15 points de pénalité infligés pour fraudes comptables lors de transferts. La Juventus fait appel, la sanction est suspendue, mais l'image est abîmée. Gagner à tout prix implique parfois de jouer avec les règles.

  L'ère récente : reconstruction et patience

  Depuis 2020, la Juve cherche sa nouvelle identité. Ronaldo, recruté pour 117 millions en 2018, n'a pas suffi à ramener la Champions League. Son départ en 2021 laisse un vide. Les saisons Allegri II, Motta, Tudor, puis Spalletti qui arrive cette saison. La Vieille Dame cherche son équilibre entre son impératif historique de gagner et la nécessité de reconstruire un effectif cohérent.

  Cette saison 2025-2026, Luciano Spalletti sur le banc, cinquième de <a href='/competitions/serie-a'>Serie A</a> avec 57 points après victoire 2-0 contre Gênes le 6 avril. À un point de Côme pour la quatrième place et la qualification en Champions League. Les enjeux sont là, même quand les grandes ambitions semblent temporairement mises en veilleuse.

  Jonathan David, recruté depuis <a href='/equipes/lille'>Lille</a>, apporte de l'efficacité offensive. Kenan Yıldız, 20 ans, le joyau turc de la Masia bianconera, fait oublier par éclairs que la Juve sait aussi produire de la beauté. Cambiaso, Bremer, Locatelli. Une équipe de métier qui ne fait jamais de cadeaux.

  Ce que détester la Juve dit sur le football

  La haine de la Juventus est une tradition italienne presque aussi ancienne que le club lui-même. Tout le monde les déteste. Milan, Inter, Naples, Rome, les petits clubs du sud. Ce sentiment collectif n'est pas irrationnel : c'est la réaction naturelle à une institution qui a souvent utilisé toutes ses ressources et influences pour maintenir sa position dominante.

  Mais la vérité est aussi que sans la Juventus, le football italien serait moins intéressant à haïr. Le méchant de l'histoire a toujours une fonction narrative. Et la Vieille Dame remplit ce rôle avec une élégance austère que peu de clubs peuvent revendiquer.

  Fino alla fine. Jusqu'au bout. La devise de la Juventus. Pas "jouons bien", pas "faisons du beau". Jusqu'au bout. C'est tout. Et c'est suffisant.

  Où voir les matchs de la Juve ?

  En <a href='/competitions/serie-a'>Serie A</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs de la Juventus sont diffusés en France sur beIN Sports et Canal+. Programme TV complet de la Vieille Dame sur Coup d'Envoi TV.

napoli: |
  SSC Napoli : Diego, la ville, et cette façon unique d'aimer le foot

  Il y a une anecdote récente qui résume mieux que n'importe quel discours ce que Naples représente dans le football mondial. En décembre 2025, un YouTubeur français de 31 ans aux origines napolitaines, Loris Giuliano, sort un documentaire d'1h16 sur la ville de Naples, son club, sa culture. Pour l'annoncer, il fait tirer un feu d'artifice géant devant la Tour Eiffel, Trocadéro, face à la tour illuminée. Sans autorisation. À 22h un vendredi soir. Les touristes s'arrêtent, les smartphones se lèvent, le ciel s'embrase.

  Il finit en garde à vue 30 heures, écope de 6 mois de prison avec sursis et 6 000 euros d'amende. Interrogé sur la situation, il dit simplement : "Ça m'a calmé."

  C'est napolitain à l'état pur. Faire quelque chose de fou, de beau, de déraisonnable, pour exprimer un amour qu'on ne peut pas contenir. Et assumer les conséquences avec le sourire.

  Une ville avant d'être un club

  Naples n'est pas d'abord un club de foot. C'est une ville. Deux millions et demi d'habitants, le golfe, le Vésuve en arrière-plan, Pompéi à deux pas, une histoire qui remonte aux Grecs et aux Romains, une gastronomie qui a inventé la pizza, une langue à part, le napolitain, que les Italiens du Nord ne comprennent pas toujours.

  Naples a toujours été différente du reste de l'Italie. Le Nord industriel, riche, organisé. Le Sud, et Naples en particulier, avec sa chaleur humaine, sa créativité, son rapport particulier à l'autorité et aux règles. Cette tension Nord-Sud est ancrée dans l'histoire italienne depuis l'Unification. Et le football de Naples en est le reflet direct.

  Quand Naples gagne, ce n'est pas une victoire sportive. C'est une victoire politique, culturelle, symbolique. C'est le Sud qui dit au Nord qu'il existe, qu'il mérite sa place, qu'il peut être le meilleur.

  Diego Armando Maradona

  Il faut parler de lui. Pas de Maradona le joueur, mais de Maradona le dieu de Naples.

  Il arrive en 1984, à 23 ans, pour 12 millions de dollars qui représentent un record mondial à l'époque. Le club est alors une équipe moyenne de Serie A, sans titre, sans prestige national. Ce qui se passe ensuite appartient à la légende absolue du football mondial.

  Deux Scudetti, en 1987 et 1990. Une Coupe UEFA en 1989. Maradona qui porte seul cette équipe vers des sommets qu'elle n'avait jamais envisagés, dans un championnat dominé depuis des décennies par la Juventus, le Milan et l'Inter. Le Sud qui bat le Nord. Naples qui humilie Turin et Milan. Pour une ville qui a toujours vécu avec le sentiment d'être méprisée par le reste du pays, ces titres ont une dimension qui dépasse le sport.

  Quand Maradona meurt en novembre 2020, Naples pleure. Pas comme on pleure un sportif. Comme on pleure un membre de la famille. Des milliers de personnes dans les rues, des fresques murales dans toute la ville, le stade Diego Armando Maradona rebaptisé à son nom. Trente-quatre ans après son passage, son maillot numéro 10 n'a plus jamais été porté par personne au SSC Napoli.

  2023 : la renaissance

  Après des décennies de hauts et de bas, de direction chaotique sous Aurelio De Laurentiis (le producteur de cinéma propriétaire du club), Naples remporte le Scudetto en 2023. Le troisième titre de leur histoire, le premier depuis Maradona en 1990. 33 ans d'attente.

  Khvicha Kvaratskhelia et Victor Osimhen comme leaders. Luciano Spalletti sur le banc. Un football offensif, intense, spectaculaire. Et une célébration dans les rues de Naples qui dure plusieurs jours, une ville qui explose de joie d'une façon que peu d'événements sportifs peuvent provoquer.

  Ce titre, pour les Napolitains, ce n'était pas juste un championnat. C'était une confirmation que l'ère Maradona n'était pas une anomalie, que Naples peut rivaliser avec les grands, que le Sud a sa place au sommet.

  L'ambiance du Maradona

  Le Stadio Diego Armando Maradona, 54 726 places, n'est pas le plus beau stade d'Italie. Il date des années 60, il a été rénové pour la Coupe du monde 1990, mais il porte les marques du temps. Ce n'est pas un stade clinquant comme l'Allianz Arena ou l'Emirates. C'est un stade vivant.

  Et les soirs de grand match, c'est une atmosphère à part entière. Les fumigènes, les chants napolitains, la chaleur humaine qui monte des tribunes. Les tifos préparés par les ultras. Cette sensation que les 54 000 personnes dans le stade vivent chaque match comme si c'était le dernier. Pas par superstition. Par passion.

  "C'est pas un club, c'est une émotion." Cette phrase-là, elle est vraie.

  Antonio Conte et la saison 2025-2026

  Cette saison, Naples est deuxième de <a href='/competitions/serie-a'>Serie A</a> avec Antonio Conte sur le banc, à 7 points de l'Inter. Conte, l'entraîneur qui a fait de l'intensité et du travail défensif une philosophie. McTominay recruté depuis Manchester United, qui carbure et qui régale. Romelu Lukaku en attaque, massif et décisif par intermittence.

  Le 6 avril, Naples bat le Milan 1-0 et grimpe à la deuxième place. La course pour le Scudetto est ouverte, même si l'Inter a de l'avance. Mais à Naples, on sait que tout peut arriver. Et on y croit, toujours, jusqu'au bout.

  Ce que Loris Giuliano a compris

  Revenons à lui une seconde. Loris Giuliano, Montpelliérain de 31 ans aux origines italiennes, 2 millions d'abonnés YouTube. Il aurait pu faire une vidéo normale, une annonce sur Instagram, un post soigné. Il a choisi de faire péter des feux d'artifice illégaux au Trocadéro en costume. Parce que c'est ça, Naples. Pas de demie-mesure. Pas de prudence calculée. L'amour qu'on ne peut pas contenir, qu'on exprime sans demander la permission, et qui finit parfois avec une garde à vue.

  "Napoli est en ligne, enfin," dit-il face à la tour Eiffel illuminée et au ciel en feu. C'est peut-être la plus belle description de ce que Naples fait aux gens qui l'aiment.

  Où voir les matchs de Naples ?

  En <a href='/competitions/serie-a'>Serie A</a> et en <a href='/competitions/champions-league'>Champions League</a>, les matchs du SSC Napoli sont diffusés en France sur beIN Sports et Canal+. Programme TV complet de Naples sur Coup d'Envoi TV.

ajax: |
  AFC Ajax : Le berceau éternel du football total

  Il y a une blague qui circule dans les couloirs de la formation footballistique mondiale. Un entraîneur demande à un jeune joueur : "Où as-tu appris à jouer comme ça ?" Le joueur répond : "À De Toekomst." C'est le centre de formation d'Ajax. Et la blague n'en est pas vraiment une.

  Ajax Amsterdam a, littéralement, appris au monde à jouer au football. Ce n'est pas une exagération. C'est une réalité documentée par soixante ans de générations de joueurs et d'entraîneurs qui ont diffusé leur philosophie aux quatre coins de la planète.

  Rinus Michels, Cruyff et l'invention du football moderne

  Tout commence à la fin des années 1960. Rinus Michels, entraîneur, développe à Ajax ce qu'on appellera le "Voetbal Totaal", le football total. Un système révolutionnaire où chaque joueur peut occuper n'importe quelle position sur le terrain, où la fluidité collective prime sur les rôles figés, où la possession et le pressing sont érigés en principes fondamentaux.

  Johan Cruyff en est le joueur emblématique. Attaquant qui défend, défenseur qui attaque, meneur de jeu qui joue partout. Un footballeur total incarnant une philosophie totale. Sous Michels puis son successeur Stefan Kovacs, Ajax remporte trois Coupes d'Europe consécutives entre 1971 et 1973. Des équipes qui font la démonstration que le football intelligent bat le football physique, que la tactique collective bat le talent individuel isolé.

  Cette philosophie ne reste pas à Amsterdam. Cruyff l'exporte au Barça comme joueur, puis comme entraîneur. Guardiola l'absorbe et la transmet à ses équipes. Le tiki-taka espagnol, le gegenpressing allemand, le jeu de possession de City : toutes ces révolutions tactiques des dernières décennies ont une dette envers le vestiaire d'Ajax de 1971.

  De Toekomst : la fabrique de champions

  Le centre de formation d'Ajax, De Toekomst, "L'Avenir" en néerlandais, est l'un des meilleurs du monde depuis cinquante ans. Pas le plus riche. Pas le plus grand. Mais le plus cohérent dans sa philosophie et dans sa méthode.

  La liste des joueurs formés ici donne le vertige. Johan Cruyff, evidemment. Puis Frank Rijkaard, Marco Van Basten, Clarence Seedorf, Patrick Kluivert, Edgar Davids. Et dans les générations récentes : Wesley Sneijder, Rafael Van der Vaart, Matthijs de Ligt, Frenkie de Jong, Davy Klaassen. Des générations qui arrivent en équipe première en parlant déjà le même langage footballistique.

  Le modèle économique d'Ajax repose sur cette formation. Recruter des gamins de 8 ou 10 ans, les former pendant dix ans à la philosophie du club, les révéler en équipe première, et les vendre au moment de leur pic de valeur. Chaque génération est vendue avant d'avoir pu tout accomplir. Et une nouvelle génération arrive.

  C'est frustrant à regarder de l'extérieur. C'est un modèle de survie économique pour un club qui ne peut pas rivaliser financièrement avec les mastodontes anglais ou espagnols.

  2019 : la dernière grande nuit

  La saison 2018-2019 reste le moment le plus récent où Ajax a rappelé au monde ce qu'il représente. En <a href='/competitions/champions-league'>Champions League</a>, une équipe composée de joueurs formés au club ou achetés pour quelques millions, entraînée par Erik ten Hag, élimine successivement le Real Madrid, la Juventus, et atteint la demi-finale contre Tottenham.

  La victoire au Santiago Bernabeu, 4-1, avec des buts de Tadic et Ziyech. Cristiano Ronaldo éliminé par des gamins d'Amsterdam. La Juventus de Cristiano, Bonucci, Dybala, renvoyée chez elle par un club aux ressources infiniment inférieures. Et en demi-finale, l'incroyable retournement de situation contre Tottenham : Ajax mène 3-2 sur l'ensemble des deux matchs à la 96e minute, et un but de Lucas Moura au bout du temps additionnel envoie Tottenham en finale.

  Ce soir-là, Ajax perd quelque chose d'impossible à quantifier. Pas un match. Une finale qui aurait dû être la leur.

  Mais le football de cette équipe, cet Ajax de 2019, reste une référence de ce que le football collectif intelligent peut produire face à la supériorité financière.

  La crise et le cycle perpétuel

  La saison qui suit, De Ligt et De Jong sont vendus. Puis Ziyech, puis Van de Beek, puis Gravenberch, puis Timber. Chaque été, Ajax perd ses meilleurs joueurs et repart avec des jeunes. C'est le cycle.

  Cette saison 2025-2026 est difficile. Heitinga limogé en novembre après des résultats insuffisants en Eredivisie et en C1. Óscar García prend la suite. Le club n'est pas en tête de l'Eredivisie, éliminé de la <a href='/competitions/champions-league'>Champions League</a> en phase de ligue. Une saison de transition, comme il y en a régulièrement à Amsterdam.

  Mais De Toekomst tourne toujours. Les gamins s'entraînent. Dans deux ou trois ans, une nouvelle génération sera prête. Et quelqu'un, quelque part dans le monde, apprendra encore à jouer au football à la façon d'Ajax.

  Ce qu'Ajax représente

  "Ils apprennent le football aux autres clubs." C'est la vérité. Quand Ajax joue bien, c'est une leçon de football collectif que les autres équipes étudient. Quand Ajax vend ses joueurs, ce sont des ambassadeurs de la philosophie qui partent enrichir d'autres clubs.

  Ajax ne sera probablement plus jamais champion d'Europe. Les écarts financiers sont trop importants. Mais le football moderne lui doit une dette qu'aucun titre ne peut quantifier.

  Où voir les matchs d'Ajax ?

  En Eredivisie, les matchs d'Ajax sont diffusés en France sur beIN Sports. Programme TV complet sur Coup d'Envoi TV.

