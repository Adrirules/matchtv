  SL Benfica : Le géant discret de Lisbonne

  Il y a quelque chose d'injuste dans la façon dont le monde perçoit Benfica. Le club le plus titré du Portugal, l'un des clubs les plus supportés d'Europe avec plus de 14 millions de membres et sympathisants déclarés dans le monde entier, deux Coupes d'Europe en 1961 et 1962, des finalistes répétés des compétitions européennes, une formation qui a produit Eusébio, Figo, Nani, João Félix. Et pourtant, hors du Portugal et des pays lusophones, Benfica reste sous-estimé.

  C'est le sort des clubs d'une petite nation footballistique dans un monde dominé par les grandes ligues. Excellents, réguliers, ambitieux, mais perpétuellement dans l'ombre de ce qui se passe en Angleterre, en Espagne ou en Italie.

  La Luz et son histoire

  L'Estádio da Luz, le Stade de la Lumière, 65 000 places, est l'un des plus beaux stades d'Europe. Inauguré en 2003 pour remplacer l'ancien stade mythique, il accueille régulièrement des demi-finales et finales de grandes compétitions européennes. Lisbonne est une ville de football, et Benfica en est le club du peuple, en opposition permanente avec le Sporting CP et, à distance, avec le Porto du Nord.

  Fondé en 1904, Benfica a traversé tout le XXe siècle portugais, de la dictature de Salazar à la Révolution des Oeillets, en restant le club le plus populaire du pays. L'aigle qui survole le stade avant chaque match est devenu l'un des symboles les plus reconnaissables du football européen.

  Eusébio et les deux Coupes d'Europe

  La grande époque, c'est les années 1960. Eusébio, la Panthère Noire, Mozambicain de naissance, révélé à Benfica à 18 ans. Un attaquant d'une puissance, d'une vitesse et d'une qualité technique qui n'a pas beaucoup d'équivalents dans l'histoire du football. Benfica remporte la Coupe d'Europe des Clubs Champions en 1961 contre le Barça, et en 1962 contre le Real Madrid de Di Stéfano et Puskas, 5-3 en finale avec un Eusébio de gala.

  Ces deux titres restent les sommets absolus du club. Depuis, Benfica a atteint huit autres finales européennes sans en remporter une seule. Huit. C'est ce qu'on appelle poliment une malédiction, et moins poliment "la loi de Murphy portugaise."

  La machine à talents

  Ce que Benfica réussit en matière de formation est remarquable. Joao Felix révélé ici, revendu à l'Atletico pour 126 millions en 2019. Darwin Nunez, vendu à Liverpool pour 75 millions. Ruben Dias, vendu à City pour 68 millions. Bernardo Silva, formé ici avant d'aller s'épanouir à Monaco puis City. Le modèle ressemble à celui d'Ajax : former, révéler, vendre, recommencer.

  Cette saison, Benfica est troisième de Liga Portugal avec 65 points, à 7 points du Porto leader dans une course à trois très serrée. Bruno Lage sur le banc, Otamendi le défenseur argentin champion du monde comme capitaine et leader défensif, Pavlidis meilleur buteur. Un effectif solide qui joue régulièrement la <a href='/competitions/champions-league'>Champions League</a> et qui fait sérieusement parler de lui lors de chaque campagne européenne.

  Le jour où Benfica gagnera une troisième Coupe d'Europe, Lisbonne explosera d'une façon que l'Europe n'a pas vue depuis longtemps.

  Où voir les matchs de Benfica ?

  En <a href='/competitions/champions-league'>Champions League</a>, les matchs de Benfica sont diffusés en France sur Canal+. Programme TV complet sur Coup d'Envoi TV.
