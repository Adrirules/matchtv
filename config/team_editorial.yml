paris-saint-germain: |
  Paris Saint-Germain. Le club qui divise la France, mais qu'on regarde quand même.

  Soyons honnêtes deux secondes. Le PSG, c'est un cheatcode. Un club qui a décidé un beau matin de 2011 que l'argent qatari allait changer la donne du football français, et qui l'a fait. Ibrahimovic, Neymar, Mbappé, des centaines de millions dépensés, une <a href='/competitions/ligue-1'>Ligue 1</a> transformée en championnat à sens unique pendant une décennie. Le PSG a aspiré tous les talents, tous les regards, toute l'attention médiatique. Et ça énerve. Pas qu'un peu.

  Mais voilà le truc (et c'est peut-être un aveu difficile pour certains) : quand le PSG joue bien, on se régale. Vraiment. Parce que quand ils ont de bons joueurs, du beau jeu, et un collectif huilé, c'est du spectacle pur. Et en 2025, ils ont offert quelque chose que personne n'oubliera.

  Le 31 mai 2025 : la nuit où tout a changé

  Il y a des soirs de foot qui dépassent le foot. Le 31 mai 2025 à Munich, l'Allianz Arena, PSG contre l'Inter Milan en finale de la <a href='/competitions/champions-league'>Champions League</a>. Le PSG n'avait jamais gagné cette compétition. Jamais. Malgré les milliards, malgré les stars, malgré les années d'essais. La finale de 2020 contre le Bayern, perdue 1-0 dans une bulle sanitaire à Lisbonne, était restée comme une blessure ouverte.

  Ce soir-là, rien ne s'est passé comme prévu, dans le bon sens du terme. Hakimi ouvre le score à la 12e minute, <a href='/joueurs/d-doue'>Désiré Doué</a> double la mise à la 20e. Doué, 19 ans, gamin sorti de Rennes, auteur d'un doublé et d'une passe décisive en finale de C1. <a href='/joueurs/k-kvaratskhelia'>Kvaratskhelia</a>, <a href='/joueurs/senny-mayulu'>Mayulu</a>. 5-0. Le score le plus large de l'histoire des finales de Champions League. Jamais vu, jamais fait.

  À Paris, les Champs-Élysées ont explosé. Des milliers de gens dans les rues, la Tour Eiffel en bleu et rouge, 110 000 fans au Trocadéro. Et dans cette foule, des scènes impossibles à décrire : des hommes taciturnes, peu expressifs au quotidien, qui pleuraient. Des pères de famille qui criaient que c'était le plus beau jour de leur vie. Des gens qui n'avaient sans doute jamais montré autant d'émotion de leur existence. Ce soir-là, on n'assistait plus à un résultat sportif. On regardait l'histoire d'un club s'écrire en direct. Marquinhos en larmes au micro : "Je pense à tous ceux qui sont passés ici et qui n'ont pas réussi. Thiago Silva, Di Maria." Un moment unique.

  D'où vient ce club ?

  Le Paris Saint-Germain est fondé en 1970, fusion improbable d'un club parisien et d'une section football du Stade Saint-Germain. L'idée : donner enfin à Paris un grand club de football, comme toutes les grandes capitales européennes en avaient. Les débuts sont modestes, la montée en Ligue 1 en 1974, quelques hauts et bas. Le premier grand titre arrive en 1986 avec une Coupe de France. La vraie montée en puissance commence dans les années 90, sous l'ère Canal+ (actionnaire majoritaire à l'époque). C'est l'époque des George Weah, des Valdo, des Rai. Le PSG remporte la Coupe des Coupes en 1996, le premier trophée européen du club, en battant le Rapid Vienne 1-0 à Bruxelles. Une époque dorée, romantique, avant que les finances ne s'effondrent et que le club repasse par une traversée du désert.

  Puis 2011, l'arrivée de QSI. Qatar Sports Investments. Nasser al-Khelaïfi prend les rênes. Et là, tout s'accélère.

  L'ère QSI : le cheatcode assumé

  Zlatan Ibrahimovic débarque en 2012. Il ne vient pas en touriste : 156 buts en 180 matchs, quatre titres de champion de France, une Coupe de France, une Coupe de la Ligue. Zlatan ne marche pas, il écrase. Il transforme le PSG en destination sérieuse pour les grands joueurs.

  Puis vient 2017 et ce qui reste probablement la plus grosse erreur de casting du football mondial : Neymar, acheté 222 millions d'euros. Le transfert le plus cher de l'histoire du football. Suivi de Kylian Mbappé, en prêt puis acheté pour 180 millions. Sur le papier, c'est imbattable. En pratique, la mayonnaise ne prend jamais vraiment. Trop d'égos, trop peu de collectif. La Remontada de 2017 contre Barcelone (éliminés en 8e de finale après avoir gagné 4-0 à l'aller) reste le symbole d'une équipe qui brillait en Ligue 1 mais implosait en Europe.

  Luis Enrique arrive en 2023 avec un mandat clair : construire un collectif, virer l'approche galactique, faire confiance aux jeunes. Beaucoup ont ricané. <a href='/joueurs/d-doue'>Doué</a>, Barcola, Zaïre-Emery, <a href='/joueurs/senny-mayulu'>Mayulu</a>, c'est quoi cette équipe ? Deux ans plus tard, c'est champion d'Europe avec le plus grand écart de l'histoire en finale.

  Ce que le PSG représente en Ligue 1

  Difficile de parler du PSG sans aborder l'impact sur le championnat de France. La <a href='/competitions/ligue-1'>Ligue 1</a> a souffert de la domination parisienne. Neuf titres en dix saisons entre 2012 et 2022, un championnat sous perfusion, des clubs qui jouent pour la deuxième place. C'est une réalité que les autres supporters français vivent comme une injustice permanente. Et ils n'ont pas complètement tort.

  Mais en 2025-2026, quelque chose change. Lens à 59 points, coude à coude avec le PSG à 60. Pour la première fois depuis longtemps, la Ligue 1 ressemble à une vraie course. Luis Enrique fait tourner, gère son effectif, et les autres clubs en profitent. C'est peut-être ça, l'héritage inattendu de la C1 : un PSG assouvi, moins obsédé par dominer le championnat, qui laisse de l'air.

  L'équipe aujourd'hui

  L'effectif actuel est l'un des plus excitants d'Europe. Pas parce qu'il est le plus cher (il ne l'est plus) mais parce qu'il est jeune, collectif, et talentueux de façon organique. <a href='/joueurs/d-doue'>Désiré Doué</a> est devenu en quelques mois l'un des joueurs les plus excitants du continent. <a href='/joueurs/k-kvaratskhelia'>Kvara</a> apporte son génie géorgien. Hakimi reste l'un des meilleurs latéraux du monde, 200 matchs au compteur sous le maillot parisien. Marquinhos, capitaine depuis des années, incarne la continuité et l'âme du club.

  Sur le banc, Luis Enrique a réussi quelque chose de rare : faire d'un club-vitrine un vrai club de football, avec une identité, un style, et des jeunes qui ont faim.

olympique-de-marseille: |
  Olympique de Marseille. À jamais les premiers.

  Il y a des clubs qu'on supporte, et il y a des clubs dont on fait partie. L'OM, c'est la deuxième catégorie. On ne dit pas "je suis fan de Marseille", on dit "je suis marseillais", même quand on n'a jamais mis les pieds en Provence. C'est ça la particularité de ce club, ce truc impossible à expliquer et encore moins à imiter : une appartenance qui dépasse le sport.

  Comme dit Jul : l'étoile sur le maillot, elle ne peut pas tomber.

  Le Vélodrome, une religion

  Avant de parler football, il faut parler du stade. Le Vélodrome n'est pas une enceinte sportive, c'est un état d'esprit. 67 000 places, la mer pas loin, le mistral qui s'engouffre, et dans les virages une ferveur qui n'existe nulle part ailleurs en France.

  Le virage nord, c'est un monde à part. Le capo qui te fait face, dos au terrain, qui orchestre 10 000 personnes avec ses mains nues. Torse nu en plein hiver, en gants pour garder le rythme. Pas de chauffage, pas de confort, juste la conviction que leur rôle est aussi important que celui des joueurs. Et ils ont raison. Les tifos déployés avant les grands matchs sont d'une beauté à couper le souffle, des œuvres d'art éphémères conçues dans l'ombre pendant des semaines pour quelques secondes d'émotion collective. Le douzième homme n'est pas une expression ici. C'est une réalité que les adversaires redoutent.

  Aller au Vélodrome avec son père, se retrouver dans cette masse humaine qui vibre à l'unisson, c'est une expérience que rien ne remplace. Ces moments-là, on les porte toute sa vie.

  À jamais les premiers

  Neuf fois champion de France. Et surtout, le 26 mai 1993 à Munich : l'unique club français à avoir remporté la Ligue des Champions, en battant l'AC Milan 1-0 grâce à un but de Basile Boli. Ce titre, personne ne peut l'effacer. Ni les scandales qui ont suivi, ni les années de traversée du désert, ni les saisons sans titre. L'OM a été champion d'Europe. Le PSG a mis trente ans à l'égaler. Cette étoile cousue sur le maillot, c'est l'histoire du football français résumée en un symbole.

  Éric Cantona, Jean-Pierre Papin, Didier Drogba, Samir Nasri. L'OM a toujours été une terre de talent, un club qui attire et qui révèle. Pas toujours de la manière la plus lisse, mais avec une intensité que peu de clubs en Europe peuvent revendiquer.

  Une saison 2025-2026 de montagnes russes

  Cette saison devait marquer le vrai retour de l'OM au sommet. Retour en <a href='/competitions/champions-league'>Ligue des Champions</a> après deux ans d'absence, un effectif renforcé avec Mason Greenwood confirmé, Rabiot, Højbjerg, et l'arrivée en prêt de Benjamin Pavard en septembre. Roberto De Zerbi aux commandes, Benatia au sportif, Longoria à la présidence. Un triptyque qui avait produit une belle deuxième place la saison précédente avec 65 points.

  Et puis ça s'est compliqué. L'OM termine 25e de la phase de ligue de la C1, éliminé après une cruelle soirée où un but à la 90e+8 de Benfica contre le Real Madrid leur ferme définitivement la porte. La Ligue des Champions qui s'en va sur un coup du sort. De Zerbi est remercié en février. Dans la foulée, Benatia annonce sa démission sur Instagram, avant de faire volte-face et rester à la demande du propriétaire Frank McCourt avec des responsabilités élargies. Longoria voit son rôle évoluer vers l'institutionnel. Et Habib Beye débarque sur le banc.

  Tout ça en quelques semaines.

  Mais il y a eu ce 22 septembre 2025. Un soir de Classique au Vélodrome. L'OM bat le PSG grâce à un but contre son camp de Marquinhos. Fin d'une série de 14 ans sans victoire à domicile en championnat contre le rival parisien. Quatorze ans. La libération d'une génération entière de supporters.

  Le club le plus suivi de France, peut-être du monde

  L'OM revendique le titre de club le plus populaire de France, et les chiffres ne contredisent pas vraiment. Des sections de supporters sur tous les continents, une communauté marseillaise de la diaspora qui suit les matchs depuis Montréal, Dubaï, Tokyo ou São Paulo. Le blanc et bleu ciel voyage bien. Il y a quelque chose dans l'identité de ce club qui résonne au-delà du football, qui parle à ceux qui sont loin de chez eux, qui ont connu l'exil ou la migration. Marseille la ville a toujours été une ville de passage et d'accueil. Le club lui ressemble.

  Ce qu'on regarde aujourd'hui

  Avec Habib Beye sur le banc depuis février, l'OM repart sur des bases nouvelles. L'équipe reste accrocheuse en <a href='/competitions/ligue-1'>Ligue 1</a>, troisième au classement, avec des joueurs comme Greenwood qui ont confirmé leur niveau malgré les polémiques autour de sa signature, Igor Paixão qui régale sur le côté, et Amine Gouiri qui a pris une autre dimension cette saison.

  La question de fond reste entière : l'OM peut-il un jour redevenir champion de France avec le PSG en face ? La réponse honnête, c'est que personne ne sait. Mais ce qui est certain, c'est que le jour où ça arrivera, le Vélodrome va trembler d'une façon qu'on n'a pas vue depuis 1993. Et les virages seront au rendez-vous, comme toujours.

olympique-lyonnais: |
  Olympique Lyonnais. Le club qui a tout eu, sauf le courage d'aller au bout.

  Il y a quelque chose de légèrement frustrant dans l'histoire de l'OL. Un truc qui gratte. Ce club a tout eu : l'argent, les joueurs, le projet, le stade. Il a dominé la France pendant sept ans d'affilée. Il a éliminé le Real Madrid, le Bayern, le Barça en <a href='/competitions/champions-league'>Ligue des Champions</a>. Et pourtant il n'a jamais réussi à transformer l'essai. Jamais en finale européenne. Jamais champion d'Europe. Comme s'il y avait, quelque part dans l'ADN du club, une peur secrète de franchir le dernier palier.

  C'est ce paradoxe qui rend l'OL fascinant.

  Un homme, un destin : Jean-Michel Aulas

  Pour comprendre Lyon, il faut comprendre Aulas. Et pour comprendre Aulas, il faut remonter à une soirée de 1987. L'homme d'affaires lyonnais est invité sur le plateau de l'émission "Ambitions" présentée par Bernard Tapie sur TF1. Après le tournage, en marge d'un dîner, un journaliste demande en l'air qui pourrait bien sortir l'OL des abysses de la Division 2. La punchline circule dans Lyon la semaine suivante : "Aulas président de l'OL." Il accepte. Il reprend un club endetté, au bord de la relégation, sans sponsor, dont les maillots sont floqués "OL-Europe" faute d'autre chose.

  Trente-cinq ans plus tard, ce même club aura été sept fois champion de France consécutivement, coté en bourse, présent dans le top 15 mondial selon Forbes, et propriétaire d'un stade à 500 millions d'euros financé sans un centime d'argent public. Voilà ce qu'Aulas a construit.

  Ce n'était pas un passionné de foot dans le sens romantique du terme. C'était un chef d'entreprise qui gérait un club comme une société. Il achetait bien, vendait encore mieux. Essien, Benzema, Abidal, Malouda, tous partis pour des dizaines de millions à l'étranger après avoir été révélés ou renforcés à Lyon. Certains lui ont reproché de faire du club une épicerie de luxe. Mais les sept titres consécutifs entre 2002 et 2008 sont là, incontestables.

  Paul Le Guen, Houllier, et les années dorées

  La grande époque, c'est celle-là. Paul Le Guen arrive sur le banc en 2000 et remporte trois titres de suite. Méthodique, discret, efficace. L'OL de ces années-là n'est pas spectaculaire mais il est implacable. Puis Gérard Houllier prend la suite et continue sur la lancée.

  Sur le terrain, c'est Juninho qui règne. Le Brésilien et ses coups francs impossibles. Il y en a eu tellement que ça en devient presque absurde : des buts de 30, 35, 40 mètres, des trajectoires que personne ne comprend encore vraiment. Juninho est peut-être le joueur de <a href='/competitions/ligue-1'>Ligue 1</a> le plus sous-estimé de l'histoire hors de France. À Lyon, tout le monde sait ce qu'il valait.

  Et puis Karim Benzema. Formé ici, révélé ici. KB9 qui débarque dans l'équipe première à 17 ans et qui régale avec une technique et une intelligence de jeu rarissimes à cet âge. Lyon n'a pas voulu ou pu le garder, il est parti au Real Madrid en 2009. On connaît la suite : Ballon d'Or 2022, cinq Ligues des Champions. Mais les supporters lyonnais savent qu'ils ont vu les premières pages de cette histoire. Sidney Govou, lui, a choisi de rester, fidèle jusqu'au bout, 11 saisons, 261 matchs, l'incarnation de la loyauté dans un football qui en manque cruellement.

  La dernière saison du règne, celle de 2007-2008, est aussi la plus bizarre. L'équipe gagne son septième titre de suite avec Alain Perrin sur le banc, mais dans une ambiance délétère. Aulas lui-même racontera plus tard que les cadres de l'effectif lui ont demandé, à la veille du dernier match décisif contre Auxerre, de faire la causerie entre eux, sans l'entraîneur. Une scène lunaire. Le titre est là, mais quelque chose est cassé. Ce sera le dernier.

  Le grand stade, le grand rêve

  Aulas a toujours voulu un stade digne de son projet. Gerland était beau mais vieux, et impossible à agrandir suffisamment. Le projet du Grand Stade est lancé en 2007, il voit le jour en janvier 2016 à Décines, en banlieue est de Lyon. Le Groupama Stadium aujourd'hui, 59 000 places, un bijou d'architecture moderne, inauguré pour la réception de Troyes le 9 janvier 2016.

  Ce stade tu dois y aller. Pas seulement pour le foot, pour l'expérience. Taylor Swift y a joué. Coldplay. La Coupe du monde féminine 2019, les JO 2024. C'est une enceinte multifonctions comme peu en France, avec une acoustique et une atmosphère qui tranchent radicalement avec les vieux stades de Ligue 1. Le seul bémol que les habitués mentionnent : l'accès depuis Lyon en heure de pointe un soir de match européen, c'est un calvaire. Prévoir large.

  La traversée du désert, l'ère Textor, le chaos

  Depuis 2012 et le dernier titre en Coupe de France, l'OL cherche. Aulas vend le club en 2022 à John Textor, homme d'affaires américain à la tête d'Eagle Football, un conglomérat de clubs incluant Botafogo et Crystal Palace. Le projet est fumeux, les finances compliquées, le club frôle la relégation administrative en 2024 avant d'être sauvé in extremis. Aulas est évincé en mai 2023, critiqué sur la fin mais célébré dès lors qu'on regarde l'ensemble de son bilan.

  L'histoire prend une tournure encore plus inattendue en 2025 quand Aulas, à 76 ans, se lance dans la course à la mairie de Lyon. Grand favori des sondages, il termine deuxième derrière le maire sortant au premier tour des municipales de mars 2026. L'homme n'a visiblement pas fini de faire parler de lui.

  Et aujourd'hui ?

  L'OL de 2025-2026 est une équipe en reconstruction, cinquième au classement de <a href='/competitions/ligue-1'>Ligue 1</a> avec 47 points, portée par des joueurs comme Lacazette de retour au bercail, et un Groupama Stadium qui commence à retrouver une vraie atmosphère les soirs de match. Le club court toujours après un titre depuis 2012. Mais la matière est là, le stade est là, et l'histoire de ce club montre qu'il sait se relever.

as-monaco: |
  AS Monaco : Le club du Rocher qui fait des miracles sans faire de bruit.

  Soyons honnêtes : combien connais-tu de vrais supporters de Monaco ? Un, peut-être deux dans ta vie. Et pourtant ce club t'a probablement offert certains de tes plus beaux souvenirs de football. C'est le paradoxe monégasque. Un club sans vraie base populaire massive, installé dans la principauté la plus riche du monde entre la mer et les montagnes, qui joue ses matchs à domicile dans un stade à moitié vide certains soirs, et qui pourtant, à intervalles réguliers, sort du chapeau des équipes qui font trembler l'Europe.

  C'est un club discret. Mais quand il parle, tout le monde écoute.

  Le Rocher et le Grand Prix

  Il faut d'abord situer le décor. Monaco c'est 2 km² de territoire, des yachts, des Formule 1 qui tournent dans les rues en mai, des palais et des milliardaires. Chaque année, pendant quelques jours, les circuits du Grand Prix de Monaco transforment la principauté en cathédrale du sport automobile. Il n'y a peut-être aucun endroit au monde où le sport et le glamour se mélangent avec autant de naturel.

  Et dans ce décor de carte postale, il y a un club de foot. L'AS Monaco, rouge et blanc, qui joue au Stade Louis II, une enceinte suspendue au-dessus des parkings, construite sur pilotis faute de place. Un stade improbable, dans un pays improbable, pour un club qui n'en finit pas de surprendre.

  Michel Hidalgo, les premières fondations

  Avant de parler des années folles, il faut rendre hommage à celui qui a planté les premières graines. Michel Hidalgo passe par Monaco dans les années 60 comme joueur puis comme entraîneur, avant de prendre les rênes de l'équipe de France pour mener les Bleus jusqu'en demi-finale du Mondial 1982 et au titre de champion d'Europe en 1984. Ce que peu de gens savent, c'est que le laboratoire Hidalgo a fonctionné au Rocher avant de fonctionner en bleu.

  Et Delio Onnis ? L'Argentin naturalisé français reste à ce jour le meilleur buteur de l'histoire de la <a href='/competitions/ligue-1'>Ligue 1</a>, avec 299 buts en carrière dont une grande partie sous le maillot monégasque dans les années 70. Un record qui tient depuis cinquante ans et que personne ne semble vouloir aller chercher. Onnis n'est pas très connu du grand public, mais dans le monde du football français, ce nom est une légende silencieuse.

  Bruno Bellone, Lucky Luke du Rocher

  Les années 80 amènent une génération dorée formée au club. Bruno Bellone en est le symbole. Ailier gauche né à Toulon, surnommé "Lucky Luke" par un journaliste qui trouve qu'il arme et frappe plus vite que son ombre. Il joue 228 matchs sous le maillot rouge et blanc, marque 56 buts, et va jusqu'à inscrire un but en finale de l'Euro 1984 avec les Bleus. Formé à Monaco, révélé à Monaco, fidèle à Monaco. Un modèle d'une époque où les joueurs restaient.

  Dans cette même génération, Manuel Amoros, défenseur technique et combatif, futur champion d'Europe lui aussi. Et Patrick Battiston, qui restera gravé dans la mémoire collective pour la charge de Schumacher en demi-finale du Mondial 82, mais qui a lui aussi porté les couleurs monégasques. Une époque féconde, construite dans l'ombre, loin des projecteurs parisiens ou marseillais.

  Willy Sagnol, Jérôme Rothen, et l'école du latéral

  Monaco a toujours eu un truc avec les latéraux. Willy Sagnol, droite de fer et intelligence tactique, formé ici avant de partir au Bayern Munich où il deviendra l'un des meilleurs défenseurs d'Europe dans les années 2000. Jérôme Rothen, lui, c'est l'autre côté. Gaucher technique, débordements propres, centres chirurgicaux. Ce pied gauche qui te fait mal au genou rien qu'à le regarder travailler. Rothen est devenu depuis l'une des voix les plus tranchées du football français sur RMC, mais ses meilleures années, il les a vécues sur la pelouse du Louis-II.

  Youri Djorkaeff aussi. Le fils de Jean, entre Monaco et le reste d'une carrière brillante qui le mènera jusqu'au titre mondial en 1998. Monaco comme tremplin. Monaco comme école.

  Le 6 avril 2004 : la nuit où Giuly a arrêté le temps

  Il y a des matchs dont on se souvient exactement où on était. Le quart de finale retour de <a href='/competitions/champions-league'>Champions League</a> entre Monaco et le Real Madrid, le 6 avril 2004, en fait partie pour une génération entière. Tu avais 14 ans, à la récré tout le monde en parlait le lendemain. Et pour cause.

  Monaco s'était fait corriger 4-2 à Santiago Bernabeu à l'aller. Personne ne donnait cher de leur peau. En face, le Real des Galactiques : Zidane, Ronaldo, Raul, Figo, Beckham, Roberto Carlos. La crème absolue du football mondial. Didier Deschamps sur le banc monégasque, ses joueurs qui sourient avant le coup d'envoi, détendus comme s'ils jouaient un match amical.

  Raul ouvre le score à la 36e. Le stade Louis II retient son souffle. Et là Giuly, le petit Giuly, égalise juste avant la mi-temps d'une volée croisée. Au retour des vestiaires, Morientes - prêté par le Real Madrid à Monaco cette saison-là, ironie totale - marque de la tête sur un centre de Patrice Evra. Et à la 66e, le moment que personne n'oubliera : Giuly dos au but, Helguera dans le dos, Casillas dans les cages. Une madjer. Une talonnade subtile et géniale qui part entre les jambes du défenseur madrilène et finit au fond. Giuly arrache son maillot et court comme un dératé sur la piste d'athlétisme. Le Louis-II explose. Monaco 3-1, qualification.

  Giuly avait dit après : "On est des gamins. Battre le Real Madrid en quarts et arriver en demi-finale, c'est magique." Ce soir-là, Monaco n'était plus un petit club de principauté. C'était une équipe de foot, simplement, magnifiquement.

  Une digression qui s'impose : Deschamps, l'homme qui a tout réussi

  On ne peut pas parler de ce Monaco-Real sans parler de lui. Didier Deschamps était sur ce banc. Capitaine de l'équipe de France championne du monde en 1998, champion d'Europe en 2000, et qui prend ensuite sa retraite pour commencer à entraîner, à Monaco justement, presque sans transition. Il amène cette équipe en finale de <a href='/competitions/champions-league'>Champions League</a> en 2004. Ensuite Juventus, Marseille, et enfin l'équipe de France. Champion du monde en 2018 comme entraîneur.

  Tu peux dire ce que tu veux sur son style de jeu, sur son pragmatisme, sur les choix de liste qui font débat. Mais l'homme a tout gagné. Comme joueur, comme capitaine, comme entraîneur. Il y en a peu dans l'histoire du football mondial qui peuvent revendiquer ce palmarès des deux côtés de la barrière.

  Et quand le débat sur son successeur agite la France, un nom revient toujours : Zidane. Le seul qui pourrait succéder à Deschamps sans que personne ne trouve à redire, parce qu'il y a quelque chose de beau dans l'idée que le meilleur joueur de sa génération prenne la suite du meilleur capitaine de la sienne.

  Mbappé et le laboratoire à talents

  La saison 2016-2017 rappelle au monde ce que Monaco sait faire mieux que presque tout le monde : lancer les jeunes. Cette équipe, entraînée par Leonardo Jardim, atteignait la demi-finale de <a href='/competitions/champions-league'>Champions League</a> avec une attaque composée de Mbappé (18 ans), Lemar, Bernardo Silva, Falcao. Tiémoué Bakayoko au milieu. Des joueurs vendus ensuite pour des centaines de millions d'euros cumulés. Et Monaco champion de <a href='/competitions/ligue-1'>Ligue 1</a> cette année-là, pour la première fois depuis 2000.

  C'est la marque de fabrique du club. Pas les transferts pharaoniques, pas les stars achetées à prix d'or. La formation, la détection, la patience. Et quand ça marche, ça donne des joueurs que le monde entier s'arrache.
