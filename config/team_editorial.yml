paris-saint-germain: |
  Paris Saint-Germain. Le club qui divise la France, mais qu'on regarde quand même.

  Soyons honnêtes deux secondes. Le PSG, c'est un cheatcode. Un club qui a décidé un beau matin de 2011 que l'argent qatari allait changer la donne du football français, et qui l'a fait. Ibrahimovic, Neymar, Mbappé, des centaines de millions dépensés, une <a href='/competitions/ligue-1'>Ligue 1</a> transformée en championnat à sens unique pendant une décennie. Le PSG a aspiré tous les talents, tous les regards, toute l'attention médiatique. Et ça énerve. Pas qu'un peu.

  Mais voilà le truc (et c'est peut-être un aveu difficile pour certains) : quand le PSG joue bien, on se régale. Vraiment. Parce que quand ils ont de bons joueurs, du beau jeu, et un collectif huilé, c'est du spectacle pur. Et en 2025, ils ont offert quelque chose que personne n'oubliera.

  Le 31 mai 2025 : la nuit où tout a changé

  Il y a des soirs de foot qui dépassent le foot. Le 31 mai 2025 à Munich, l'Allianz Arena, PSG contre l'Inter Milan en finale de la <a href='/competitions/champions-league'>Champions League</a>. Le PSG n'avait jamais gagné cette compétition. Jamais. Malgré les milliards, malgré les stars, malgré les années d'essais. La finale de 2020 contre le Bayern, perdue 1-0 dans une bulle sanitaire à Lisbonne, était restée comme une blessure ouverte.

  Ce soir-là, rien ne s'est passé comme prévu, dans le bon sens du terme. Hakimi ouvre le score à la 12e minute, <a href='/joueurs/d-doue'>Désiré Doué</a> double la mise à la 20e. Doué, 19 ans, gamin sorti de Rennes, auteur d'un doublé et d'une passe décisive en finale de C1. <a href='/joueurs/k-kvaratskhelia'>Kvaratskhelia</a>, <a href='/joueurs/senny-mayulu'>Mayulu</a>. 5-0. Le score le plus large de l'histoire des finales de Champions League. Jamais vu, jamais fait.

  À Paris, les Champs-Élysées ont explosé. Des milliers de gens dans les rues, la Tour Eiffel en bleu et rouge, 110 000 fans au Trocadéro. Et dans cette foule, des scènes impossibles à décrire : des hommes taciturnes, peu expressifs au quotidien, qui pleuraient. Des pères de famille qui criaient que c'était le plus beau jour de leur vie. Des gens qui n'avaient sans doute jamais montré autant d'émotion de leur existence. Ce soir-là, on n'assistait plus à un résultat sportif. On regardait l'histoire d'un club s'écrire en direct. Marquinhos en larmes au micro : "Je pense à tous ceux qui sont passés ici et qui n'ont pas réussi. Thiago Silva, Di Maria." Un moment unique.

  D'où vient ce club ?

  Le Paris Saint-Germain est fondé en 1970, fusion improbable d'un club parisien et d'une section football du Stade Saint-Germain. L'idée : donner enfin à Paris un grand club de football, comme toutes les grandes capitales européennes en avaient. Les débuts sont modestes, la montée en Ligue 1 en 1974, quelques hauts et bas. Le premier grand titre arrive en 1986 avec une Coupe de France. La vraie montée en puissance commence dans les années 90, sous l'ère Canal+ (actionnaire majoritaire à l'époque). C'est l'époque des George Weah, des Valdo, des Rai. Le PSG remporte la Coupe des Coupes en 1996, le premier trophée européen du club, en battant le Rapid Vienne 1-0 à Bruxelles. Une époque dorée, romantique, avant que les finances ne s'effondrent et que le club repasse par une traversée du désert.

  Puis 2011, l'arrivée de QSI. Qatar Sports Investments. Nasser al-Khelaïfi prend les rênes. Et là, tout s'accélère.

  L'ère QSI : le cheatcode assumé

  Zlatan Ibrahimovic débarque en 2012. Il ne vient pas en touriste : 156 buts en 180 matchs, quatre titres de champion de France, une Coupe de France, une Coupe de la Ligue. Zlatan ne marche pas, il écrase. Il transforme le PSG en destination sérieuse pour les grands joueurs.

  Puis vient 2017 et ce qui reste probablement la plus grosse erreur de casting du football mondial : Neymar, acheté 222 millions d'euros. Le transfert le plus cher de l'histoire du football. Suivi de Kylian Mbappé, en prêt puis acheté pour 180 millions. Sur le papier, c'est imbattable. En pratique, la mayonnaise ne prend jamais vraiment. Trop d'égos, trop peu de collectif. La Remontada de 2017 contre Barcelone (éliminés en 8e de finale après avoir gagné 4-0 à l'aller) reste le symbole d'une équipe qui brillait en Ligue 1 mais implosait en Europe.

  Luis Enrique arrive en 2023 avec un mandat clair : construire un collectif, virer l'approche galactique, faire confiance aux jeunes. Beaucoup ont ricané. <a href='/joueurs/d-doue'>Doué</a>, Barcola, Zaïre-Emery, <a href='/joueurs/senny-mayulu'>Mayulu</a>, c'est quoi cette équipe ? Deux ans plus tard, c'est champion d'Europe avec le plus grand écart de l'histoire en finale.

  Ce que le PSG représente en Ligue 1

  Difficile de parler du PSG sans aborder l'impact sur le championnat de France. La <a href='/competitions/ligue-1'>Ligue 1</a> a souffert de la domination parisienne. Neuf titres en dix saisons entre 2012 et 2022, un championnat sous perfusion, des clubs qui jouent pour la deuxième place. C'est une réalité que les autres supporters français vivent comme une injustice permanente. Et ils n'ont pas complètement tort.

  Mais en 2025-2026, quelque chose change. Lens à 59 points, coude à coude avec le PSG à 60. Pour la première fois depuis longtemps, la Ligue 1 ressemble à une vraie course. Luis Enrique fait tourner, gère son effectif, et les autres clubs en profitent. C'est peut-être ça, l'héritage inattendu de la C1 : un PSG assouvi, moins obsédé par dominer le championnat, qui laisse de l'air.

  L'équipe aujourd'hui

  L'effectif actuel est l'un des plus excitants d'Europe. Pas parce qu'il est le plus cher (il ne l'est plus) mais parce qu'il est jeune, collectif, et talentueux de façon organique. <a href='/joueurs/d-doue'>Désiré Doué</a> est devenu en quelques mois l'un des joueurs les plus excitants du continent. <a href='/joueurs/k-kvaratskhelia'>Kvara</a> apporte son génie géorgien. Hakimi reste l'un des meilleurs latéraux du monde, 200 matchs au compteur sous le maillot parisien. Marquinhos, capitaine depuis des années, incarne la continuité et l'âme du club.

  Sur le banc, Luis Enrique a réussi quelque chose de rare : faire d'un club-vitrine un vrai club de football, avec une identité, un style, et des jeunes qui ont faim.

olympique-de-marseille: |
  Olympique de Marseille. À jamais les premiers.

  Il y a des clubs qu'on supporte, et il y a des clubs dont on fait partie. L'OM, c'est la deuxième catégorie. On ne dit pas "je suis fan de Marseille", on dit "je suis marseillais", même quand on n'a jamais mis les pieds en Provence. C'est ça la particularité de ce club, ce truc impossible à expliquer et encore moins à imiter : une appartenance qui dépasse le sport.

  Comme dit Jul : l'étoile sur le maillot, elle ne peut pas tomber.

  Le Vélodrome, une religion

  Avant de parler football, il faut parler du stade. Le Vélodrome n'est pas une enceinte sportive, c'est un état d'esprit. 67 000 places, la mer pas loin, le mistral qui s'engouffre, et dans les virages une ferveur qui n'existe nulle part ailleurs en France.

  Le virage nord, c'est un monde à part. Le capo qui te fait face, dos au terrain, qui orchestre 10 000 personnes avec ses mains nues. Torse nu en plein hiver, en gants pour garder le rythme. Pas de chauffage, pas de confort, juste la conviction que leur rôle est aussi important que celui des joueurs. Et ils ont raison. Les tifos déployés avant les grands matchs sont d'une beauté à couper le souffle, des œuvres d'art éphémères conçues dans l'ombre pendant des semaines pour quelques secondes d'émotion collective. Le douzième homme n'est pas une expression ici. C'est une réalité que les adversaires redoutent.

  Aller au Vélodrome avec son père, se retrouver dans cette masse humaine qui vibre à l'unisson, c'est une expérience que rien ne remplace. Ces moments-là, on les porte toute sa vie.

  À jamais les premiers

  Neuf fois champion de France. Et surtout, le 26 mai 1993 à Munich : l'unique club français à avoir remporté la Ligue des Champions, en battant l'AC Milan 1-0 grâce à un but de Basile Boli. Ce titre, personne ne peut l'effacer. Ni les scandales qui ont suivi, ni les années de traversée du désert, ni les saisons sans titre. L'OM a été champion d'Europe. Le PSG a mis trente ans à l'égaler. Cette étoile cousue sur le maillot, c'est l'histoire du football français résumée en un symbole.

  Éric Cantona, Jean-Pierre Papin, Didier Drogba, Samir Nasri. L'OM a toujours été une terre de talent, un club qui attire et qui révèle. Pas toujours de la manière la plus lisse, mais avec une intensité que peu de clubs en Europe peuvent revendiquer.

  Une saison 2025-2026 de montagnes russes

  Cette saison devait marquer le vrai retour de l'OM au sommet. Retour en <a href='/competitions/champions-league'>Ligue des Champions</a> après deux ans d'absence, un effectif renforcé avec Mason Greenwood confirmé, Rabiot, Højbjerg, et l'arrivée en prêt de Benjamin Pavard en septembre. Roberto De Zerbi aux commandes, Benatia au sportif, Longoria à la présidence. Un triptyque qui avait produit une belle deuxième place la saison précédente avec 65 points.

  Et puis ça s'est compliqué. L'OM termine 25e de la phase de ligue de la C1, éliminé après une cruelle soirée où un but à la 90e+8 de Benfica contre le Real Madrid leur ferme définitivement la porte. La Ligue des Champions qui s'en va sur un coup du sort. De Zerbi est remercié en février. Dans la foulée, Benatia annonce sa démission sur Instagram, avant de faire volte-face et rester à la demande du propriétaire Frank McCourt avec des responsabilités élargies. Longoria voit son rôle évoluer vers l'institutionnel. Et Habib Beye débarque sur le banc.

  Tout ça en quelques semaines.

  Mais il y a eu ce 22 septembre 2025. Un soir de Classique au Vélodrome. L'OM bat le PSG grâce à un but contre son camp de Marquinhos. Fin d'une série de 14 ans sans victoire à domicile en championnat contre le rival parisien. Quatorze ans. La libération d'une génération entière de supporters.

  Le club le plus suivi de France, peut-être du monde

  L'OM revendique le titre de club le plus populaire de France, et les chiffres ne contredisent pas vraiment. Des sections de supporters sur tous les continents, une communauté marseillaise de la diaspora qui suit les matchs depuis Montréal, Dubaï, Tokyo ou São Paulo. Le blanc et bleu ciel voyage bien. Il y a quelque chose dans l'identité de ce club qui résonne au-delà du football, qui parle à ceux qui sont loin de chez eux, qui ont connu l'exil ou la migration. Marseille la ville a toujours été une ville de passage et d'accueil. Le club lui ressemble.

  Ce qu'on regarde aujourd'hui

  Avec Habib Beye sur le banc depuis février, l'OM repart sur des bases nouvelles. L'équipe reste accrocheuse en <a href='/competitions/ligue-1'>Ligue 1</a>, troisième au classement, avec des joueurs comme Greenwood qui ont confirmé leur niveau malgré les polémiques autour de sa signature, Igor Paixão qui régale sur le côté, et Amine Gouiri qui a pris une autre dimension cette saison.

  La question de fond reste entière : l'OM peut-il un jour redevenir champion de France avec le PSG en face ? La réponse honnête, c'est que personne ne sait. Mais ce qui est certain, c'est que le jour où ça arrivera, le Vélodrome va trembler d'une façon qu'on n'a pas vue depuis 1993. Et les virages seront au rendez-vous, comme toujours.
