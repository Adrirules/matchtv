"Ligue 1": |
  Le classement de Ligue 1, c'est le premier truc qu'on regarde le lundi matin avant même d'ouvrir ses mails. On sait déjà le résultat de son équipe, on l'a vécu en direct hier, mais on a besoin de voir le tableau, de compter les points, de regarder qui a glissé et qui a remonté. C'est un rituel.
  En tête cette saison, le <a href='/equipes/paris-saint-germain'>Paris Saint-Germain</a> assume son statut avec une régularité qui finit par agacer tout le monde sauf les supporters parisiens. Champion d'Europe en titre, le PSG aborde chaque journée de Ligue 1 avec ce mélange de sérieux professionnel et de regard légèrement ailleurs, tourné vers les prochains matchs de Champions League. Ce qui ne les empêche pas de prendre des points.
  Derrière, la course est bien plus animée qu'on ne le pensait en début de saison. <a href='/equipes/lens'>Lens</a> qui grignote, <a href='/equipes/lille'>Lille</a> qui ne lâche pas, <a href='/equipes/monaco'>Monaco</a> avec ses jeunes talents qui accélèrent au bon moment. C'est cette deuxième place et les tickets européens qui concentrent l'essentiel du drama de la saison, parce que soyons honnêtes, le titre on connaît déjà le favori.
  La lutte pour le top 5 et les places européennes est particulièrement serrée. <a href='/equipes/olympique-de-marseille'>Marseille</a>, <a href='/equipes/stade-rennais'>Rennes</a>, quelques autres qui se tiennent en quelques points seulement. Chaque journée rebat les cartes. Un résultat inattendu un samedi soir et tout le monde remonte ou dégringole. C'est ce que la Ligue 1 fait de mieux quand elle s'y met : créer du suspense pour les places du milieu de tableau alors que le titre est souvent plié.
  Et puis il y a le bas. La zone rouge, le ventre mou qui fait peur. Des clubs historiques qui se retrouvent à compter les points un à un, à espérer que les concurrents directs perdent, à jouer chaque match comme si c'était le dernier de leur existence en Ligue 1. Parce que parfois c'est le cas. La relégation en Ligue 2, c'est une catastrophe sportive et financière que peu de clubs arrivent à traverser sans séquelles durables.
  Ce qui ressort de cette saison au classement : des résultats souvent imprévisibles, des équipes du haut qui se font surprendre par des adversaires inattendus, et des jeunes joueurs qui émergent et dynamisent des clubs qu'on pensait condamnés à faire de la figuration.
  Le classement complet et mis à jour en temps réel est disponible juste en dessous. Rafraîchissez après chaque journée, ça change vite.
