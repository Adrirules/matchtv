"Ligue 1": |
  Le classement de Ligue 1, c'est le premier truc qu'on regarde le lundi matin avant même d'ouvrir ses mails. On sait déjà le résultat de son équipe, on l'a vécu en direct hier, mais on a besoin de voir le tableau, de compter les points, de regarder qui a glissé et qui a remonté. C'est un rituel.
  En tête cette saison, le <a href='/equipes/paris-saint-germain'>Paris Saint-Germain</a> assume son statut avec une régularité qui finit par agacer tout le monde sauf les supporters parisiens. Champion d'Europe en titre, le PSG aborde chaque journée de Ligue 1 avec ce mélange de sérieux professionnel et de regard légèrement ailleurs, tourné vers les prochains matchs de Champions League. Ce qui ne les empêche pas de prendre des points.
  Derrière, la course est bien plus animée qu'on ne le pensait en début de saison. <a href='/equipes/lens'>Lens</a> qui grignote, <a href='/equipes/lille'>Lille</a> qui ne lâche pas, <a href='/equipes/monaco'>Monaco</a> avec ses jeunes talents qui accélèrent au bon moment. C'est cette deuxième place et les tickets européens qui concentrent l'essentiel du drama de la saison, parce que soyons honnêtes, le titre on connaît déjà le favori.
  La lutte pour le top 5 et les places européennes est particulièrement serrée. <a href='/equipes/olympique-de-marseille'>Marseille</a>, <a href='/equipes/stade-rennais'>Rennes</a>, quelques autres qui se tiennent en quelques points seulement. Chaque journée rebat les cartes. Un résultat inattendu un samedi soir et tout le monde remonte ou dégringole. C'est ce que la Ligue 1 fait de mieux quand elle s'y met : créer du suspense pour les places du milieu de tableau alors que le titre est souvent plié.
  Et puis il y a le bas. La zone rouge, le ventre mou qui fait peur. Des clubs historiques qui se retrouvent à compter les points un à un, à espérer que les concurrents directs perdent, à jouer chaque match comme si c'était le dernier de leur existence en Ligue 1. Parce que parfois c'est le cas. La relégation en Ligue 2, c'est une catastrophe sportive et financière que peu de clubs arrivent à traverser sans séquelles durables.
  Ce qui ressort de cette saison au classement : des résultats souvent imprévisibles, des équipes du haut qui se font surprendre par des adversaires inattendus, et des jeunes joueurs qui émergent et dynamisent des clubs qu'on pensait condamnés à faire de la figuration.
  Le classement complet et mis à jour en temps réel est disponible juste en dessous. Rafraîchissez après chaque journée, ça change vite.

"Premier League": |
  Le classement de Premier League, c'est celui qu'on regarde avec un œil différent des autres. Parce que la Premier League a cette particularité unique en Europe : n'importe qui peut battre n'importe qui n'importe quel week-end. Le premier peut perdre chez le dernier, et personne ne trouve ça vraiment surprenant. C'est la beauté et la frustration de ce championnat en même temps.
  En tête cette saison, <a href='/equipes/arsenal'>Arsenal</a> mène la danse avec <a href='/equipes/manchester-city'>Manchester City</a> dans le rétroviseur et <a href='/equipes/liverpool'>Liverpool</a> champion en titre qui n'a pas dit son dernier mot. Trois clubs, des styles différents, des ambitions identiques. La course au titre en Premier League ressemble rarement à un long fleuve tranquille, et cette saison ne fait pas exception.
  Derrière le top trois, la lutte pour les places européennes est un feuilleton à part entière. <a href='/equipes/tottenham'>Tottenham</a>, <a href='/equipes/aston-villa'>Aston Villa</a>, <a href='/equipes/manchester-united'>Manchester United</a> qui semble enfin retrouver un semblant de cohérence. Cinq ou six équipes séparées par quelques points, chaque journée qui redistribue les cartes. C'est précisément pour ça qu'on regarde la Premier League jusqu'au bout même quand on pense avoir compris la hiérarchie.
  Et le bas du tableau, parlons-en. La relégation en Premier League c'est une catastrophe économique pour les clubs qui la subissent, avec des droits TV qui s'effondrent du simple au quintuple entre la première et la deuxième division anglaise. Autant dire que les équipes en bas jouent chaque match comme si leur existence en dépendait. Parce que c'est exactement le cas.
  Ce qui fait la signature de la Premier League au classement : des résultats qui défient régulièrement la logique, des outsiders qui font tomber les favoris, et un niveau global si élevé que même le dernier du classement peut vous tenir en haleine pendant 90 minutes.
  Le classement complet est juste en dessous. Vérifiez après chaque journée du week-end, ça bouge vite.

"Serie A": |
  Le classement de Serie A a quelque chose de particulier pour ceux qui ont connu le championnat italien dans ses années de gloire. On le regarde avec un mélange de nostalgie et d'espoir. Nostalgie parce qu'on compare toujours au passé. Espoir parce que le championnat italien est en train de lentement retrouver ses lettres de noblesse européennes.
  En tête cette saison, l'<a href='/equipes/inter-milan'>Inter Milan</a> confirme sa solidité avec une organisation collective qui fait mal à tous ses adversaires. 68 points, meilleure attaque, meilleure défense. Les Nerazzurri sont la référence du championnat cette saison et ils ne s'en cachent pas.
  Derrière, <a href='/equipes/napoli'>Naples</a> qui court derrière avec Antonio Conte sur le banc, <a href='/equipes/ac-milan'>Milan</a> qui alterne le bon et le moins bon, la <a href='/equipes/juventus'>Juventus</a> qui cherche encore son identité. C'est ce chassé-croisé permanent entre les grands clubs italiens qui rend la Serie A addictive pour ceux qui prennent le temps de la suivre vraiment.
  La lutte pour les places européennes implique l'<a href='/equipes/atalanta'>Atalanta</a>, l'<a href='/equipes/as-roma'>AS Roma</a>, des équipes qui jouent un football parfois plus excitant que les cadors. C'est souvent dans cette partie du classement que se fabriquent les vraies surprises de saison.
  En bas, des clubs historiques sous pression, quelques promus qui luttent pour leur survie, et cette tension permanente propre au championnat le plus tactique d'Europe. La Serie A est en reconstruction, c'est vrai. Mais on voit le niveau remonter chaque saison, et les performances européennes récentes confirment que le foot italien n'a pas dit son dernier mot.
  Le classement complet est juste en dessous.

"Bundesliga": |
  Le classement de Bundesliga, on le regarde différemment des autres. On ne le regarde pas pour savoir qui va être champion. On le regarde pour voir qui va terminer deuxième et offrir à ses supporters l'illusion d'avoir fait quelque chose de bien. Parce que le <a href='/equipes/bayern-munchen'>Bayern Munich</a>, bon. On connaît la fin.
  Cette saison pourtant, quelque chose se passe. <a href='/equipes/bayer-leverkusen'>Leverkusen</a> à portée, <a href='/equipes/borussia-dortmund'>Dortmund</a> qui essaie encore, et un Bayern qui a démarré sur les chapeaux de roues avec 16 victoires consécutives avant de montrer quelques signes d'humanité. La course au titre n'est pas encore pliée et c'est déjà une nouveauté en soi.
  Derrière le top trois, <a href='/equipes/rb-leipzig'>Leipzig</a>, <a href='/equipes/eintracht-frankfurt'>Francfort</a>, <a href='/equipes/vfb-stuttgart'>Stuttgart</a> se battent pour les places européennes dans un championnat qui produit régulièrement des équipes capables de créer des surprises en Europa League ou en C1. C'est d'ailleurs là que la Bundesliga brille le plus au classement : la densité du milieu de tableau, avec des clubs bien structurés qui jouent un football offensif et ne se contentent pas de défendre.
  En bas du tableau, la lutte pour le maintien est moins médiatisée qu'en Premier League mais tout aussi intense pour ceux qui la vivent de l'intérieur. Des clubs qui remplissent leur stade même en zone rouge, parce que c'est la culture footballistique allemande : on soutient son équipe peu importe le classement.
  Ce qui distingue le classement de Bundesliga de tous les autres : les ambiances qui accompagnent chaque résultat. Un club qui remonte d'une place dans le bas du tableau avec 60 000 personnes qui chantent derrière lui, c'est quelque chose que peu de championnats peuvent offrir.
  Le classement complet est juste en dessous. Et si vous n'avez jamais regardé le multiplex du samedi à 15h30 avec cinq matchs simultanés, c'est le moment d'essayer.

"Champions League": |
  Le classement en phase de ligue de la Champions League, c'est trompeur. Vous pouvez finir premier de votre groupe et vous faire sortir au tour suivant. Vous pouvez finir huitième et aller chercher le titre. La C1 ne fonctionne pas comme un championnat normal parce que ce n'est pas un championnat normal. C'est une série de duels à élimination directe où le mental pèse autant que le talent, où une erreur défensive à la 89e minute peut effacer trois mois de domination collective.
  Ce qui ressort de cette saison, c'est la confirmation d'une vérité que les observateurs répètent depuis des années : il y a les clubs qui savent jouer la Champions League, et les autres. Le <a href='/equipes/real-madrid'>Real Madrid</a> qui peut être médiocre pendant 80 minutes et trouver le but décisif à la 88e. Le <a href='/equipes/bayern-munchen'>Bayern</a> qui impose sa structure même dans les moments difficiles. Le <a href='/equipes/paris-saint-germain'>PSG</a> champion en titre qui a montré cette saison qu'on pouvait construire une équipe capable de dominer l'Europe de bout en bout sans s'effondrer sous la pression.
  Les outsiders existent, ils font peur pendant quelques tours, et puis l'expérience des grands clubs fait la différence. Ce n'est pas cynique, c'est la réalité de cette compétition depuis soixante-dix ans.
  Le classement complet de la phase de ligue est juste en dessous. Mais retenez une chose : ce tableau ne vous dit pas qui va gagner la coupe. Il vous dit juste qui a le droit de continuer à rêver.

"La Liga": |
  Le classement de La Liga raconte toujours la même histoire, et cette année ne fait pas exception. En haut, le <a href='/equipes/barcelona'>FC Barcelone</a> et le <a href='/equipes/real-madrid'>Real Madrid</a> qui se regardent en chiens de faïence, séparés par quelques points, chacun attendant que l'autre fasse une erreur. C'est le Clásico permanent, pas seulement le jour du match mais toute la saison, journée après journée.
  Ce qui est intéressant dans le classement de La Liga, c'est ce qui se passe juste derrière. L'<a href='/equipes/atletico-madrid'>Atlético de Madrid</a> de Simeone qui n'abandonne jamais le titre même quand tout le monde l'a enterré. Villarreal qui produit un football propre avec des moyens raisonnables. Athletic Bilbao qui ne recrute que des joueurs basques et reste compétitif depuis cent ans, ce qui est soit du romantisme absolu soit de l'entêtement pur, probablement les deux.
  La Liga est le championnat le plus technique d'Europe mais pas le plus spectaculaire. Moins de buts qu'en Bundesliga, moins de rebondissements qu'en Premier League. C'est un championnat pour ceux qui savent lire le football au-delà du score. Le talent compte, mais la discipline décide. Et dans ce championnat, ceux qui savent gérer les temps faibles finissent toujours par gagner.
  En bas du tableau, des équipes qui défendent leur survie avec une rigueur impressionnante. En Liga, même le dernier joue tactiquement. Personne ne débarque juste pour remplir le calendrier.
  Le classement complet est juste en dessous.

"Ligue 2": |
  Le classement de Ligue 2 est le plus trompeur de tous. Vous regardez les dix premiers, vous pensez avoir compris qui va monter. Et puis trois journées plus tard, une série de défaites et le leader se retrouve quatrième. C'est ça, la L2 : un marathon où chaque semaine peut tout remettre en question.
  En haut du tableau, la course à la montée est une guerre d'usure. Pas les équipes les plus brillantes qui montent, mais les plus solides mentalement. Celles qui gagnent des matchs qu'elles n'auraient pas dû gagner, qui font des nuls importants à l'extérieur, qui ne s'effondrent pas après une défaite. La régularité sur trente-huit journées, c'est ça le vrai critère en Ligue 2.
  La lutte pour les places de barrage ajoute une couche de tension supplémentaire. Plusieurs clubs séparés par un ou deux points, chaque résultat du concurrent direct scruté en temps réel depuis les vestiaires adverses. C'est du football à l'état brut.
  En bas, c'est brutal. Peu de spectacle, beaucoup d'engagement, et des équipes qui savent que la relégation en National peut remettre en question leur statut professionnel. Chaque point arraché à l'extérieur peut peser lourd en mai.
  Le classement complet est juste en dessous. Et vérifiez-le souvent, il change vraiment vite.

"Europa League": |
  L'Europa League est la compétition la plus mal aimée d'Europe et c'est profondément injuste. Les matchs y sont souvent plus ouverts qu'en Champions League, les surprises plus fréquentes, et certaines affiches valent largement le détour même si elles ne font pas la Une de tous les médias le lendemain.
  Le classement en phase de ligue révèle une réalité intéressante : c'est une compétition de spécialistes. Le FC Séville avec sept titres en est l'exemple parfait. Des clubs qui ont compris comment gérer cette compétition, comment faire tourner l'effectif intelligemment entre le championnat et le jeudi soir européen, comment se transcender dans les matchs couperets.
  Ce qui distingue l'Europa League de la Champions League au classement, c'est l'imprévisibilité. Les écarts de niveau sont moins marqués, les équipes moins attendues peuvent vraiment aller loin si leur dynamique collective est bonne. Un club de milieu de tableau d'une grande ligue qui arrive avec la faim et l'organisation peut faire très mal à un prétendant théoriquement supérieur.
  Cette saison, l'<a href='/equipes/olympique-lyonnais'>OL</a> est en lice et c'est une opportunité réelle pour le football français de briller sur la scène européenne un jeudi soir. Les nuits d'Europa League au Groupama Stadium peuvent être belles quand le stade s'emballe.
  Le classement complet est juste en dessous. Et regardez l'Europa League de temps en temps, vous pourriez être surpris.
